<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA 65</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 925: '#0f172a' } },
                    animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'spin-slow': 'spin 2s linear infinite' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.2s ease-out; }
        .slide-up { animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { 0% { transform: translateY(10px) scale(0.98); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        
        .dot-flashing {
            position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff;
            animation: dot-flashing 1s infinite linear alternate; animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ""; display: inline-block; position: absolute; top: 0; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff; animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before { left: -10px; animation-delay: 0s; }
        .dot-flashing::after { left: 10px; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: #9880ff; } 50%, 100% { background-color: rgba(152, 128, 255, 0.2); } }
        .msg-content a, #doc-content-area a { color: #60a5fa; text-decoration: underline; word-break: break-all; cursor: pointer; }
        .msg-content p, #doc-content-area div { margin-bottom: 0.5em; line-height: 1.6; }
        
        /* Toast Alert */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #334155; color: #fff; text-align: center;
            border-radius: 8px; padding: 12px; position: fixed; z-index: 100; left: 50%; transform: translateX(-50%);
            bottom: 30px; font-size: 14px; opacity: 0; transition: opacity 0.3s, bottom 0.3s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 100px; }
        
        audio { outline: none; border-radius: 8px; }
        audio::-webkit-media-controls-panel { background-color: #1e293b; color: #fff; }
        audio::-webkit-media-controls-current-time-display, audio::-webkit-media-controls-time-remaining-display { color: #fff; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans overflow-hidden selection:bg-blue-500/30">

    <div class="flex h-[100dvh] w-full relative">
        <!-- Sidebar -->
        <aside class="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800 p-6 flex-shrink-0 z-10">
            <div class="flex items-center space-x-3 mb-10 px-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-infinity text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">NOVA 65</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">Ultimate Edition</p>
                </div>
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg transition-all"><i class="ph ph-chats-circle text-xl"></i><span class="font-medium">助理對話</span></button>
                <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-calendar-check text-xl"></i><span class="font-medium">行程管理</span></button>
                <button onclick="switchTab('notes')" id="nav-notes" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-notebook text-xl"></i><span class="font-medium">筆記/文件</span></button>
                <button onclick="switchTab('audio')" id="nav-audio" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-waveform text-xl"></i><span class="font-medium">錄音紀錄</span></button>
            </nav>
            <div class="mt-auto space-y-3">
                <button onclick="openSettings()" class="flex items-center space-x-2 text-xs text-slate-500 hover:text-slate-300 w-full px-2"><i class="ph ph-gear"></i><span>設定 & API</span></button>
                <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
                    <div class="flex items-center space-x-2"><i id="status-icon" class="ph-fill ph-globe text-blue-400 text-lg"></i><span id="status-name" class="font-bold text-sm">Gemini</span></div>
                    <p id="model-version-display" class="text-[10px] text-slate-500 mt-1">Ready</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-slate-950 overflow-hidden min-h-0">
            <!-- Mobile Header -->
            <div class="md:hidden flex items-center justify-between p-3 bg-slate-900 border-b border-slate-800 z-30 shrink-0">
                <div class="flex items-center space-x-2 shrink-0"><i class="ph-bold ph-infinity text-blue-500 text-xl"></i><span class="font-bold text-white">Nova 65</span></div>
                <div class="flex items-center space-x-3 ml-auto pl-2">
                    <div class="flex items-center space-x-1 bg-slate-800/50 px-2 py-1 rounded-lg border border-slate-700/50 cursor-pointer active:scale-95 transition-transform" onclick="cycleManualLocation()">
                        <i id="mobile-weather-icon" class="ph-fill ph-navigation-arrow text-blue-400"></i><span id="mobile-weather-temp" class="text-xs font-bold text-white whitespace-nowrap">更新</span>
                    </div>
                    <button onclick="openSettings()"><i class="ph ph-gear text-slate-400 text-xl"></i></button>
                    <button onclick="toggleMobileMenu()"><i class="ph ph-list text-white text-2xl"></i></button>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden fixed inset-0 z-40 bg-slate-950/95 pt-20 px-6 backdrop-blur-md">
                <nav class="space-y-4">
                    <button onclick="switchTab('dashboard'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl bg-slate-800 text-white"><i class="ph ph-chats-circle text-xl"></i><span>助理對話</span></button>
                    <button onclick="switchTab('schedule'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-calendar-check text-xl"></i><span>行程管理</span></button>
                    <button onclick="switchTab('notes'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-notebook text-xl"></i><span>筆記/文件</span></button>
                    <button onclick="switchTab('audio'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-waveform text-xl"></i><span>錄音紀錄</span></button>
                </nav>
            </div>

            <!-- Settings Modal -->
            <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl flex flex-col max-h-[90vh]">
                    <div class="flex justify-between items-center mb-6 shrink-0"><h3 class="text-xl font-bold text-white">設定</h3><button onclick="closeSettings()"><i class="ph ph-x text-2xl text-slate-400"></i></button></div>
                    <div class="space-y-4 overflow-y-auto flex-1 pr-2 scrollbar-thin">
                        <div class="bg-gradient-to-r from-blue-900/30 to-indigo-900/30 p-4 rounded-xl border border-blue-500/50 shadow-inner space-y-4">
                            <div>
                                <label class="block text-xs text-blue-300 mb-2 font-bold flex items-center gap-2"><i class="ph-fill ph-robot"></i> 系統代理 Google Doc (搜尋/爬蟲)</label>
                                <input type="text" id="key-doc-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-xs focus:border-blue-500 outline-none mb-2" placeholder="Apps Script URL (for Agent)">
                            </div>
                            <div class="grid grid-cols-1 gap-2">
                                <div><label class="block text-xs text-emerald-300 mb-1 font-bold"><i class="ph-fill ph-notebook"></i> 隨手記事本 A URL</label><input type="text" id="key-note-doc-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-emerald-500 outline-none" placeholder="Apps Script URL (Notebook A)"></div>
                                <div><label class="block text-xs text-teal-300 mb-1 font-bold"><i class="ph-fill ph-notebook"></i> 隨手記事本 B URL</label><input type="text" id="key-note-doc-url-2" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-teal-500 outline-none" placeholder="Apps Script URL (Notebook B)"></div>
                            </div>
                            <div class="border-t border-white/10 pt-2">
                                 <label class="block text-xs text-red-300 mb-1 font-bold"><i class="ph-fill ph-upload"></i> Google Drive 上傳 URL (備份用)</label>
                                 <input type="text" id="key-drive-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-red-500 outline-none" placeholder="(選填) 雲端備份 Apps Script URL">
                            </div>
                            <div class="flex items-center justify-between mt-2"><span id="doc-monitor-status" class="text-[10px] text-slate-500">未測試</span><button onclick="testDocConnection()" class="text-[10px] bg-blue-600 px-3 py-1 rounded text-white hover:bg-blue-500 transition-colors">測試連線</button></div>
                        </div>
                        <div class="space-y-3 pt-2 pb-4 border-b border-slate-800">
                            <div><label class="block text-xs text-blue-400 mb-1">Gemini API Key</label><input type="password" id="key-gemini" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-blue-500 outline-none"></div>
                            <div><label class="block text-xs text-green-400 mb-1">SerpApi Key</label><input type="password" id="key-serpapi" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-green-500 outline-none" placeholder="Your SerpApi Key"></div>
                            <div><label class="block text-xs text-rose-400 mb-1">Groq API Key</label><input type="password" id="key-groq" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-rose-500 outline-none"></div>
                            <div><label class="block text-xs text-violet-400 mb-1">Cohere API Key</label><input type="password" id="key-cohere" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-violet-500 outline-none"></div>
                            <div><label class="block text-xs text-emerald-400 mb-1">OpenAI API Key</label><input type="password" id="key-openai" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-emerald-500 outline-none"></div>
                            <div><label class="block text-xs text-slate-300 mb-1">Grok API Key</label><input type="password" id="key-grok" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-slate-500 outline-none"></div>
                            <div class="border-t border-slate-700 pt-3 mt-2">
                                <label class="block text-xs text-amber-400 mb-1 font-bold"><i class="ph-fill ph-timer"></i> 連續語音等待秒數 (秒)</label>
                                <input type="number" id="key-voice-timeout" min="1" max="60" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-amber-500 outline-none text-slate-300" placeholder="預設: 5">
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 pt-2 flex justify-between items-center shrink-0">
                        <div class="flex space-x-2">
                            <button onclick="exportSettings()" class="flex items-center gap-1 text-xs text-blue-400 bg-blue-900/30 border border-blue-500/30 px-3 py-2 rounded-lg hover:bg-blue-800/50 transition-colors"><i class="ph-bold ph-download-simple"></i> 匯出設定</button>
                            <label for="import-settings-input" class="flex items-center gap-1 text-xs text-emerald-400 bg-emerald-900/30 border border-emerald-500/30 px-3 py-2 rounded-lg hover:bg-emerald-800/50 transition-colors cursor-pointer"><i class="ph-bold ph-upload-simple"></i> 匯入設定</label>
                            <input type="file" id="import-settings-input" accept=".json" class="hidden" onchange="importSettings(event)">
                        </div>
                        <div class="flex space-x-3"><button onclick="closeSettings()" class="px-4 py-2 text-slate-400 text-sm">取消</button><button onclick="saveKeys()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500">儲存</button></div>
                    </div>
                </div>
            </div>

            <!-- ALARM MODAL -->
            <div id="alarm-modal" class="hidden fixed inset-0 z-[60] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6">
                <div class="bg-slate-900 border border-red-500/50 rounded-2xl p-8 max-w-sm w-full text-center shadow-[0_0_50px_rgba(239,68,68,0.3)] animate-pulse">
                    <i class="ph-fill ph-alarm text-6xl text-red-500 mb-4 inline-block animate-bounce"></i>
                    <h3 class="text-2xl font-bold text-white mb-2">時間到！</h3>
                    <p id="alarm-text" class="text-lg text-slate-300 mb-8">提醒事項內容</p>
                    <button onclick="stopAlarm()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95">
                        <i class="ph-bold ph-check-circle mr-2"></i> 確 定 (停止)
                    </button>
                </div>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="view-dashboard" class="flex flex-col lg:flex-row h-full w-full relative min-h-0">
                <div class="flex-1 flex flex-col h-full min-w-0 relative">
                    <div class="p-3 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm flex justify-between items-center shrink-0 overflow-x-auto no-scrollbar">
                         <div class="flex items-center space-x-2 mr-4 shrink-0">
                            <span id="web-search-badge" class="hidden md:flex items-center space-x-1 text-[10px] bg-blue-900/30 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded-full"><i class="ph-bold ph-globe"></i><span>連網搜尋</span></span>
                            <div id="recording-status" onclick="stopAudioRecording()" class="hidden items-center space-x-2 bg-red-900/50 border border-red-500/50 px-3 py-1 rounded-full animate-pulse mr-2 cursor-pointer hover:bg-red-800/50 transition-colors" title="點擊停止錄音">
                                <div class="w-2 h-2 bg-red-500 rounded-full recording-dot"></div><span class="text-xs text-red-200 font-bold">錄音中... (點擊停止)</span>
                            </div>
                            <span id="doc-monitor-badge" class="hidden items-center space-x-1 text-[10px] bg-emerald-900/30 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded-full animate-pulse"><i class="ph-bold ph-arrows-clockwise"></i><span>Docs 監控中</span></span>
                            <button onclick="clearChatHistory()" class="text-[10px] text-slate-500 hover:text-red-400 flex items-center space-x-1 border border-slate-700 px-2 py-0.5 rounded-lg transition-colors"><i class="ph-bold ph-trash"></i><span>清空對話</span></button>
                         </div>
                         
                         <div class="flex space-x-2 ml-auto shrink-0">
                             <select id="gemini-sub-model-select" onchange="setGeminiModel(this.value)" class="bg-blue-900 border border-blue-500/50 text-blue-100 text-xs rounded-lg px-2 py-1 outline-none focus:border-blue-400 font-medium max-w-[140px] md:max-w-none">
                                 <option value="gemini-multi">⚡ 智慧切換 (Auto)</option>
                                 <optgroup label="Imagen 4.0 生成">
                                     <option value="imagen-4.0-generate-001">Imagen 4.0 Standard</option>
                                     <option value="imagen-4.0-ultra-generate-001">Imagen 4.0 Ultra</option>
                                     <option value="imagen-4.0-fast-generate-001">Imagen 4.0 Fast</option>
                                 </optgroup>
                                 <optgroup label="Gemini 3 預覽系列">
                                     <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro Preview</option>
                                     <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                                     <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 Flash-Lite</option>
                                     <option value="gemini-3.1-flash-image-preview">Gemini 3.1 Flash-Image</option>
                                     <option value="gemini-3-pro-image-preview">Gemini 3 Pro-Image</option>
                                 </optgroup>
                                 <optgroup label="Gemini 2.5 穩定系列">
                                     <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                                     <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                     <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite</option>
                                     <option value="gemini-2.5-flash-image">Gemini 2.5 Flash-Image</option>
                                 </optgroup>
                             </select>
                             <select id="grok-sub-model-select" onchange="setGrokModel(this.value)" class="hidden bg-slate-800 border border-slate-600 text-slate-300 text-xs rounded-lg px-2 py-1 outline-none focus:border-slate-400 font-medium max-w-[140px] md:max-w-none">
                                 <option value="grok-multi">⚡ 智慧切換 (Auto)</option>
                                 <optgroup label="Language models">
                                     <option value="grok-4-1-fast-reasoning">grok-4-1-fast-reasoning</option>
                                     <option value="grok-4-1-fast-non-reasoning">grok-4-1-fast-non-reasoning</option>
                                     <option value="grok-code-fast-1">grok-code-fast-1</option>
                                     <option value="grok-4-fast-reasoning">grok-4-fast-reasoning</option>
                                     <option value="grok-4-fast-non-reasoning">grok-4-fast-non-reasoning</option>
                                 </optgroup>
                                 <optgroup label="Image generation models">
                                     <option value="grok-imagine-image-pro">grok-imagine-image-pro</option>
                                     <option value="grok-imagine-image">grok-imagine-image</option>
                                 </optgroup>
                             </select>
                             <select id="main-model-select" onchange="setModel(this.value)" class="bg-slate-800 border border-slate-600 text-white text-xs rounded-lg px-3 py-1 outline-none focus:border-blue-500 font-bold tracking-wide">
                                 <option value="gemini">Gemini</option>
                                 <option value="grok">Grok</option>
                                 <option value="groq">Groq</option>
                                 <option value="cohere">Cohere</option>
                                 <option value="gpt">OpenAI</option>
                             </select>
                         </div>
                    </div>
                    
                    <!-- ★ 超大 LIVE MODE 視窗 (66% 畫面佔比) -->
                    <div id="live-video-container" class="hidden absolute top-0 left-0 w-full h-[66vh] bg-slate-950 border-b-2 border-red-500 shadow-[0_10px_40px_rgba(239,68,68,0.2)] z-30 flex-col fade-in">
                        <div class="bg-red-600 text-white text-xs font-bold text-center py-2 tracking-widest flex items-center justify-center gap-2 relative z-10 shrink-0">
                            <div class="w-2.5 h-2.5 bg-white rounded-full animate-pulse"></div> LIVE 影像對話模式
                            <button onclick="toggleLiveMode(true)" class="absolute right-4 p-1 bg-red-800 rounded-full hover:bg-red-700 transition"><i class="ph-bold ph-x"></i></button>
                        </div>
                        <video id="live-video-preview" autoplay playsinline muted class="w-full h-full object-cover"></video>
                    </div>

                    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-thin scrollbar-thumb-slate-700 pt-6"></div>
                    
                    <!-- ★ LINE 風格打字區重構 -->
                    <div class="p-2.5 bg-slate-900 border-t border-slate-800 shrink-0 z-40 relative">
                        
                        <div id="chat-file-preview-container" class="hidden absolute -top-16 left-4 inline-flex items-center bg-slate-800 p-2 rounded-lg border border-slate-700 shadow-md">
                            <img id="chat-image-preview" src="" class="h-10 w-auto rounded hidden mr-2">
                            <div id="chat-file-icon-wrapper" class="hidden flex items-center justify-center bg-blue-900/50 w-10 h-10 rounded mr-2"><i class="ph-fill ph-file text-xl text-blue-400"></i></div>
                            <span id="chat-file-name" class="text-xs text-slate-300 max-w-[150px] truncate">filename</span>
                            <button onclick="clearChatFile()" class="absolute -top-2 -right-2 bg-slate-700 border border-slate-600 text-slate-300 hover:text-red-400 rounded-full p-1 shadow-lg transition-colors"><i class="ph-bold ph-x text-[10px]"></i></button>
                        </div>
                        <input type="file" id="audio-analyze-input" accept="*/*" class="hidden" onchange="handleAudioAnalyzeSelect(event)">
                        
                        <!-- Floating Plus Menu -->
                        <div id="plus-menu" class="hidden absolute bottom-[70px] left-3 bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-2xl z-50 flex gap-5 text-center slide-up">
                            <label for="chat-file-input" class="flex flex-col items-center gap-1.5 cursor-pointer group">
                                <div class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center text-emerald-400 group-active:scale-95 transition-transform"><i class="ph-bold ph-paperclip text-2xl"></i></div>
                                <span class="text-[10px] text-slate-300 font-medium">附件檔案</span>
                            </label>
                            <button id="live-menu-btn" onclick="toggleLiveMode()" class="flex flex-col items-center gap-1.5 group">
                                <div id="live-menu-icon-bg" class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center transition-all group-active:scale-95"><i id="live-menu-icon" class="ph-bold ph-camera text-2xl text-slate-300"></i></div>
                                <span class="text-[10px] text-slate-300 font-medium">LIVE影像</span>

        const DB_NAME = 'NovaDB'; const DB_VERSION = 2; let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) { console.warn("瀏覽器不支援 IndexedDB"); resolve(null); return; }
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    db = e.target.result;
                    ['messages','notes','todos','audioRecords'].forEach(s => { if(!db.objectStoreNames.contains(s)) db.createObjectStore(s, {keyPath:'id'}); });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e.target.error);
            });
        }
        function loadStoreFromDB(store) { return new Promise((resolve) => { if (!db) return resolve([]); try { const req = db.transaction(store, 'readonly').objectStore(store).getAll(); req.onsuccess = () => resolve(req.result || []); req.onerror = () => resolve([]); } catch(e) { resolve([]); } }); }
        function saveToDB(store, item) { if (db) try { db.transaction(store, 'readwrite').objectStore(store).put(item); } catch(e) {} }
        function deleteFromDB(store, id) { if (db) try { db.transaction(store, 'readwrite').objectStore(store).delete(id); } catch(e) {} }
        function clearStoreDB(store) { if (db) try { db.transaction(store, 'readwrite').objectStore(store).clear(); } catch(e) {} }

        const appState = {
            currentModel: 'gemini', grokModel: 'grok-multi', geminiModel: 'gemini-multi', chatFile: null,

            isLiveMode: false, isTranslateMode: false,

        function getTime() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
        
        function formatMessage(text) { 
            if (!text) return ''; let images = [];
            let safe = text.replace(/!\[(.*?)\]\((https?:\/\/[^\s<]+)\)/g, function(m, alt, url) { images.push({alt, url}); return `___IMG_${images.length - 1}___`; }).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            safe = safe.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>').replace(/\[([^\]]+)\]\((https?:\/\/[^\s<]+?)\)|(https?:\/\/[^\s<)\]]+)/g, function(m, t, u1, u2) { let url = (u1||u2).replace(/&amp;/g, "&"); return `<a href="${url}" target="_blank" class="text-blue-400 underline break-all">${t||url}</a>`; });
            safe = safe.replace(/___IMG_(\d+)___/g, function(m, id) { const img = images[id]; const realUrl = img.url.replace(/&amp;/g, "&"); return `<div class="mt-3 relative group max-w-sm w-full"><img src="${realUrl}" alt="${escapeHtml(img.alt)}" class="rounded-lg border border-slate-700/50 shadow-sm w-full object-contain bg-slate-900"><a href="${realUrl}" target="_blank" download="image.png" class="absolute top-2 right-2 bg-blue-600/90 hover:bg-blue-500 text-white p-2 rounded-lg text-xs opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md"><i class="ph-bold ph-download-simple"></i> 下載</a></div>`; });
            return safe.replace(/\n/g, '<br>');

        function escapeHtml(t){return t?t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):""}
        function showToast(msg) { const t = document.getElementById("toast"); t.innerText = msg; t.className = "show"; setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000); }

        function speakText(text) {
            if (!appState.isLiveMode && !appState.isTranslateMode) return; 
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/[*_#`\[\]]/g, '').replace(/(https?:\/\/[^\s]+)/g, "網址連結");
                let utterance = new SpeechSynthesisUtterance(cleanText); utterance.lang = 'zh-TW';
                if (appState.isTranslateMode && /^[a-zA-Z\s.,?!'"]+$/.test(cleanText.substring(0, 30))) utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }

        window.copyDeepLink = function(text) {
            const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; document.body.appendChild(ta); ta.focus(); ta.select();
            try { document.execCommand('copy'); showToast("✅ 連結已複製！"); } catch (err) { showToast("❌ 複製失敗"); } document.body.removeChild(ta);
        };
        
        function base64ToBlob(b64) { const i = b64.indexOf(','); const m = b64.slice(5, i).split(';')[0]; const b = atob(b64.slice(i + 1)); const ab = new ArrayBuffer(b.length); const ia = new Uint8Array(ab); for (let j=0; j<b.length; j++) ia[j] = b.charCodeAt(j); return new Blob([ab], {type: m}); }

        window.downloadLocalAudio = function(id, type) {
            let r = type === 'record' ? appState.audioRecords.find(x => String(x.id) === String(id)) : appState.notes.find(x => String(x.id) === String(id));
            if (!r || !r.audioData) return alert("找不到本地音檔資料");
            const d = new Date(Number(id)); const fname = `NOVA_Audio_${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}${d.getFullYear()}_${d.toTimeString().split(' ')[0].replace(/:/g,'')}.weba`;
            try { const url = URL.createObjectURL(base64ToBlob(r.audioData)); const a = document.createElement('a'); a.style.display = 'none'; a.href = url; a.download = fname; document.body.appendChild(a); a.click(); setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000); showToast(`✅ 已開始下載：${fname}`); } catch(e) { alert("下載失敗：" + e.message); }
        };

        function togglePlusMenu(e, forceClose = false) {

        async function toggleLiveMode() {
            appState.isLiveMode = !appState.isLiveMode;
            const videoContainer = document.getElementById('live-video-container'); const videoEl = document.getElementById('live-video-preview');
            
            if (appState.isLiveMode) {
                try {
                    if (appState.isTranslateMode) toggleTranslateMode(); // Force off translate
                    appState.isContinuous = false; // reset state to ensure clean start
                    
                    liveVideoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    videoEl.srcObject = liveVideoStream;
                    videoContainer.classList.remove('hidden'); videoContainer.classList.add('flex');
                    appState.voiceTimeout = 2;
                    addMessage("📸 **LIVE 影像模式已啟動！**\nAI 現在可以看見您的鏡頭畫面了。系統已自動開啟語音朗讀，請直接說話。", 'system');
                    
                    appState.isContinuous = true; chatInitialInput = document.getElementById('user-input').value;
                    try { recognition.start(); } catch(e){}
                } catch(e) {
                    appState.isLiveMode = false; alert("無法存取相機: " + e.message);
                }
            } else {
                if (liveVideoStream) { liveVideoStream.getTracks().forEach(t=>t.stop()); liveVideoStream = null; }
                videoContainer.classList.add('hidden'); videoContainer.classList.remove('flex');
                appState.voiceTimeout = parseInt(localStorage.getItem('nova_voice_timeout')) || 5;
                addMessage("📸 LIVE 影像模式已關閉。", 'system');
                
                appState.isContinuous = false; recognition.stop(); window.speechSynthesis.cancel();
            }
            updateVoiceUI(); togglePlusMenu(null, true);
        }

                appState.isContinuous = true; chatInitialInput = document.getElementById('user-input').value;

            } else {

        function handleChatFileSelect(e) {
            const file = e.target.files[0]; if (!file) return;
            if (file.size > 20 * 1024 * 1024) { alert("檔案過大，請上傳小於 20MB 的檔案以確保穩定性。"); e.target.value = ''; return; }
            const isText = file.type.startsWith('text/') || !!file.name.match(/\.(txt|csv|md|json|js|html|css|py|cpp|c|java)$/i);
            const isImage = file.type.startsWith('image/');
            const isMedia = file.type.startsWith('audio/') || file.type.startsWith('video/') || file.type === 'application/pdf' || !!file.name.match(/\.(pdf|mp3|wav|mp4|webm|m4a)$/i);
            let category = isImage ? 'image' : (isText ? 'text' : (isMedia ? 'media' : 'unknown'));
            if (category === 'unknown') category = 'media'; 
            if (isText && file.size > 2 * 1024 * 1024) alert("提醒：純文字檔案較大，可能超出 AI 分析上限，建議擷取重點上傳。");

            let mimeType = file.type || 'application/octet-stream';
            const filenameLower = file.name.toLowerCase();
            if (filenameLower.endsWith('.webm')) mimeType = 'audio/webm';
            else if (filenameLower.endsWith('.mp3')) mimeType = 'audio/mp3';
            else if (filenameLower.endsWith('.wav')) mimeType = 'audio/wav';
            else if (filenameLower.endsWith('.m4a')) mimeType = 'audio/m4a';
            else if (filenameLower.endsWith('.mp4')) mimeType = 'video/mp4';
            else if (filenameLower.endsWith('.pdf')) mimeType = 'application/pdf';

            const reader = new FileReader();
            reader.onload = function(evt) { appState.chatFile = { category: category, data: evt.target.result, mime: mimeType, name: file.name }; showFilePreview(file.name, isImage, evt.target.result); };
            if (category === 'text') reader.readAsText(file); else reader.readAsDataURL(file);
            e.target.value = ''; 
        }

                    }
                }

        async function tryGetLocation(silent=false) {

                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        appState.lastLat = p.coords.latitude; appState.lastLon = p.coords.longitude;
                        fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&localityLanguage=zh-tw`)
                            .then(r=>r.json()).then(d => {

        async function startMeetingRecording(context = 'record') {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { addMessage("⚠️ 瀏覽器不支援錄音", 'system'); return; }
            appState.recordingContext = context; switchTab('dashboard'); appState.currentAudioTranscript = "";
            
            if (appState.activeMediaTracks) appState.activeMediaTracks.forEach(track => { try{track.stop();}catch(e){} });
            appState.activeMediaTracks = [];

            let micStream = null; let sysStream = null; let mixedStream = null;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            try {
                const micConstraints = { audio: true };
                micStream = await navigator.mediaDevices.getUserMedia(micConstraints);
                appState.activeMediaTracks.push(...micStream.getTracks());

                if (!isMobile && navigator.mediaDevices.getDisplayMedia) {
                    try {
                        addMessage("💡 提示：請在彈出的視窗中選擇【分頁】或【整個螢幕】，並務必勾選左下角的【分享分頁音訊】或【分享系統音訊】，才能成功錄下會議中別人的聲音喔！", 'system');
                        sysStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                        appState.activeMediaTracks.push(...sysStream.getTracks());
                        sysStream.getVideoTracks().forEach(track => { track.stop(); });
                    } catch (sysErr) { addMessage("⚠️ 未取得系統音訊授權或取消操作，將為您降級為僅錄製麥克風聲音。", 'system'); }
                } else if (isMobile) {
                    addMessage("⚠️ **系統限制提醒**：手機瀏覽器基於隱私安全，禁止側錄內部系統聲音。\n\n💡 若您要在手機上錄製會議，請**拔下耳機，改用手機擴音播放**，系統會透過麥克風一併收錄會議聲音。為解決前版畫面卡頓與提示音干擾問題，已為您切換回標準穩定收音模式！", 'system');
                }

                if (sysStream && sysStream.getAudioTracks().length > 0) {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    const audioCtx = new AudioContextClass(); appState.recordingAudioCtx = audioCtx;
                    const dest = audioCtx.createMediaStreamDestination();
                    
                    if (micStream.getAudioTracks().length > 0) audioCtx.createMediaStreamSource(micStream).connect(dest);
                    if (sysStream.getAudioTracks().length > 0) audioCtx.createMediaStreamSource(sysStream).connect(dest);
                    
                    mixedStream = dest.stream;
                    let titleMsg = appState.recordingContext === 'note' ? "🎙️ 開始【雙軌語音筆記】... (已成功混合麥克風與系統聲音，點擊紅燈結束)" : "🎙️ 開始【雙軌會議錄音】... (已成功混合麥克風與系統聲音，點擊紅燈結束)";
                    addMessage(titleMsg, 'system');
                } else {
                    mixedStream = micStream;
                    let titleMsg = appState.recordingContext === 'note' ? "🎙️ 開始錄製語音筆記... (僅麥克風環境音，點擊紅燈結束)" : "🎙️ 開始錄音... (僅麥克風環境音，點擊紅燈結束)";
                    addMessage(titleMsg, 'system');
                }

                let actualMimeType = 'audio/webm';
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) actualMimeType = 'audio/webm;codecs=opus';
                else if (MediaRecorder.isTypeSupported('audio/mp4')) actualMimeType = 'audio/mp4';
                
                mediaRecorder = new MediaRecorder(mixedStream, { mimeType: actualMimeType }); audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = uploadAudioRecording; mediaRecorder.start();
                
                document.getElementById('recording-status').classList.remove('hidden'); document.getElementById('recording-status').classList.add('flex');
                
                if (recognition && !appState.isListening) { chatInitialInput = document.getElementById('user-input').value; recognition.start(); }

            } catch (err) { addMessage("⚠️ 無法啟動錄音，請檢查麥克風權限或瀏覽器設定。", 'system'); console.error(err); }
        }

        async function startAudioRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { addMessage("⚠️ 瀏覽器不支援錄音", 'system'); return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = []; appState.currentAudioTranscript = ""; 
                appState.activeMediaTracks = stream.getTracks();

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = uploadAudioRecording; mediaRecorder.start();
                
                document.getElementById('recording-status').classList.remove('hidden'); document.getElementById('recording-status').classList.add('flex');
                let titleMsg = appState.recordingContext === 'note' ? "🎙️ 開始錄製「語音筆記」... (點擊上方紅燈停止)" : "🎙️ 開始錄音... (僅麥克風，點擊上方紅燈停止)";
                addMessage(titleMsg, 'system');
                if (recognition && !appState.isListening) { chatInitialInput = document.getElementById('user-input').value; recognition.start(); }
            } catch (err) { addMessage("⚠️ 無法啟動錄音，請檢查麥克風權限", 'system'); }
        }

        function stopAudioRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop(); 
                if (appState.activeMediaTracks) { appState.activeMediaTracks.forEach(track => { try{track.stop();}catch(e){} }); appState.activeMediaTracks = []; }
                if (appState.recordingAudioCtx) { try { appState.recordingAudioCtx.close(); } catch(e){} appState.recordingAudioCtx = null; }
                if (recognition) { try { recognition.abort(); } catch(e){} }
                document.getElementById('recording-status').classList.add('hidden'); document.getElementById('recording-status').classList.remove('flex');
                addMessage("⏹️ 錄音結束，正在處理並儲存至本地端...", 'system');
            } else { document.getElementById('recording-status').classList.add('hidden'); document.getElementById('recording-status').classList.remove('flex'); }
        }
        
        async function uploadAudioRecording() {
            if (audioChunks.length === 0) { addMessage(`⚠️ 錄音失敗：未擷取到音訊內容`, 'system'); appState.recordingContext = 'default'; appState.currentAudioTranscript = ""; return; }

            const actualMimeType = (mediaRecorder && mediaRecorder.mimeType) ? mediaRecorder.mimeType : 'audio/webm';
            const audioBlob = new Blob(audioChunks, { type: actualMimeType });
            
            const dateObj = new Date(); const month = String(dateObj.getMonth() + 1).padStart(2, '0'); const day = String(dateObj.getDate()).padStart(2, '0'); const year = dateObj.getFullYear(); const timeStr = dateObj.toTimeString().split(' ')[0].replace(/:/g, '');
            const filename = `NOVA_Audio_${month}${day}${year}_${timeStr}.weba`; const displayDate = dateObj.toLocaleString(); const recordId = Date.now();
            let finalDriveUrl = "";

            const reader = new FileReader(); reader.readAsDataURL(audioBlob);
            const base64dataWithPrefix = await new Promise((resolve, reject) => { reader.onloadend = () => resolve(reader.result); reader.onerror = reject; });
            const capturedTranscript = appState.currentAudioTranscript ? appState.currentAudioTranscript.trim() : "";
            
            if (appState.recordingContext === 'note') {
                const newNote = { id: recordId, title: `語音筆記 ${timeStr}`, content: capturedTranscript ? `[即時辨識草稿]\n${capturedTranscript}` : '[無語音內容]', date: displayDate, type: 'audio', driveUrl: "", transcript: capturedTranscript, audioData: base64dataWithPrefix, mimeType: actualMimeType, filename: filename, images: [], image: null };
                appState.notes.unshift(newNote); saveToDB('notes', newNote); addMessage(`📝 語音筆記已安全儲存至本地「筆記/文件」分頁。`, 'system'); renderNotes();
            } else {
                const newRecord = { id: recordId, title: `錄音紀錄 ${timeStr}`, date: displayDate, filename: filename, driveUrl: "", transcript: capturedTranscript, audioData: base64dataWithPrefix, mimeType: actualMimeType };
                appState.audioRecords.unshift(newRecord); saveToDB('audioRecords', newRecord); addMessage(`📼 錄音已安全儲存至本地「錄音紀錄」分頁。`, 'system'); renderAudioRecords();
            }

            if (appState.driveUrl) {
                addMessage(`☁️ 正在與 Google Drive 同步中，請稍候...`, 'system');
                try {
                    const base64data = base64dataWithPrefix.split(',')[1];
                    const payload = JSON.stringify({ filename: filename, mimeType: actualMimeType, data: base64data });
                    const res = await fetch(appState.driveUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: payload });
                    if (res.ok) {
                        const resText = await res.text(); try { const resJson = JSON.parse(resText); finalDriveUrl = resJson.url || resJson.link || resText; } catch(e) { finalDriveUrl = resText; }
                        addMessage(`✅ **雲端同步成功！** 檔案已確實存入 Google Drive。\n連結: ${finalDriveUrl}`, 'system');
                        if(appState.recordingContext === 'note'){ const n = appState.notes.find(x => String(x.id) === String(recordId)); if(n) { n.driveUrl = finalDriveUrl; saveToDB('notes', n); renderNotes(); } } 
                        else { const r = appState.audioRecords.find(x => String(x.id) === String(recordId)); if(r) { r.driveUrl = finalDriveUrl; saveToDB('audioRecords', r); renderAudioRecords(); } }
                    } else { throw new Error('伺服器回傳狀態異常: HTTP ' + res.status); }
                } catch (e) { 
                    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
                        finalDriveUrl = "https://drive.google.com/";
                        addMessage(`✅ **雲端同步成功！** \n*(註: 由於瀏覽器安全攔截，無法取得直接連結，但檔案已成功送達您的 Google Drive)*`, 'system');
                        if(appState.recordingContext === 'note'){ const n = appState.notes.find(x => String(x.id) === String(recordId)); if(n) { n.driveUrl = finalDriveUrl; saveToDB('notes', n); renderNotes(); } } 
                        else { const r = appState.audioRecords.find(x => String(x.id) === String(recordId)); if(r) { r.driveUrl = finalDriveUrl; saveToDB('audioRecords', r); renderAudioRecords(); } }
                    } else { addMessage(`❌ **雲端同步失敗**：${e.message}\n請確認您的 Apps Script 權限有設為「所有人」。`, 'system'); }
                }
            }
            appState.recordingContext = 'default'; appState.currentAudioTranscript = "";
        }

        async function searchViaSerpApi(query) {

                const controller = new AbortController(); const id = setTimeout(() => controller.abort(), timeout);
                try { const response = await fetch(url, { ...fetchOpts, signal: controller.signal }); clearTimeout(id); return response; } 
                catch (error) { clearTimeout(id); throw new Error(error.name === 'AbortError' ? '連線逾時' : error.message); }
            };
            try {
                const key = appState.keys[model]; if(!key) throw new Error(`未填寫 API Key`);
                const chatHistory = appState.messages.filter(m => m.sender === 'user' || m.sender === 'ai').slice(-6);
                const isImageIntent = /^(畫|生成|產生|draw|generate)\s*(一張|一個|圖片|照片|圖|image|photo)/i.test(userText.trim());

                if(model === 'gemini') {
                    let selectedModelName = appState.geminiModel; let isAutoRouted = false;
                    if (isImageIntent && !selectedModelName.includes('imagen') && !selectedModelName.includes('image')) { selectedModelName = 'imagen-4.0-generate-001'; isAutoRouted = true; } 
                    else if (selectedModelName === 'gemini-multi') {

                    }

                    if (selectedModelName.includes('imagen')) {
                        let apiVersion = selectedModelName.includes('4.0') ? 'v1alpha' : 'v1beta';

                        let data = await res.json();
                        if (!res.ok && data.error?.code === 404 && selectedModelName.includes('4.0')) {
                            selectedModelName = 'imagen-3.0-generate-001';
                            res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModelName}:predict?key=${key}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ instances: [{ prompt: userText }] }) });

                        }
                        if (!res.ok || !data.predictions?.[0]?.bytesBase64Encoded) throw new Error(data.error?.message || "無法生成圖片(可能觸發安全審查)");

                        if (m === [...chatHistory, { file: options.file }].slice(-1)[0] && m.file && m.file.category !== 'text') {
                             partsToAdd.push({ inlineData: { mimeType: m.file.mime, data: m.file.data.split(',')[1] } });
                        }
                        if (role === currentRole) currentParts.push(...partsToAdd); else { if (currentRole) contents.push({ role: currentRole, parts: currentParts }); currentRole = role; currentParts = [...partsToAdd]; }
                    }
                    if (currentRole) contents.push({ role: currentRole, parts: currentParts });

                    const payload = { contents: contents, generationConfig: { temperature: 0.7, maxOutputTokens: 8192 } };
                    if ((appState.isSearchEnabled || options.enableSearch) && !options.disableSearch && !options.file) payload.tools = [{ google_search: {} }];
                    
                    let res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/${apiVersion}/models/${selectedModelName}:generateContent?key=${key}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        let text = e.results[i][0].transcript;
                        if (text.length >= 4 && text.length % 2 === 0 && text.substring(0, text.length / 2) === text.substring(text.length / 2)) text = text.substring(0, text.length / 2); 
                        if (e.results[i].isFinal) finalT += text; else interimT += text;
                    }
                    if (finalT) noteInitialInput += (noteInitialInput ? "\n" : "") + finalT;
                    const el = document.getElementById('doc-input-main'); el.value = (noteInitialInput + (interimT ? "\n" + interimT : "")).trim();
                    if (noteVoiceTimer) clearTimeout(noteVoiceTimer); noteVoiceTimer = setTimeout(() => { appState.noteVoiceActive = false; noteRecognition.stop(); }, appState.voiceTimeout * 1000);
                };
            }
            tryGetLocation(true); updateModelUI(); setInterval(() => {
                const now = Date.now();
                appState.todos.forEach(t => {
                    if (t.alertTime && t.alertEnabled !== false && !t.alerted && t.alertTime <= now && !t.done) {
                        t.alerted = true; saveToDB('todos', t); renderTodos();
                        document.getElementById('alarm-text').innerText = t.text; document.getElementById('alarm-modal').classList.remove('hidden'); document.getElementById('alarm-modal').classList.add('flex');
                        try {
                            alarmAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            const osc = alarmAudioCtx.createOscillator(); const gain = alarmAudioCtx.createGain();
                            osc.type = 'sine'; osc.frequency.setValueAtTime(880, alarmAudioCtx.currentTime); osc.connect(gain); gain.connect(alarmAudioCtx.destination);
                            osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, alarmAudioCtx.currentTime + 0.5);
                        } catch(e) {}
                    }
                });
            }, 10000);
            window.stopAlarm = function() { document.getElementById('alarm-modal').classList.add('hidden'); document.getElementById('alarm-modal').classList.remove('flex'); if (alarmAudioCtx) { alarmAudioCtx.close(); alarmAudioCtx = null; } };
        };
    </script>
</body>
