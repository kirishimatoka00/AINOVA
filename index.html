<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA 21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 925: '#0f172a' } },
                    animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'spin-slow': 'spin 2s linear infinite' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .dot-flashing {
            position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff;
            animation: dot-flashing 1s infinite linear alternate; animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ""; display: inline-block; position: absolute; top: 0; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff; animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before { left: -10px; animation-delay: 0s; }
        .dot-flashing::after { left: 10px; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: #9880ff; } 50%, 100% { background-color: rgba(152, 128, 255, 0.2); } }
        /* Enhanced content styling for Docs content */
        .msg-content a, #doc-content-area a { color: #60a5fa; text-decoration: underline; word-break: break-all; cursor: pointer; }
        .msg-content img, #doc-content-area img { max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.1); }
        .msg-content p, #doc-content-area div { margin-bottom: 0.5em; line-height: 1.6; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        .msg-group:hover .msg-actions { opacity: 1; }
        .msg-actions { opacity: 0; transition: opacity 0.2s; }
        /* Recording Pulse */
        @keyframes recordPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .recording-dot { animation: recordPulse 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans overflow-hidden selection:bg-blue-500/30">

    <div class="flex h-[100dvh] w-full">
        <!-- Sidebar -->
        <aside class="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800 p-6 flex-shrink-0">
            <div class="flex items-center space-x-3 mb-10 px-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-infinity text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">NOVA 21</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">Ultimate Edition</p>
                </div>
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg transition-all"><i class="ph ph-chats-circle text-xl"></i><span class="font-medium">助理對話</span></button>
                <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-calendar-check text-xl"></i><span class="font-medium">行程管理</span></button>
                <button onclick="switchTab('notes')" id="nav-notes" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-notebook text-xl"></i><span class="font-medium">筆記/文件</span></button>
            </nav>
            <div class="mt-auto space-y-3">
                <button onclick="openSettings()" class="flex items-center space-x-2 text-xs text-slate-500 hover:text-slate-300 w-full px-2"><i class="ph ph-gear"></i><span>設定 & API</span></button>
                <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
                    <div class="flex items-center space-x-2"><i id="status-icon" class="ph-fill ph-globe text-blue-400 text-lg"></i><span id="status-name" class="font-bold text-sm">Gemini</span></div>
                    <p id="model-version-display" class="text-[10px] text-slate-500 mt-1">Ready</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-slate-950 overflow-hidden min-h-0">
            <!-- Mobile Header -->
            <div class="md:hidden flex items-center justify-between p-3 bg-slate-900 border-b border-slate-800 z-30 shrink-0">
                <div class="flex items-center space-x-2"><i class="ph-bold ph-infinity text-blue-500 text-xl"></i><span class="font-bold text-white">Nova 21</span></div>
                <div class="flex items-center space-x-2 bg-slate-800/50 px-2 py-1 rounded-lg border border-slate-700/50 cursor-pointer active:scale-95 transition-transform" onclick="cycleManualLocation()">
                    <i id="mobile-weather-icon" class="ph-fill ph-navigation-arrow text-blue-400"></i><span id="mobile-weather-temp" class="text-xs font-bold text-white">更新</span>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="openSettings()"><i class="ph ph-gear text-slate-400 text-xl"></i></button>
                    <button onclick="toggleMobileMenu()"><i class="ph ph-list text-white text-2xl"></i></button>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden fixed inset-0 z-40 bg-slate-950/95 pt-20 px-6 backdrop-blur-md">
                <nav class="space-y-4">
                    <button onclick="switchTab('dashboard'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl bg-slate-800 text-white"><i class="ph ph-chats-circle text-xl"></i><span>助理對話</span></button>
                    <button onclick="switchTab('schedule'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-calendar-check text-xl"></i><span>行程管理</span></button>
                    <button onclick="switchTab('notes'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-notebook text-xl"></i><span>筆記/文件</span></button>
                </nav>
            </div>

            <!-- Settings Modal -->
            <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl flex flex-col max-h-[90vh]">
                    <div class="flex justify-between items-center mb-6 shrink-0"><h3 class="text-xl font-bold text-white">設定</h3><button onclick="closeSettings()"><i class="ph ph-x text-2xl text-slate-400"></i></button></div>
                    <div class="space-y-4 overflow-y-auto flex-1 pr-2">
                        
                        <!-- Docs Monitor Section -->
                        <div class="bg-gradient-to-r from-blue-900/30 to-indigo-900/30 p-4 rounded-xl border border-blue-500/50 shadow-inner space-y-4">
                            <div>
                                <label class="block text-xs text-blue-300 mb-2 font-bold flex items-center gap-2"><i class="ph-fill ph-robot"></i> 系統代理 Google Doc (搜尋/爬蟲)</label>
                                <input type="text" id="key-doc-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-xs focus:border-blue-500 outline-none mb-2" placeholder="Apps Script URL (for Agent)">
                            </div>
                            
                            <div class="grid grid-cols-1 gap-2">
                                <div>
                                    <label class="block text-xs text-emerald-300 mb-1 font-bold"><i class="ph-fill ph-notebook"></i> 隨手記事本 A URL</label>
                                    <input type="text" id="key-note-doc-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-emerald-500 outline-none" placeholder="Apps Script URL (Notebook A)">
                                </div>
                                <div>
                                    <label class="block text-xs text-teal-300 mb-1 font-bold"><i class="ph-fill ph-notebook"></i> 隨手記事本 B URL</label>
                                    <input type="text" id="key-note-doc-url-2" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-teal-500 outline-none" placeholder="Apps Script URL (Notebook B)">
                                </div>
                            </div>

                            <div class="border-t border-white/10 pt-2">
                                 <label class="block text-xs text-red-300 mb-1 font-bold"><i class="ph-fill ph-upload"></i> Google Drive 上傳 URL (錄音用)</label>
                                 <input type="text" id="key-drive-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-red-500 outline-none" placeholder="Apps Script URL (Drive Upload)">
                            </div>

                            <div class="flex items-center justify-between mt-2">
                                <span id="doc-monitor-status" class="text-[10px] text-slate-500">未測試</span>
                                <button onclick="testDocConnection()" class="text-[10px] bg-blue-600 px-3 py-1 rounded text-white hover:bg-blue-500 transition-colors">測試連線</button>
                            </div>
                        </div>
                        <div class="space-y-3 pt-2 pb-4 border-b border-slate-800">
                            <div><label class="block text-xs text-blue-400 mb-1">Gemini API Key</label><input type="password" id="key-gemini" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-blue-500 outline-none"></div>
                            <div><label class="block text-xs text-green-400 mb-1">SerpApi Key</label><input type="password" id="key-serpapi" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-green-500 outline-none" placeholder="Your SerpApi Key"></div>
                            <div><label class="block text-xs text-rose-400 mb-1">Groq API Key</label><input type="password" id="key-groq" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-rose-500 outline-none"></div>
                            <div><label class="block text-xs text-violet-400 mb-1">Cohere API Key</label><input type="password" id="key-cohere" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-violet-500 outline-none"></div>
                            <div><label class="block text-xs text-emerald-400 mb-1">OpenAI API Key</label><input type="password" id="key-openai" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-emerald-500 outline-none"></div>
                            <div><label class="block text-xs text-slate-300 mb-1">Grok API Key</label><input type="password" id="key-grok" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-slate-500 outline-none"></div>
                        </div>
                    </div>
                    <!-- Export / Import / Save controls in Footer -->
                    <div class="mt-4 pt-2 flex justify-between items-center shrink-0">
                        <div class="flex space-x-2">
                            <button onclick="exportSettings()" class="flex items-center gap-1 text-xs text-blue-400 bg-blue-900/30 border border-blue-500/30 px-3 py-2 rounded-lg hover:bg-blue-800/50 transition-colors"><i class="ph-bold ph-download-simple"></i> 匯出設定</button>
                            <button onclick="triggerImportSettings()" class="flex items-center gap-1 text-xs text-emerald-400 bg-emerald-900/30 border border-emerald-500/30 px-3 py-2 rounded-lg hover:bg-emerald-800/50 transition-colors"><i class="ph-bold ph-upload-simple"></i> 匯入設定</button>
                            <input type="file" id="import-settings-input" accept=".json" class="hidden" onchange="importSettings(event)">
                        </div>
                        <div class="flex space-x-3">
                            <button onclick="closeSettings()" class="px-4 py-2 text-slate-400 text-sm">取消</button>
                            <button onclick="saveKeys()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500">儲存</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ALARM MODAL -->
            <div id="alarm-modal" class="hidden fixed inset-0 z-[60] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6">
                <div class="bg-slate-900 border border-red-500/50 rounded-2xl p-8 max-w-sm w-full text-center shadow-[0_0_50px_rgba(239,68,68,0.3)] animate-pulse">
                    <i class="ph-fill ph-alarm text-6xl text-red-500 mb-4 inline-block animate-bounce"></i>
                    <h3 class="text-2xl font-bold text-white mb-2">時間到！</h3>
                    <p id="alarm-text" class="text-lg text-slate-300 mb-8">提醒事項內容</p>
                    <button onclick="stopAlarm()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95">
                        <i class="ph-bold ph-check-circle mr-2"></i> 確 定 (停止)
                    </button>
                </div>
            </div>

            <!-- SOS MODAL -->
            <div id="sos-modal" class="hidden fixed inset-0 z-[70] bg-red-950/95 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center">
                <i class="ph-fill ph-warning-circle text-7xl text-red-500 mb-4 animate-pulse"></i>
                <h2 id="sos-title" class="text-3xl font-bold text-white mb-2">緊急救援觸發</h2>
                <p class="text-lg text-red-200 mb-2">將撥打當地專線: <span id="sos-number" class="font-bold text-3xl text-white tracking-widest"></span></p>
                <p class="text-sm text-slate-400 mb-8">並發送包含座標之求救簡訊</p>
                <div class="text-9xl font-bold text-white mb-8" id="sos-countdown">10</div>
                
                <div class="w-full max-w-xs space-y-3">
                    <button onclick="setSOSDrillMode()" id="sos-drill-btn" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95">
                        <i class="ph-bold ph-shield-check mr-2"></i>切換為演習模式
                    </button>
                    <button onclick="cancelSOS()" class="w-full bg-slate-800 border border-slate-600 hover:bg-slate-700 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95">
                        <i class="ph-bold ph-x mr-2"></i>取消 (Cancel)
                    </button>
                </div>
            </div>

            <div id="view-dashboard" class="flex flex-col lg:flex-row h-full w-full relative min-h-0">
                <div class="flex-1 flex flex-col h-full min-w-0 relative">
                    <div class="p-3 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm flex justify-between items-center shrink-0 overflow-x-auto no-scrollbar">
                         <div class="flex items-center space-x-2 mr-4 shrink-0">
                            <span id="web-search-badge" class="hidden md:flex items-center space-x-1 text-[10px] bg-blue-900/30 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded-full"><i class="ph-bold ph-globe"></i><span>連網搜尋</span></span>
                            <!-- Recording Indicator -->
                            <div id="recording-status" class="hidden items-center space-x-2 bg-red-900/50 border border-red-500/50 px-3 py-1 rounded-full animate-pulse mr-2">
                                <div class="w-2 h-2 bg-red-500 rounded-full recording-dot"></div>
                                <span class="text-xs text-red-200 font-bold">錄音中...</span>
                            </div>
                            <span id="doc-monitor-badge" class="hidden items-center space-x-1 text-[10px] bg-emerald-900/30 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded-full animate-pulse"><i class="ph-bold ph-arrows-clockwise"></i><span>Docs 監控中</span></span>
                            <button onclick="clearChatHistory()" class="text-[10px] text-slate-500 hover:text-red-400 flex items-center space-x-1 border border-slate-700 px-2 py-0.5 rounded-lg transition-colors"><i class="ph-bold ph-trash"></i><span>清空對話</span></button>
                         </div>
                         
                         <!-- Dropdown Model Selection -->
                         <div class="flex space-x-2 ml-auto shrink-0">
                             <!-- Grok Sub-model Selector -->
                             <select id="grok-sub-model-select" onchange="setGrokModel(this.value)" class="hidden bg-slate-800 border border-slate-600 text-slate-300 text-xs rounded-lg px-2 py-1 outline-none focus:border-blue-500 font-medium max-w-[140px] md:max-w-none">
                                 <optgroup label="Language models">
                                     <option value="grok-4-1-fast-reasoning">grok-4-1-fast-reasoning</option>
                                     <option value="grok-4-1-fast-non-reasoning">grok-4-1-fast-non-reasoning</option>
                                     <option value="grok-code-fast-1">grok-code-fast-1</option>
                                     <option value="grok-4-fast-reasoning">grok-4-fast-reasoning</option>
                                     <option value="grok-4-fast-non-reasoning">grok-4-fast-non-reasoning</option>
                                     <option value="grok-4-0709">grok-4-0709</option>
                                     <option value="grok-3-mini">grok-3-mini</option>
                                     <option value="grok-3">grok-3</option>
                                 </optgroup>
                                 <optgroup label="Image generation models">
                                     <option value="grok-imagine-image-pro">grok-imagine-image-pro</option>
                                     <option value="grok-imagine-image">grok-imagine-image</option>
                                 </optgroup>
                                 <optgroup label="Video generation models">
                                     <option value="grok-imagine-video">grok-imagine-video</option>
                                 </optgroup>
                             </select>
                             <select id="main-model-select" onchange="setModel(this.value)" class="bg-slate-800 border border-slate-600 text-white text-xs rounded-lg px-3 py-1 outline-none focus:border-blue-500 font-bold tracking-wide">
                                 <option value="gemini">Gemini</option>
                                 <option value="grok">Grok</option>
                                 <option value="groq">Groq</option>
                                 <option value="cohere">Cohere</option>
                                 <option value="gpt">OpenAI</option>
                             </select>
                         </div>
                    </div>
                    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-thin scrollbar-thumb-slate-700"></div>
                    
                    <!-- Chat Input Area -->
                    <div class="p-4 bg-slate-900 border-t border-slate-800 shrink-0 z-20 pb-[calc(1rem+env(safe-area-inset-bottom))] flex flex-col gap-2">
                        
                        <!-- Image Preview Area -->
                        <div id="chat-image-preview-container" class="hidden relative inline-block self-start">
                            <img id="chat-image-preview" src="" class="h-16 w-auto rounded-lg border border-slate-700 shadow-md">
                            <button onclick="clearChatImage()" class="absolute -top-2 -right-2 bg-slate-800 border border-slate-600 text-slate-300 hover:text-red-400 rounded-full p-1 shadow-lg transition-colors"><i class="ph-bold ph-x text-xs"></i></button>
                        </div>

                        <div id="input-wrapper" class="flex items-center bg-slate-950 rounded-xl px-2 py-2 border border-slate-700 focus-within:border-blue-500 transition-colors">
                            <button onclick="triggerChatImageUpload()" class="p-3 rounded-lg text-slate-500 hover:text-emerald-400 hover:bg-slate-800 transition-all flex-shrink-0 mr-1" title="上傳圖片分析"><i class="ph-bold ph-image text-xl"></i></button>
                            <input type="file" id="chat-image-input" accept="image/*" class="hidden" onchange="handleChatImageSelect(event)">

                            <button id="continuous-btn" onclick="toggleContinuous()" class="p-3 rounded-lg text-slate-500 hover:text-emerald-400 hover:bg-slate-800 transition-all flex-shrink-0 mr-1" title="連續語音對話 (6秒自動發送)"><i id="continuous-icon" class="ph-bold ph-infinity text-xl"></i></button>
                            <button id="search-toggle-btn" onclick="toggleSearch()" class="p-3 rounded-lg text-slate-500 hover:text-blue-400 hover:bg-slate-800 transition-all flex-shrink-0 mr-1" title="開關連網搜尋"><i id="search-icon" class="ph-bold ph-globe text-xl"></i></button>
                            <button id="voice-btn" onclick="toggleVoice()" class="p-3 mr-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all active:scale-95 flex-shrink-0"><i id="voice-icon" class="ph-bold ph-microphone text-xl"></i></button>
                            <input type="text" id="user-input" placeholder="對話、輸入「搜尋(內容)」或「撥打(號碼)」..." class="flex-1 bg-transparent border-none focus:ring-0 text-white outline-none h-full" onkeydown="handleEnter(event)">
                            <button onclick="handleSendMessage()" id="send-btn" class="ml-2 p-3 rounded-lg text-white bg-blue-600 hover:opacity-90 flex-shrink-0 transition-all"><i id="send-icon" class="ph-bold ph-paper-plane-right"></i></button>
                        </div>
                        <div id="search-hint" class="text-[10px] text-blue-400 text-center hidden">🌐 已開啟連網搜尋 (支援 Gemini / Grok 等模型)</div>
                    </div>
                </div>
                
                <!-- Right Sidebar -->
                <div class="hidden lg:flex w-80 bg-slate-900 flex-col p-6 space-y-6 border-l border-slate-800 overflow-y-auto shrink-0">
                    <div class="bg-gradient-to-br from-indigo-900 to-slate-800 rounded-3xl p-6 text-white shadow-lg border border-slate-700 relative overflow-hidden group">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
                        <div class="relative z-10">
                            <div class="flex justify-between items-start">
                                <div><h3 class="text-slate-300 text-xs font-bold uppercase mb-1">目前天氣</h3><div class="flex items-center space-x-2 cursor-pointer hover:opacity-80 transition-opacity" onclick="cycleManualLocation()"><i class="ph-fill ph-map-pin text-blue-400"></i><span id="location-name" class="text-lg font-bold text-white border-b border-dashed border-slate-500">未定位</span></div></div><i id="weather-icon" class="ph-fill ph-cloud-sun text-4xl text-yellow-400"></i>
                            </div>
                            <div class="mt-4 flex items-end space-x-2"><span id="weather-temp" class="text-5xl font-bold">--°</span><span id="weather-desc" class="text-slate-300 text-sm mb-2">--</span></div>
                        </div>
                    </div>
                    <div class="bg-slate-950 rounded-2xl p-5 border border-slate-800">
                        <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-slate-200 text-sm flex items-center gap-2"><i class="ph-fill ph-calendar-check text-blue-500"></i>近期任務</h3><button onclick="switchTab('schedule')" class="text-xs text-blue-400">管理</button></div>
                        <div id="mini-todo-list" class="space-y-2"></div>
                    </div>
                    <div class="bg-slate-950 rounded-2xl p-5 border border-slate-800">
                         <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-slate-200 text-sm flex items-center gap-2"><i class="ph-fill ph-notebook text-emerald-500"></i>最新筆記</h3><button onclick="switchTab('notes')" class="text-xs text-blue-400">查看</button></div>
                        <div id="mini-note-list" class="space-y-2"></div>
                    </div>
                </div>
            </div>

            <!-- Other Views -->
            <div id="view-schedule" class="hidden flex-col h-full w-full p-6 overflow-y-auto"><div class="max-w-3xl mx-auto w-full"><header class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-white">行程管理</h2><button onclick="addTodoManually()" class="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center space-x-2"><i class="ph-bold ph-plus"></i><span>新增</span></button></header><div id="full-todo-list" class="space-y-3"></div></div></div>
            
            <!-- Notes View -->
            <div id="view-notes" class="hidden flex-col h-full w-full p-6 overflow-y-auto">
                <div class="max-w-5xl mx-auto w-full">
                    <!-- Google Docs Writer Widget -->
                    <div class="bg-gradient-to-r from-blue-900/40 to-slate-900 border border-blue-500/30 rounded-2xl p-6 mb-8 relative overflow-hidden shadow-lg">
                        <div class="absolute top-0 right-0 w-40 h-40 bg-blue-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                        <div class="relative z-10">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="ph-fill ph-notebook text-emerald-400"></i> 隨手記事本</h3>
                                <div class="flex gap-2">
                                    <button onclick="openNoteDocViewer()" class="text-xs bg-slate-800 hover:bg-slate-700 text-white px-3 py-1.5 rounded-lg border border-slate-600 flex items-center gap-2 transition-colors"><i class="ph-bold ph-book-open"></i> 閱讀</button>
                                </div>
                            </div>
                            
                            <!-- Notebook Switcher -->
                            <div class="flex space-x-2 mb-4 bg-slate-950/50 p-1 rounded-lg inline-flex">
                                <button onclick="setActiveNotebook(1)" id="btn-nb-1" class="flex-1 text-xs px-4 py-1.5 rounded-md font-bold transition-all bg-emerald-600 text-white">筆記本 A</button>
                                <button onclick="setActiveNotebook(2)" id="btn-nb-2" class="flex-1 text-xs px-4 py-1.5 rounded-md font-bold transition-all text-slate-400 hover:text-white">筆記本 B</button>
                            </div>
                            
                            <!-- Tabs -->
                            <div class="flex space-x-2 mb-3">
                                <button onclick="setWriteMode('text')" id="btn-mode-text" class="text-xs px-3 py-1 rounded-full bg-blue-600 text-white font-bold transition-all">純文字 / 貼上圖片 (Ctrl+V)</button>
                                <button onclick="setWriteMode('image')" id="btn-mode-image" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400 font-bold hover:text-white transition-all">圖片網址</button>
                                <button onclick="setWriteMode('link')" id="btn-mode-link" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-400 font-bold hover:text-white transition-all">超連結</button>
                            </div>

                            <div class="flex flex-col gap-3">
                                <!-- Inputs -->
                                <div class="relative">
                                    <textarea id="doc-input-main" rows="5" placeholder="輸入文字內容，或直接 Ctrl+V 貼上圖片..." class="w-full bg-slate-950/80 border border-slate-700 rounded-lg p-3 text-sm focus:border-blue-500 outline-none pr-24 resize-none" onkeydown="handleNoteKeydown(event)"></textarea>
                                    <div id="paste-indicator" class="hidden absolute right-3 top-3 text-[10px] text-emerald-400 bg-emerald-900/50 px-2 py-0.5 rounded border border-emerald-500/50 animate-pulse">
                                        <i class="ph-bold ph-image"></i> 圖片已就緒
                                    </div>
                                    <button onclick="clearNoteInput()" class="absolute right-3 bottom-3 text-slate-500 hover:text-red-400 p-1 bg-slate-900/50 rounded-full transition-colors" title="清除內容"><i class="ph-bold ph-trash"></i></button>
                                    
                                    <button onclick="triggerPhotoUpload()" class="absolute right-28 bottom-3 text-slate-500 hover:text-white p-1 bg-slate-900/50 rounded-full transition-colors" title="選擇圖片 (資料夾)"><i class="ph-bold ph-image text-xl"></i></button>
                                    <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handlePhotoSelect(event)">

                                    <button onclick="triggerCameraUpload()" class="absolute right-20 bottom-3 text-slate-500 hover:text-white p-1 bg-slate-900/50 rounded-full transition-colors" title="拍照上傳"><i class="ph-bold ph-camera text-xl"></i></button>
                                    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoSelect(event)">

                                    <button onclick="toggleNoteVoice()" id="note-voice-btn" class="absolute right-10 bottom-3 text-slate-500 hover:text-white p-1 bg-slate-900/50 rounded-full transition-colors" title="語音輸入"><i id="note-voice-icon" class="ph-bold ph-microphone text-xl"></i></button>
                                </div>
                                <input type="text" id="doc-input-sub" placeholder="輸入連結網址 (例如: https://...)" class="hidden w-full bg-slate-950/80 border border-slate-700 rounded-lg p-3 text-sm focus:border-blue-500 outline-none">
                                
                                <div class="flex justify-end">
                                    <button onclick="handleDocWriteBtn()" id="note-send-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center gap-2">
                                        <i class="ph-bold ph-paper-plane-right"></i> 發送寫入
                                    </button>
                                </div>
                            </div>
                            <p id="active-notebook-label" class="text-[10px] text-slate-400 mt-2 opacity-80">* 目前寫入目標：筆記本 A</p>
                        </div>
                    </div>

                    <header class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-white">本地筆記中心</h2><button onclick="addNoteManually()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg flex items-center space-x-2"><i class="ph-bold ph-plus"></i><span>新增</span></button></header>
                    <div id="full-note-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
            </div>
            
            <!-- Full Doc Viewer Modal -->
            <div id="doc-viewer-modal" class="hidden fixed inset-0 z-50 bg-slate-950/95 backdrop-blur-md flex flex-col p-4">
                <div class="flex justify-between items-center mb-4 shrink-0">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2"><i class="ph-fill ph-book-open text-blue-400"></i> 文件瀏覽器</h3>
                    <div class="flex gap-2">
                        <button onclick="refreshNoteDocView()" class="p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 text-xs"><i class="ph-bold ph-arrows-clockwise"></i> 重新整理</button>
                        <button onclick="closeDocViewer()" class="p-2 bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700"><i class="ph-bold ph-x text-lg"></i></button>
                    </div>
                </div>
                <div class="flex-1 bg-white text-slate-900 rounded-xl p-6 overflow-y-auto shadow-2xl font-serif leading-relaxed text-lg" id="doc-content-area">
                    <div class="flex items-center justify-center h-full text-slate-400 gap-2"><div class="dot-flashing bg-slate-400"></div> 載入中...</div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // Global variables
        let recognition = null;
        let noteRecognition = null;
        let voiceTimer = null;
        let initialInput = "";
        
        let alarmInterval = null;
        let alarmAudioCtx = null;
        let mediaRecorder = null;
        let audioChunks = [];

        const appState = {
            currentModel: 'gemini', 
            grokModel: 'grok-4-1-fast-reasoning', 
            chatImageBase64: null, 
            chatImageMime: null,

            docMonitorUrl: localStorage.getItem('nova_doc_url') || '',
            noteDocUrl: localStorage.getItem('nova_note_doc_url') || '', 
            noteDocUrl2: localStorage.getItem('nova_note_doc_url_2') || '',
            activeNotebook: 1,
            driveUrl: localStorage.getItem('nova_drive_url') || '',
            
            messages: JSON.parse(localStorage.getItem('nova_messages') || '[]'),
            todos: JSON.parse(localStorage.getItem('nova_todos') || '[]'),
            notes: JSON.parse(localStorage.getItem('nova_notes') || '[]'),
            weather: { temp: '--', condition: 'cloudy', humidity: '--', wind: '--', loc: '未定位' },
            keys: { 
                gemini: localStorage.getItem('nova_key_gemini')||'', 
                groq: localStorage.getItem('nova_key_groq')||'',
                cohere: localStorage.getItem('nova_key_cohere')||'',
                openai: localStorage.getItem('nova_key_openai')||'', 
                grok: localStorage.getItem('nova_key_grok')||'',
                serpapi: localStorage.getItem('nova_key_serpapi')||''
            },
            isThinking: false, isListening: false, isNoteListening: false, isSearchEnabled: false,
            isContinuous: false,
            manualLocIndex: 0,
            manualLocs: [{name: "台北", lat: 25.0330, lon: 121.5654}, {name: "台中", lat: 24.1477, lon: 120.6736}, {name: "高雄", lat: 22.6273, lon: 120.3014}],
            pendingReminder: null,
            reminderStage: 0,
            countryCode: 'TW',
            lastLat: null,
            lastLon: null,
            sosTimer: null,
            sosCount: 10,
            isSOSDrill: false 
        };
        
        const MODEL_CONFIG = {
            gemini: { name: 'Gemini (2.5 Flash)', color: 'text-blue-400', bg: 'bg-blue-600', icon: 'ph-globe' },
            grok: { name: 'Grok', color: 'text-slate-100', bg: 'bg-slate-600', icon: 'ph-lightning' },
            groq: { name: 'Groq', color: 'text-rose-400', bg: 'bg-rose-600', icon: 'ph-rocket' },
            cohere: { name: 'Cohere', color: 'text-violet-400', bg: 'bg-violet-600', icon: 'ph-cpu' },
            gpt: { name: 'OpenAI', color: 'text-emerald-400', bg: 'bg-emerald-600', icon: 'ph-cpu' }
        };

        // --- UTILS ---
        function saveMessages() { localStorage.setItem('nova_messages', JSON.stringify(appState.messages)); }
        function saveData() { localStorage.setItem('nova_todos', JSON.stringify(appState.todos)); localStorage.setItem('nova_notes', JSON.stringify(appState.notes)); }
        function getTime() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
        
        function formatMessage(text) { 
            if (!text) return ''; 
            let safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
            safe = safe.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>'); 
            
            safe = safe.replace(/\[([^\]]+)\]\((https?:\/\/[^\s<]+?)\)|(https?:\/\/[^\s<)\]]+)/g, function(match, mdTitle, mdUrl, rawUrl) {
                if (mdUrl) {
                    return `<a href="${mdUrl}" target="_blank" class="text-blue-400 underline break-all">${mdTitle}</a>`;
                } else if (rawUrl) {
                    return `<a href="${rawUrl}" target="_blank" class="text-blue-400 underline break-all">${rawUrl}</a>`;
                }
                return match;
            });
            
            return safe.replace(/\n/g, '<br>'); 
        }
        
        function escapeHtml(t){return t?t.replace(/&/g,"&").replace(/</g,"<").replace(/>/g,">"):""}

        // --- RENDERERS ---
        function renderAll() { renderMessages(); renderTodos(); renderNotes(); renderWeather(); }
        function renderMessages() { 
            const container = document.getElementById('chat-container');
            if(!container) return;
            container.innerHTML = appState.messages.map(msg => { 
                const isUser = msg.sender === 'user'; 
                const modelInfo = isUser ? null : MODEL_CONFIG[msg.model]; 
                let sourcesHTML = ''; 
                if (msg.sources?.length) sourcesHTML = `<div class="mt-3 pt-3 border-t border-slate-700/50"><p class="text-[10px] text-slate-400 mb-1 font-bold">來源：</p><div class="flex flex-wrap gap-2">${msg.sources.map((s,i)=>`<a href="${s.uri}" target="_blank" class="text-[10px] bg-slate-950/50 text-blue-400 px-2 py-1 rounded border border-slate-700/50 block truncate max-w-[150px]">${i+1}. ${s.title}</a>`).join('')}</div></div>`; 
                
                let imageHTML = '';
                if (msg.image) {
                    imageHTML = `<img src="${msg.image}" class="max-w-xs md:max-w-sm rounded-lg border border-slate-700/50 mb-2 shadow-sm">`;
                }

                return `<div class="group flex ${isUser ? 'justify-end' : 'justify-start items-start space-x-3'} fade-in relative mb-4">
                    ${!isUser ? `<div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-1 ${modelInfo?.bg||'bg-slate-700'}"><i class="ph-fill ${modelInfo?.icon||'ph-robot'} text-white text-sm"></i></div>` : ''}
                    <div class="msg-group relative max-w-[90%] md:max-w-[80%] rounded-2xl p-4 shadow-sm ${isUser ? 'bg-slate-800 text-white rounded-br-none' : 'bg-slate-900 border border-slate-800 text-slate-200 rounded-tl-none'}">
                        ${!isUser ? `<span class="text-[10px] font-bold uppercase mb-1 block ${modelInfo?.color||'text-slate-400'} opacity-80">${modelInfo?.name||'System'}</span>` : ''}
                        ${imageHTML}
                        <div class="msg-content text-sm leading-relaxed">${formatMessage(msg.text)}</div>
                        ${sourcesHTML}
                        <p class="text-[10px] mt-2 text-right text-slate-500 opacity-60">${msg.time}</p>
                        <button onclick="deleteMessage(${msg.id})" class="msg-actions absolute top-2 right-2 p-1 text-slate-500 hover:text-red-400 transition-colors bg-slate-950/50 rounded-full"><i class="ph-bold ph-trash text-xs"></i></button>
                    </div>
                </div>`; 
            }).join(''); 
            container.scrollTop = container.scrollHeight; 
        }

        function renderThinkingState(show) { 
            const el = document.getElementById('thinking-indicator'); 
            const container = document.getElementById('chat-container');
            if(show && !el && container) container.insertAdjacentHTML('beforeend', `<div id="thinking-indicator" class="flex justify-start items-center space-x-3 fade-in"><div class="w-8 h-8 rounded-full flex items-center justify-center ${MODEL_CONFIG[appState.currentModel]?.bg || 'bg-slate-700'}"><i class="ph-fill ${MODEL_CONFIG[appState.currentModel]?.icon || 'ph-robot'} text-white text-sm"></i></div><div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl rounded-tl-none"><div class="dot-flashing ml-2"></div></div></div>`); 
            else if(!show && el) el.remove(); 
        }

        function renderTodos() { 
            const el = document.getElementById('full-todo-list');
            if(!el) return;
            el.innerHTML=appState.todos.map(t=>`<div class="group bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between hover:border-slate-600 transition-all slide-in"><div class="flex items-center space-x-4"><button onclick="toggleTodo(${t.id})" class="text-slate-500 hover:text-blue-400"><i class="ph${t.done?'-fill ph-check-circle text-green-500':' ph-circle'} text-2xl"></i></button><div><p class="text-base ${t.done?'line-through text-slate-600':'text-slate-200'}">${escapeHtml(t.text)}</p><span class="text-xs text-slate-500">${t.time}</span></div></div><button onclick="deleteTodo(${t.id})" class="text-slate-500 hover:text-red-400 p-2"><i class="ph ph-trash"></i></button></div>`).join('')||'<p class="text-slate-500 text-center mt-10">無任務</p>'; 
            const mini = document.getElementById('mini-todo-list');
            if(mini) mini.innerHTML=appState.todos.slice(0,3).map(t=>`<div class="flex items-center space-x-3 p-2 bg-slate-950/50 rounded-lg border border-slate-800/50"><div class="w-1.5 h-8 rounded-full ${t.done?'bg-green-500':'bg-blue-500'}"></div><div class="flex-1 min-w-0"><p class="text-xs truncate ${t.done?'line-through text-slate-600':'text-slate-300'}">${escapeHtml(t.text)}</p></div></div>`).join('')||'<p class="text-xs text-slate-500 text-center">無待辦</p>'; 
        }

        function renderNotes() { 
            const el = document.getElementById('full-note-list');
            if(!el) return;
            el.innerHTML=appState.notes.map(n=>`<div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 hover:border-slate-600 flex flex-col h-48 relative overflow-hidden slide-in"><div class="flex justify-between mb-2"><h3 class="text-lg font-bold text-white truncate pr-2">${escapeHtml(n.title)}</h3><span class="text-xs text-slate-500 whitespace-nowrap">${n.date}</span></div><p class="text-slate-300 text-sm overflow-y-auto flex-1 scrollbar-thin">${escapeHtml(n.content)}</p><button onclick="deleteNote(${n.id})" class="absolute bottom-4 right-4 text-slate-600 hover:text-red-400"><i class="ph ph-trash text-lg"></i></button></div>`).join('')||'<p class="text-slate-500 text-center col-span-3 mt-10">無筆記</p>'; 
            const mini = document.getElementById('mini-note-list');
            if(mini) mini.innerHTML=appState.notes.slice(0,2).map(n=>`<div class="bg-slate-950/50 p-3 rounded-lg border border-slate-800/50 cursor-pointer hover:border-slate-700" onclick="switchTab('notes')"><h4 class="text-slate-300 text-xs font-bold mb-1 truncate">${escapeHtml(n.title)}</h4><p class="text-slate-500 text-[10px] line-clamp-1">${escapeHtml(n.content)}</p></div>`).join('')||'<p class="text-xs text-slate-500 text-center">無筆記</p>'; 
        }

        function renderWeather() { 
            const {temp,condition,humidity,wind,loc}=appState.weather; 
            let icon='ph-cloud',color='text-slate-400',desc='多雲'; 
            if(condition==='sunny'){icon='ph-sun';color='text-yellow-400';desc='晴朗';} 
            if(condition==='rainy'){icon='ph-cloud-rain';color='text-blue-400';desc='有雨';} 
            
            const locEl = document.getElementById('location-name'); 
            if(locEl) locEl.innerText=loc; 
            
            const tempEl = document.getElementById('weather-temp'); 
            if(tempEl) tempEl.innerText=`${temp}°`; 
            
            const descEl = document.getElementById('weather-desc'); 
            if(descEl) descEl.innerText=desc; 
            
            const iconEl = document.getElementById('weather-icon'); 
            if(iconEl) iconEl.className=`ph-fill ${icon} text-4xl ${color}`; 
            
            const mTemp = document.getElementById('mobile-weather-temp'); 
            if(mTemp) mTemp.innerText=loc==='未定位'?'定位':`${temp}°`; 
            
            const mIcon = document.getElementById('mobile-weather-icon'); 
            if(mIcon) mIcon.className=`ph-fill ${loc==='未定位'?'ph-navigation-arrow':icon} ${color}`; 
        }

        function updateModelUI(){ 
            const conf=MODEL_CONFIG[appState.currentModel]; 
            const statusName = document.getElementById('status-name'); if(statusName) statusName.innerText=conf?.name || 'Unknown'; 
            const statusIcon = document.getElementById('status-icon'); if(statusIcon) statusIcon.className=`ph-fill ${conf?.icon || 'ph-cpu'} text-lg ${conf?.color || 'text-slate-400'}`; 
            
            const selectEl = document.getElementById('main-model-select');
            if(selectEl) selectEl.value = appState.currentModel;
            
            const grokSelect = document.getElementById('grok-sub-model-select');
            if(grokSelect) {
                if (appState.currentModel === 'grok') {
                    grokSelect.classList.remove('hidden');
                    grokSelect.value = appState.grokModel;
                } else {
                    grokSelect.classList.add('hidden');
                }
            }
            
            const wrap = document.getElementById('input-wrapper'); if(wrap) wrap.className = `flex items-center bg-slate-950 rounded-xl px-2 py-2 border transition-colors border-slate-700 focus-within:border-${appState.currentModel==='gemini'?'blue':appState.currentModel==='groq'?'rose':appState.currentModel==='cohere'?'violet':appState.currentModel==='gpt'?'emerald':'slate'}-500`; 
            
            const badge=document.getElementById('web-search-badge'); const searchBtn=document.getElementById('search-toggle-btn'); const hint=document.getElementById('search-hint'); 
            if(searchBtn) {
                if(appState.isSearchEnabled){ searchBtn.classList.add('text-blue-400','bg-blue-900/30'); searchBtn.classList.remove('text-slate-500'); if(badge)badge.classList.remove('hidden'); if(hint)hint.classList.remove('hidden'); }
                else{ searchBtn.classList.remove('text-blue-400','bg-blue-900/30'); searchBtn.classList.add('text-slate-500'); if(badge)badge.classList.add('hidden'); if(hint)hint.classList.add('hidden'); }
            }
        }

        // --- ACTIONS ---
        function addMessage(text, sender, model, sources=[], image=null) { 
            appState.messages.push({id:Date.now(), text, sender, model, sources, image, time:getTime()}); 
            saveMessages(); 
            renderMessages(); 
        }
        function deleteMessage(id) { appState.messages = appState.messages.filter(m => m.id !== id); saveMessages(); renderMessages(); }
        function clearChatHistory() { if(confirm("確定要清空所有對話紀錄嗎？")) { appState.messages = []; saveMessages(); renderMessages(); } }
        function toggleTodo(id){ const t=appState.todos.find(x=>x.id===id); if(t){t.done=!t.done;saveData();renderTodos();} }
        function deleteTodo(id){ appState.todos=appState.todos.filter(x=>x.id!==id); saveData(); renderTodos(); }
        function deleteNote(id){ appState.notes=appState.notes.filter(x=>x.id!==id); saveData(); renderNotes(); }
        function addTodoManually(){ const t=prompt("任務"); if(t){appState.todos.push({id:Date.now(),text:t,done:false,time:'手動'});saveData();renderTodos();} }
        function addNoteManually(){ const t=prompt("標題"),c=prompt("內容"); if(t&&c){appState.notes.push({id:Date.now(),title:t,content:c,date:new Date().toLocaleDateString()});saveData();renderNotes();} }
        function switchTab(id){ ['dashboard','schedule','notes'].forEach(t=>document.getElementById(`view-${t}`).classList.add('hidden')); document.getElementById(`view-${id}`).classList.remove('hidden'); document.getElementById(`view-${id}`).classList.add('flex'); document.querySelectorAll('.nav-item').forEach(b=>{b.className='nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 transition-all';}); const active=document.getElementById(`nav-${id}`); if(active)active.className='nav-item flex items-center space-x-3 w-full p-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg transition-all'; }
        function openSettings(){document.getElementById('settings-modal').classList.remove('hidden');}
        function closeSettings(){document.getElementById('settings-modal').classList.add('hidden');}
        
        function saveKeys(){ 
            const safeGetVal = (id) => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
            
            appState.keys.gemini = safeGetVal('key-gemini'); 
            appState.keys.groq = safeGetVal('key-groq');
            appState.keys.cohere = safeGetVal('key-cohere');
            appState.keys.openai = safeGetVal('key-openai'); 
            appState.keys.grok = safeGetVal('key-grok'); 
            appState.keys.serpapi = safeGetVal('key-serpapi'); 
            appState.docMonitorUrl = safeGetVal('key-doc-url'); 
            appState.noteDocUrl = safeGetVal('key-note-doc-url'); 
            appState.noteDocUrl2 = safeGetVal('key-note-doc-url-2'); 
            appState.driveUrl = safeGetVal('key-drive-url'); 
            
            localStorage.setItem('nova_key_gemini', appState.keys.gemini); 
            localStorage.setItem('nova_key_groq', appState.keys.groq); 
            localStorage.setItem('nova_key_cohere', appState.keys.cohere); 
            localStorage.setItem('nova_key_openai', appState.keys.openai); 
            localStorage.setItem('nova_key_grok', appState.keys.grok);

        function handlePaste(e) {
            const items = (e.clipboardData || window.clipboardData).items;
            if (!items) return;

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                    const blob = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {

                    e.preventDefault(); 
                    return;
                }
            }
        }

        async function handleDocWriteBtn() {
            const targetUrl = (appState.activeNotebook === 1) ? appState.noteDocUrl : appState.noteDocUrl2;
            
            if(!targetUrl) return alert(`請先至設定輸入「隨手記事本 ${appState.activeNotebook === 1 ? 'A' : 'B'}」的 Apps Script URL`);
            
            const mainInput = document.getElementById('doc-input-main');
            const subInput = document.getElementById('doc-input-sub');
            if(!mainInput) return;
            
            const mainVal = mainInput.value.trim();
            const subVal = subInput ? subInput.value.trim() : '';
            const sendBtn = document.getElementById('note-send-btn');
            
            let payload = {};
            let currentMode = appState.writeMode || 'text';
            
            if ((currentMode === 'image' || currentMode === 'link') && 
                !mainVal.match(/^https?:\/\//i) && mainVal.length > 0) {
                currentMode = 'text';
            }
            
            if (appState.pastedImageBase64 && (mainVal.includes("[已偵測到"))) {
                payload = { type: 'image_base64', content: appState.pastedImageBase64 };
            } else {
                if(!mainVal && currentMode !== 'image_base64') return; 
                
                if(currentMode === 'text') payload = { type: 'text', content: mainVal };
                else if (currentMode === 'image') payload = { type: 'image', content: mainVal };
                else if (currentMode === 'link') {
                    if(!subVal) return alert("請輸入連結網址");
                    payload = { type: 'link', text: mainVal, content: subVal };
                }
            }
            
            if(sendBtn) {
                const originalText = sendBtn.innerHTML;
                sendBtn.innerHTML = '<i class="ph-bold ph-spinner animate-spin"></i> ⏳ 寫入中...';
                sendBtn.classList.add('opacity-70', 'cursor-not-allowed');
                
                try {
                    await fetch(targetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    addMessage(`📝 已寫入${appState.activeNotebook === 1 ? '筆記本 A' : '筆記本 B'}`, 'system');
                    clearNoteInput();
                } catch(e) { alert("寫入失敗，請檢查 URL"); }
                finally {
                    sendBtn.innerHTML = originalText;
                    sendBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            }
        }

        // --- ENHANCED GPS LOCATION ---
        async function tryGetLocation(silent=false) { 
            if(!silent) updateLocStatus("GPS定位中..."); 
            if (navigator.geolocation) { 
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        appState.lastLat = p.coords.latitude;
                        appState.lastLon = p.coords.longitude;
                        // 1. 優先嘗試 Nominatim (OpenStreetMap) 解析
                        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}&zoom=10&addressdetails=1&accept-language=zh-TW`)
                            .then(r=>r.json())
                            .then(d => { 
                                if(d.address && d.address.country_code) appState.countryCode = d.address.country_code.toUpperCase(); 
                                const city = d.address?.city || d.address?.town || d.address?.county || d.address?.state || "目前位置";
                                fetchWeather(p.coords.latitude, p.coords.longitude, city, silent);
                            })
                            .catch(() => { 
                                // 2. 若失敗，降級備援到 BigDataCloud
                                fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&localityLanguage=zh-tw`)
                                .then(r=>r.json())
                                .then(d => {
                                    if(d.countryCode) appState.countryCode = d.countryCode.toUpperCase();
                                    const city = d.city || d.locality || d.principalSubdivision || "目前位置";
                                    fetchWeather(p.coords.latitude, p.coords.longitude, city, silent);
                                })
                                .catch(() => { fetchWeather(p.coords.latitude, p.coords.longitude, "GPS定位", silent); });
                            });
                    }, 
                    (e) => getIPLocation(silent), 
                    { timeout: 10000, enableHighAccuracy: true } 
                ); 
            } else getIPLocation(silent); 
        }
        
        async function getIPLocation(silent) { 
            if(!silent) updateLocStatus("IP定位中..."); 
            try { 
                // 1. 優先嘗試穩定性高的 ipinfo
                const res = await fetch('https://ipinfo.io/json'); 
                if(!res.ok) throw new Error(); 
                const data=await res.json(); 
                const [lat, lon] = data.loc.split(',');
                appState.lastLat = parseFloat(lat);
                appState.lastLon = parseFloat(lon);
                if (data.country) appState.countryCode = data.country;
                fetchWeather(lat, lon, `${data.city}(IP)`, silent); 
            } catch(e){ 
                try { 
                    // 2. 備援使用 geojs
                    const res2 = await fetch('https://get.geojs.io/v1/ip/geo.json'); 
                    const data2 = await res2.json(); 
                    appState.lastLat = parseFloat(data2.latitude);
                    appState.lastLon = parseFloat(data2.longitude);
                    if (data2.country_code) appState.countryCode = data2.country_code;
                    fetchWeather(data2.latitude, data2.longitude, `${data2.city}(IP)`, silent); 
                } catch(e2) { 
                    updateLocStatus("定位失敗"); 
                    if(!silent) addMessage("⚠️ 定位失敗，已切換至預設城市", "system"); 
                    const def = appState.manualLocs[0]; 
                    appState.countryCode = 'TW';
                    fetchWeather(def.lat, def.lon, def.name + " (預設)", true); 
                } 
            } 
        }
        
        async function fetchWeather(lat, lon, locName, silent) { try { const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`; const res = await fetch(url); const data = await res.json(); if(data.current) { const c = data.current; appState.weather = { temp: Math.round(c.temperature_2m), humidity: c.relative_humidity_2m, wind: c.wind_speed_10m, condition: wmoToCondition(c.weather_code), loc: locName }; renderWeather(); updateLocStatus("已更新"); if(!silent) addMessage(`✅ 天氣已更新: ${c.temperature_2m}°C`, "system"); } } catch(e) { updateLocStatus("錯誤"); } }
        function updateLocStatus(msg) { 
            const el = document.getElementById('location-status'); 
            if(el) el.innerText = msg; 
            if(msg==="已更新"||msg.includes("預設")||msg.includes("手動")) { 
                const {loc, temp} = appState.weather; 
                const locName = document.getElementById('location-name'); if(locName) locName.innerText = loc; 
                const mTemp = document.getElementById('mobile-weather-temp'); if(mTemp) mTemp.innerText = `${temp}°`; 
            } 
        }
        function wmoToCondition(c) { if(c===0)return 'sunny'; if(c<=48)return 'cloudy'; if(c<=82)return 'rainy'; if(c<=77)return 'snow'; return 'storm'; }

        // --- NATIVE BRIDGE HELPER ---
        function executeNativeCall(number) {
            if (window.Android && typeof window.Android.makeCall === 'function') {
                window.Android.makeCall(number); return true;
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.makeCall) {
                window.webkit.messageHandlers.makeCall.postMessage(number); return true;
            }
            return false;
        }

        // --- SOS & CALL LOGIC ---
        function getEmergencyNumber(country, type) {
            const rules = { 'TW': {'110':'110','119':'119'}, 'JP': {'110':'110','119':'119'}, 'KR': {'110':'112','119':'119'}, 'US': {'110':'911','119':'911'} };
            return (rules[country] && rules[country][type]) ? rules[country][type] : '112';
        }

        function setSOSDrillMode() {
            appState.isSOSDrill = true;
            const drillBtn = document.getElementById('sos-drill-btn');
            if (drillBtn) {
                drillBtn.className = "w-full bg-emerald-600 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95";
                drillBtn.innerHTML = '<i class="ph-bold ph-check-circle mr-2"></i>已開啟演習模式';
                drillBtn.disabled = true;
            }
            const titleEl = document.getElementById('sos-title');
            if (titleEl) {
                titleEl.innerText = "緊急救援 (演習模式)";
                titleEl.className = "text-3xl font-bold text-yellow-400 mb-2";
            }
            addMessage("🛡️ 已開啟 SOS 演習模式：不會真正觸發撥號或發送簡訊。", 'system');
        }

        function triggerEmergency(type) {
            appState.isSOSDrill = false;
            const drillBtn = document.getElementById('sos-drill-btn');
            if (drillBtn) {
                drillBtn.className = "w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95";
                drillBtn.innerHTML = '<i class="ph-bold ph-shield-check mr-2"></i>切換為演習模式';
                drillBtn.disabled = false;
            }
            const titleEl = document.getElementById('sos-title');
            if(titleEl) { titleEl.innerText = "緊急救援觸發"; titleEl.className = "text-3xl font-bold text-white mb-2"; }

            const country = appState.countryCode || 'TW';
            const targetNumber = getEmergencyNumber(country, type);

            document.getElementById('sos-number').innerText = targetNumber;
            document.getElementById('sos-modal').classList.remove('hidden');
            document.getElementById('sos-modal').classList.add('flex');
            
            appState.sosCount = 10;
            document.getElementById('sos-countdown').innerText = appState.sosCount;
            if(navigator.vibrate) navigator.vibrate([500, 200, 500]);

            appState.sosTimer = setInterval(() => {
                appState.sosCount--;
                document.getElementById('sos-countdown').innerText = appState.sosCount;
                if(navigator.vibrate) navigator.vibrate(200);
                
                if(appState.sosCount <= 0) {
                    clearInterval(appState.sosTimer);
                    executeSOS(targetNumber);
                }
            }, 1000);
        }

        function cancelSOS() {
            if(appState.sosTimer) clearInterval(appState.sosTimer);
            document.getElementById('sos-modal').classList.add('hidden');
            document.getElementById('sos-modal').classList.remove('flex');
            addMessage("🛑 已取消緊急呼叫指令", 'system');
        }

        function executeSOS(number) {
            document.getElementById('sos-modal').classList.add('hidden');
            document.getElementById('sos-modal').classList.remove('flex');
            
            const locStr = (appState.lastLat && appState.lastLon) ? ` https://maps.google.com/?q=${appState.lastLat},${appState.lastLon}` : '';
            const msg = `I need help now!${locStr}`;
            
            if (appState.isSOSDrill) {
                addMessage(`🛡️ 【緊急求救演習完成】\n若真實情況，將撥打至 ${number} 並發送求救簡訊。\n📜 簡訊內容：\n${msg}`, 'system'); return;
            }
            addMessage(`🚨 正在發送求救簡訊並呼叫電話 APP 至 ${number}...`, 'system');
            window.open(`sms:${number}?body=${encodeURIComponent(msg)}`, '_self');
            
            setTimeout(() => {
                if(!executeNativeCall(number)){ window.open(`tel:${number}`, '_self'); } 
                else { addMessage(`(✅ 已透過原生 Bridge 發送撥號指令)`, 'system'); }
            }, 2000);
        }

        // --- AUDIO RECORDING ---
        async function startAudioRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { addMessage("⚠️ 瀏覽器不支援錄音", 'system'); return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = uploadAudioRecording;
                mediaRecorder.start();
                document.getElementById('recording-status').classList.remove('hidden');
                document.getElementById('recording-status').classList.add('flex');
                addMessage("🎙️ 開始錄音...", 'system');
            } catch (err) { addMessage("⚠️ 無法啟動錄音，請檢查權限", 'system'); }
        }

        function stopAudioRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                document.getElementById('recording-status').classList.add('hidden');
                document.getElementById('recording-status').classList.remove('flex');
                addMessage("⏹️ 錄音結束，處理中...", 'system');
            }
        }

            let serpData = null, lastErrorMsg = "";

        async function handleSendMessage() {
            if(appState.isThinking) return;
            const input = document.getElementById('user-input');
            let text = input.value.trim();
            
            // Check for attached chat image
            const hasChatImage = appState.chatImageBase64 !== null;
            
            if (text.length > 4 && text.length % 2 === 0) {
                 const mid = text.length / 2;
                 if (text.substring(0, mid) === text.substring(mid)) { text = text.substring(0, mid); }
            }
            
            // If no text and no image, do nothing
            if(!text && !hasChatImage) return;

            // 1. Voice Commands
            if (text.includes("開始錄音")) { input.value = ''; initialInput = ''; addMessage(text, 'user'); startAudioRecording(); return; }
            if (text.includes("停止錄音")) { input.value = ''; initialInput = ''; addMessage(text, 'user'); stopAudioRecording(); return; }

            // 2. Emergency Call
            const emergencyMatch = text.match(/^(?:call|撥打)\s*(110|119)$/i);
            if (emergencyMatch) { input.value = ''; initialInput = ''; if(recognition) recognition.stop(); triggerEmergency(emergencyMatch[1]); return; }

            // 3. Normal Call
            const callMatch = text.match(/^(?:call|撥打)\s*(\+?\d+)$/i);
            if (callMatch) {
                input.value = ''; initialInput = ''; if(recognition) recognition.stop();
                if (executeNativeCall(callMatch[1])) { addMessage(`📞 透過原生 Bridge 撥出：${callMatch[1]}`, 'system'); } 
                else { addMessage(`📞 呼叫電話 APP：${callMatch[1]}`, 'system'); window.open(`tel:${callMatch[1]}`, '_self'); }
                return;
            }

            // Chat & Vision Logic Start
            appState.isThinking = true;
            updateSendButtonState(true);
            
            // Store image context for this specific message request
            const imgDataToPass = hasChatImage ? { base64: appState.chatImageBase64, mime: appState.chatImageMime } : null;
            
            // Render User Message with or without image
            addMessage(text || "請分析這張圖片", 'user', null, [], imgDataToPass ? imgDataToPass.base64 : null);
            
            input.value = '';
            initialInput = ''; 
            clearChatImage(); // Clear preview after sending
            
            if (recognition && !appState.isContinuous) recognition.stop();
            renderThinkingState(true);

            // 4. Reminders
            if (appState.pendingReminder && appState.reminderStage > 0) {
                 const todo = appState.todos.find(t => t.id === appState.pendingReminder);
                 if (todo) {
                     let combinedText = todo.tempTimeStr ? `${todo.tempTimeStr} ${text}` : text;

                     } else if (timeInfo.missing === 'ampm') {

                     } else { addMessage(`無法識別時間，請重試 (例如: 明天下午3點)`, 'system'); }

                            addMessage(`⚠️ 代理搜尋失敗，將以原始知識庫回答。`, 'system');

        // --- Natural Language Time Parser ---
        function parseTimeNatural(str) {
            const now = new Date();
            let result = { complete: false, timestamp: null, missing: null };
            
            const relMatch = str.match(/(\d+)\s*(分鐘|min|minute|小時|hour|hr|秒|sec|second)後?/i);
            if (relMatch) {
                const amount = parseInt(relMatch[1]);
                const unit = relMatch[2];
                if (unit.includes('分') || unit.includes('min')) now.setMinutes(now.getMinutes() + amount);
                else if (unit.includes('小') || unit.includes('h')) now.setHours(now.getHours() + amount);
                else if (unit.includes('秒') || unit.includes('s')) now.setSeconds(now.getSeconds() + amount);
                return { complete: true, timestamp: now.getTime() };
            }

            let targetDate = new Date();
            let hasDate = false;
            if (str.includes('明天') || str.includes('tomorrow')) { targetDate.setDate(targetDate.getDate() + 1); hasDate = true; } 
            else if (str.includes('後天')) { targetDate.setDate(targetDate.getDate() + 2); hasDate = true; } 
            else if (str.match(/\d{1,2}月\d{1,2}日/)) { const dMatch = str.match(/(\d{1,2})月(\d{1,2})日/); targetDate.setMonth(parseInt(dMatch[1]) - 1); targetDate.setDate(parseInt(dMatch[2])); hasDate = true; } 
            else if (str.includes('今天') || str.includes('today')) { hasDate = true; }

            let hour = -1, minute = 0;
            const timeMatch = str.match(/(\d{1,2})[:：](\d{2})/); 
            const hourMatch = str.match(/(\d{1,2})點(\d{1,2})?分?/); 
            
            if (timeMatch) { hour = parseInt(timeMatch[1]); minute = parseInt(timeMatch[2]); } 
            else if (hourMatch) { hour = parseInt(hourMatch[1]); if (hourMatch[2]) minute = parseInt(hourMatch[2]); }

            let isPM = str.includes('下午') || str.includes('晚上') || str.includes('pm') || str.includes('PM');
            let isAM = str.includes('上午') || str.includes('早上') || str.includes('am') || str.includes('AM');

            if (hour !== -1) {
                if (hour < 12 && !isPM && !isAM && !str.includes('24h')) return { complete: false, missing: 'ampm' }; 
                if (isPM && hour < 12) hour += 12;
                if (isAM && hour === 12) hour = 0; 
                targetDate.setHours(hour, minute, 0, 0);
                if (!hasDate) { if (targetDate < new Date()) return { complete: false, missing: 'date' }; }
                return { complete: true, timestamp: targetDate.getTime() };
            }
            return { complete: false, missing: 'time' };
        }

        async function fetchAIResponse(userText, model, options = {}) {
            const fetchWithTimeout = async (url, fetchOpts, timeout = 30000) => {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                try { const response = await fetch(url, { ...fetchOpts, signal: controller.signal }); clearTimeout(id); return response; } 
                catch (error) { clearTimeout(id); throw new Error(error.name === 'AbortError' ? '連線逾時 (30s)' : error.message); }
            };

            try {
                const key = appState.keys[model];
                if(!key) throw new Error(`未填寫 ${MODEL_CONFIG[model]?.name || model} API Key`);

                if(model === 'gemini') {
                    const modelName = 'gemini-2.5-flash';
                    const partsArray = [{ text: userText }];
                    
                    if (options.image && options.image.base64) {
                        const base64Data = options.image.base64.split(',')[1];
                        partsArray.push({ inlineData: { mimeType: options.image.mime, data: base64Data } });
                    }
                    
                    const payload = { contents: [{ parts: partsArray }], generationConfig: { temperature: 0.7, maxOutputTokens: 4096 } };
                    if ((appState.isSearchEnabled || options.enableSearch) && !options.disableSearch && !options.image) { payload.tools = [{ google_search: {} }]; }

                    const res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`, { 
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) 
                    });
                    
                    const data = await res.json();
                    if (!res.ok) throw new Error(`Gemini 錯誤: ${data.error?.message || res.status}`);

                    const candidate = data.candidates?.[0];
                    if (!candidate) return "⚠️ API 未回傳內容，請檢查設定。";

                    let outputText = "";
                    if (candidate.content && candidate.content.parts) { outputText = candidate.content.parts.filter(p => p.text).map(p => p.text).join(""); }

                    let sources = [];
                    if (candidate.groundingMetadata?.groundingAttributions) {
                        candidate.groundingMetadata.groundingAttributions.forEach(attr => { if (attr.web?.uri) sources.push({ title: attr.web.title || "參考連結", uri: attr.web.uri }); });
                    }

                    if (!outputText && sources.length > 0) outputText = "已為您搜尋到相關資訊，請參考來源連結。";
                    else if (!outputText) outputText = "(無回傳文字內容)";

                    return { text: outputText, sources: sources };
                    
                } else if (model === 'groq') {
                    const res = await fetchWithTimeout('https://api.groq.com/openai/v1/chat/completions', { method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'user', content: userText }] }) });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error?.message || `Groq 錯誤 (${res.status})`);
                    return data.choices?.[0]?.message?.content || "無回應";
                } else if (model === 'cohere') {
                    const res = await fetchWithTimeout('https://api.cohere.com/v1/chat', { 
                        method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json', 'Accept': 'application/json' }, 
                        body: JSON.stringify({ model: 'command-r-plus-08-2024', message: userText }) 
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(`Cohere 錯誤: ${data.message || res.status}`);
                    return data.text || "無回應";
                } else if (model === 'grok') {
                    const myProxy = 'https://grokcaller.kirishimatoka00.workers.dev/'; 
                    let mName = appState.grokModel || 'grok-4-1-fast-reasoning';
                    
                    // 防呆：如果是圖像辨識 (分析圖片)，絕對不能用 imagine 繪圖模型，強制幫切換成文字分析模型
                    if (options.image && mName.includes('imagine')) {
                        mName = 'grok-4-1-fast-reasoning';
                    }

                    let apiUrl, payload;
                    
                    if (mName.includes('imagine')) {
                        apiUrl = 'https://api.x.ai/v1/images/generations';
                        payload = { model: mName, prompt: userText };
                    } else {
                        apiUrl = 'https://api.x.ai/v1/chat/completions';
                        let msgContent = userText;
                        // 處理 Grok 視覺圖片傳入
                        if (options.image && options.image.base64) {
                            const base64Data = options.image.base64.split(',')[1];
                            msgContent = [
                                { type: "text", text: userText },
                                { type: "image_url", image_url: { url: `data:${options.image.mime};base64,${base64Data}` } }
                            ];
                        }
                        payload = { model: mName, messages: [{role: "user", content: msgContent}], temperature: 0.7 };
                    }

                    const fullUrl = `${myProxy}?url=${encodeURIComponent(apiUrl)}`;
                    const res = await fetchWithTimeout(fullUrl, { method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    
                    if (!res.ok) { const errText = await res.text(); throw new Error(`Worker 錯誤: ${errText}`); }
                    const data = await res.json(); 
                    
                    // 解析繪圖模型
                    if (mName.includes('imagine')) {
                        if (data.data && data.data[0]) {
                            if (data.data[0].url) return `✨ 生成成功！\n\n![Generated Image](${data.data[0].url})\n\n[🔗 點擊這裡開啟原檔](${data.data[0].url})`;

                        }
                        return `生成任務已處理，回傳內容：\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
                    }

                    return data.choices?.[0]?.message?.content || "無回應";
                } else if (model === 'gpt') {
