                    const data = await res.json(); 
                    if (!res.ok) throw new Error(`${data.error?.message || res.status}`);
                    return data.choices?.[0]?.message?.content || "無回應";
                }
            } catch(e) { throw e; }
        }

        // --- ALARM LOGIC ---
        function checkReminders() {
            const now = Date.now();
            appState.todos.forEach(todo => {
                if (todo.alertTime && !todo.alerted && !todo.done) {
                    if (now >= todo.alertTime) { todo.alerted = true; saveData(); triggerAlarm(todo.text); }
                }
            });
        }

        function triggerAlarm(text) {
            document.getElementById('alarm-text').innerText = text;
            document.getElementById('alarm-modal').classList.remove('hidden'); document.getElementById('alarm-modal').classList.add('flex');
            
            if (!alarmAudioCtx) { const AudioContext = window.AudioContext || window.webkitAudioContext; if (AudioContext) alarmAudioCtx = new AudioContext(); }
            if (alarmAudioCtx) {
                if (alarmAudioCtx.state === 'suspended') alarmAudioCtx.resume();
                const playBeep = () => {
                    const osc = alarmAudioCtx.createOscillator(); const gain = alarmAudioCtx.createGain();
                    osc.type = 'square'; osc.frequency.setValueAtTime(880, alarmAudioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(440, alarmAudioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, alarmAudioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, alarmAudioCtx.currentTime + 0.5);
                    osc.connect(gain); gain.connect(alarmAudioCtx.destination); osc.start(); osc.stop(alarmAudioCtx.currentTime + 0.5);
                };
                playBeep(); alarmInterval = setInterval(playBeep, 1000);
            }
            if (navigator.vibrate) navigator.vibrate([300, 200, 300, 200, 300]);
        }

        function stopAlarm() {
            document.getElementById('alarm-modal').classList.add('hidden'); document.getElementById('alarm-modal').classList.remove('flex');
            if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
            if (navigator.vibrate) navigator.vibrate(0);
        }

        // --- INIT ---
        window.onload = () => {
            if(appState.messages.length === 0) {
                appState.messages.push({ id: 1, text: 'NOVA 21 啟動！\n✅ 已優化 GPS 定位雙重備援機制 (Nominatim + GeoJS)\n✅ 圖片轉文字分析已變更為 Grok 優先，Gemini 備用\n✅ 解除限制：Grok 等模型現已支援連網搜尋 (代理爬蟲注入)', sender: 'ai', model: 'gemini', time: getTime() });
            }
            renderAll();
            
            const safeSet = (id, val) => { const el = document.getElementById(id); if(el) el.value = val || ''; };
            safeSet('key-gemini', appState.keys.gemini);
            safeSet('key-groq', appState.keys.groq);
            safeSet('key-cohere', appState.keys.cohere);
            safeSet('key-openai', appState.keys.openai);
            safeSet('key-grok', appState.keys.grok);
            safeSet('key-serpapi', appState.keys.serpapi);
            safeSet('key-doc-url', appState.docMonitorUrl);
            safeSet('key-note-doc-url', appState.noteDocUrl);
            safeSet('key-note-doc-url-2', appState.noteDocUrl2);
            safeSet('key-drive-url', appState.driveUrl);
            
            const inputMain = document.getElementById('doc-input-main');
            if(inputMain) inputMain.addEventListener('paste', handlePaste);

            // 支援在聊天框中直接 Ctrl+V 貼上圖片
            document.getElementById('user-input').addEventListener('paste', (e) => {
                const items = (e.clipboardData || window.clipboardData).items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        const blob = items[i].getAsFile();
                        const reader = new FileReader();
                        reader.onload = function(evt) {
                            appState.chatImageBase64 = evt.target.result;
                            appState.chatImageMime = blob.type;
                            document.getElementById('chat-image-preview').src = evt.target.result;
                            document.getElementById('chat-image-preview-container').classList.remove('hidden');
                        };
                        reader.readAsDataURL(blob);
                        e.preventDefault(); return;
                    }
                }
            });
            
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) { 
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition; 
                recognition = new SR(); recognition.lang = 'zh-TW'; recognition.continuous = true; recognition.interimResults = true; 
                let voiceTimer = null; let finalTranscript = ''; 
                recognition.onstart = () => { appState.isListening = true; updateVoiceUI(); initialInput = document.getElementById('user-input').value; };
                recognition.onend = () => { appState.isListening = false; updateVoiceUI(); if(voiceTimer) { clearTimeout(voiceTimer); voiceTimer = null; if(document.getElementById('user-input').value.trim() !== initialInput.trim()) handleSendMessage(); } if (appState.isContinuous) recognition.start(); };
                recognition.onresult = (e) => {
                    let transcript = ""; for (let i = 0; i < e.results.length; ++i) transcript += e.results[i][0].transcript;
                    if (transcript.length > 0 && transcript.length % 2 === 0) {
                         const mid = transcript.length / 2; if (transcript.substring(0, mid) === transcript.substring(mid)) transcript = transcript.substring(0, mid);
                    }
                    const input = document.getElementById('user-input'); input.value = initialInput + (initialInput && transcript ? " " : "") + transcript;
                    if (voiceTimer) clearTimeout(voiceTimer);
                    voiceTimer = setTimeout(() => { handleSendMessage(); voiceTimer = null; recognition.stop(); }, 6000);
                };
                
                noteRecognition = new SR(); noteRecognition.lang = 'zh-TW'; noteRecognition.continuous = true; noteRecognition.interimResults = true;
                let noteVoiceTimer = null; let noteFinalTranscript = '';
                noteRecognition.onstart = () => { appState.isNoteListening = true; updateNoteVoiceUI(); initialInput = document.getElementById('doc-input-main').value; };
                noteRecognition.onend = () => { appState.isNoteListening = false; updateNoteVoiceUI(); if(noteVoiceTimer) clearTimeout(noteVoiceTimer); };
                noteRecognition.onresult = (e) => {
                    let transcript = ""; for (let i = 0; i < e.results.length; ++i) transcript += e.results[i][0].transcript;
                    if (transcript.length > 0 && transcript.length % 2 === 0) {
                        const mid = transcript.length / 2; if (transcript.substring(0, mid) === transcript.substring(mid)) transcript = transcript.substring(0, mid);
                    }
                    const el = document.getElementById('doc-input-main'); const separator = (initialInput && transcript) ? "\n" : ""; el.value = initialInput + separator + transcript;
                    if (noteVoiceTimer) clearTimeout(noteVoiceTimer); noteVoiceTimer = setTimeout(() => { noteRecognition.stop(); }, 6000);
                };
            }

            tryGetLocation(true);
            updateModelUI();
        };
    </script>
</body>
</html>
