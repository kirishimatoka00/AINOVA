<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA 33.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 925: '#0f172a' } },
                    animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'spin-slow': 'spin 2s linear infinite' }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .dot-flashing {
            position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff;
            animation: dot-flashing 1s infinite linear alternate; animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ""; display: inline-block; position: absolute; top: 0; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff; animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before { left: -10px; animation-delay: 0s; }
        .dot-flashing::after { left: 10px; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: #9880ff; } 50%, 100% { background-color: rgba(152, 128, 255, 0.2); } }
        /* Enhanced content styling for Docs content */
        .msg-content a, #doc-content-area a { color: #60a5fa; text-decoration: underline; word-break: break-all; cursor: pointer; }
        .msg-content img, #doc-content-area img { max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.1); }
        .msg-content p, #doc-content-area div { margin-bottom: 0.5em; line-height: 1.6; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        .msg-group:hover .msg-actions { opacity: 1; }
        .msg-actions { opacity: 0; transition: opacity 0.2s; }
        /* Recording Pulse */
        @keyframes recordPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .recording-dot { animation: recordPulse 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans overflow-hidden selection:bg-blue-500/30">

    <div class="flex h-[100dvh] w-full">
        <!-- Sidebar -->
        <aside class="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800 p-6 flex-shrink-0">
            <div class="flex items-center space-x-3 mb-10 px-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-infinity text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">NOVA 33.3</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">Ultimate Edition</p>
                </div>
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg transition-all"><i class="ph ph-chats-circle text-xl"></i><span class="font-medium">助理對話</span></button>
                <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-calendar-check text-xl"></i><span class="font-medium">行程管理</span></button>
                <button onclick="switchTab('notes')" id="nav-notes" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-notebook text-xl"></i><span class="font-medium">筆記/文件</span></button>
                <button onclick="switchTab('audio')" id="nav-audio" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-waveform text-xl"></i><span class="font-medium">錄音紀錄</span></button>
            </nav>
            <div class="mt-auto space-y-3">
                <button onclick="openSettings()" class="flex items-center space-x-2 text-xs text-slate-500 hover:text-slate-300 w-full px-2"><i class="ph ph-gear"></i><span>設定 & API</span></button>
                <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
                    <div class="flex items-center space-x-2"><i id="status-icon" class="ph-fill ph-globe text-blue-400 text-lg"></i><span id="status-name" class="font-bold text-sm">Gemini</span></div>
                    <p id="model-version-display" class="text-[10px] text-slate-500 mt-1">Ready</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-slate-950 overflow-hidden min-h-0">
            <!-- Mobile Header -->
            <div class="md:hidden flex items-center justify-between p-3 bg-slate-900 border-b border-slate-800 z-30 shrink-0">
                <div class="flex items-center space-x-2 shrink-0"><i class="ph-bold ph-infinity text-blue-500 text-xl"></i><span class="font-bold text-white">Nova 33.3</span></div>
                
                <div class="flex items-center space-x-3 ml-auto pl-2">
                    <div class="flex items-center space-x-1 bg-slate-800/50 px-2 py-1 rounded-lg border border-slate-700/50 cursor-pointer active:scale-95 transition-transform" onclick="cycleManualLocation()">
                        <i id="mobile-weather-icon" class="ph-fill ph-navigation-arrow text-blue-400"></i><span id="mobile-weather-temp" class="text-xs font-bold text-white whitespace-nowrap">更新</span>
                    </div>
                    <button onclick="openSettings()"><i class="ph ph-gear text-slate-400 text-xl"></i></button>
                    <button onclick="toggleMobileMenu()"><i class="ph ph-list text-white text-2xl"></i></button>
                </div>
            </div>

            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden fixed inset-0 z-40 bg-slate-950/95 pt-20 px-6 backdrop-blur-md">
                <nav class="space-y-4">
                    <button onclick="switchTab('dashboard'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl bg-slate-800 text-white"><i class="ph ph-chats-circle text-xl"></i><span>助理對話</span></button>
                    <button onclick="switchTab('schedule'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-calendar-check text-xl"></i><span>行程管理</span></button>
                    <button onclick="switchTab('notes'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-notebook text-xl"></i><span>筆記/文件</span></button>
                    <button onclick="switchTab('audio'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-waveform text-xl"></i><span>錄音紀錄</span></button>
                </nav>
            </div>

            <!-- Settings Modal -->
            <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl flex flex-col max-h-[90vh]">
                    <div class="flex justify-between items-center mb-6 shrink-0"><h3 class="text-xl font-bold text-white">設定</h3><button onclick="closeSettings()"><i class="ph ph-x text-2xl text-slate-400"></i></button></div>
                    <div class="space-y-4 overflow-y-auto flex-1 pr-2">
                        
                        <!-- Docs Monitor Section -->
                        <div class="bg-gradient-to-r from-blue-900/30 to-indigo-900/30 p-4 rounded-xl border border-blue-500/50 shadow-inner space-y-4">
                            <div>
                                <label class="block text-xs text-blue-300 mb-2 font-bold flex items-center gap-2"><i class="ph-fill ph-robot"></i> 系統代理 Google Doc (搜尋/爬蟲)</label>
                                <input type="text" id="key-doc-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-xs focus:border-blue-500 outline-none mb-2" placeholder="Apps Script URL (for Agent)">
                            </div>
                            
                            <div class="grid grid-cols-1 gap-2">
                                <div>
                                    <label class="block text-xs text-emerald-300 mb-1 font-bold"><i class="ph-fill ph-notebook"></i> 隨手記事本 A URL</label>
                                    <input type="text" id="key-note-doc-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-emerald-500 outline-none" placeholder="Apps Script URL (Notebook A)">
                                </div>
                                <div>
                                    <label class="block text-xs text-teal-300 mb-1 font-bold"><i class="ph-fill ph-notebook"></i> 隨手記事本 B URL</label>
                                    <input type="text" id="key-note-doc-url-2" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-teal-500 outline-none" placeholder="Apps Script URL (Notebook B)">
                                </div>
                            </div>

                            <div class="border-t border-white/10 pt-2">
                                 <label class="block text-xs text-red-300 mb-1 font-bold"><i class="ph-fill ph-upload"></i> Google Drive 上傳 URL (錄音用)</label>
                                 <input type="text" id="key-drive-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-red-500 outline-none" placeholder="Apps Script URL (Drive Upload)">
                            </div>

                            <div class="flex items-center justify-between mt-2">
                                <span id="doc-monitor-status" class="text-[10px] text-slate-500">未測試</span>
                                <button onclick="testDocConnection()" class="text-[10px] bg-blue-600 px-3 py-1 rounded text-white hover:bg-blue-500 transition-colors">測試連線</button>
                            </div>
                        </div>
                        <div class="space-y-3 pt-2 pb-4 border-b border-slate-800">
                            <div><label class="block text-xs text-blue-400 mb-1">Gemini API Key</label><input type="password" id="key-gemini" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-blue-500 outline-none"></div>
                            <div><label class="block text-xs text-green-400 mb-1">SerpApi Key</label><input type="password" id="key-serpapi" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-green-500 outline-none" placeholder="Your SerpApi Key"></div>
                            <div><label class="block text-xs text-rose-400 mb-1">Groq API Key</label><input type="password" id="key-groq" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-rose-500 outline-none"></div>
                            <div><label class="block text-xs text-violet-400 mb-1">Cohere API Key</label><input type="password" id="key-cohere" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-violet-500 outline-none"></div>
                            <div><label class="block text-xs text-emerald-400 mb-1">OpenAI API Key</label><input type="password" id="key-openai" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-emerald-500 outline-none"></div>
                            <div><label class="block text-xs text-slate-300 mb-1">Grok API Key</label><input type="password" id="key-grok" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-slate-500 outline-none"></div>
                        </div>
                    </div>
                    <!-- Export / Import / Save controls in Footer -->
                    <div class="mt-4 pt-2 flex justify-between items-center shrink-0">
                        <div class="flex space-x-2">
                            <button onclick="exportSettings()" class="flex items-center gap-1 text-xs text-blue-400 bg-blue-900/30 border border-blue-500/30 px-3 py-2 rounded-lg hover:bg-blue-800/50 transition-colors"><i class="ph-bold ph-download-simple"></i> 匯出設定</button>
                            <label for="import-settings-input" class="flex items-center gap-1 text-xs text-emerald-400 bg-emerald-900/30 border border-emerald-500/30 px-3 py-2 rounded-lg hover:bg-emerald-800/50 transition-colors cursor-pointer"><i class="ph-bold ph-upload-simple"></i> 匯入設定</label>
                            <input type="file" id="import-settings-input" accept=".json" class="hidden" onchange="importSettings(event)">
                        </div>
                        <div class="flex space-x-3">
                            <button onclick="closeSettings()" class="px-4 py-2 text-slate-400 text-sm">取消</button>
                            <button onclick="saveKeys()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500">儲存</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ALARM MODAL -->
            <div id="alarm-modal" class="hidden fixed inset-0 z-[60] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6">
                <div class="bg-slate-900 border border-red-500/50 rounded-2xl p-8 max-w-sm w-full text-center shadow-[0_0_50px_rgba(239,68,68,0.3)] animate-pulse">
                    <i class="ph-fill ph-alarm text-6xl text-red-500 mb-4 inline-block animate-bounce"></i>
                    <h3 class="text-2xl font-bold text-white mb-2">時間到！</h3>
                    <p id="alarm-text" class="text-lg text-slate-300 mb-8">提醒事項內容</p>
                    <button onclick="stopAlarm()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95">
                        <i class="ph-bold ph-check-circle mr-2"></i> 確 定 (停止)
                    </button>
                </div>
            </div>

            <!-- DASHBOARD VIEW -->
            <div id="view-dashboard" class="flex flex-col lg:flex-row h-full w-full relative min-h-0">
                <div class="flex-1 flex flex-col h-full min-w-0 relative">
                    <div class="p-3 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm flex justify-between items-center shrink-0 overflow-x-auto no-scrollbar">
                         <div class="flex items-center space-x-2 mr-4 shrink-0">
                            <span id="web-search-badge" class="hidden md:flex items-center space-x-1 text-[10px] bg-blue-900/30 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded-full"><i class="ph-bold ph-globe"></i><span>連網搜尋</span></span>
                            
                            <!-- Recording Indicator -->
                            <div id="recording-status" onclick="stopAudioRecording()" class="hidden items-center space-x-2 bg-red-900/50 border border-red-500/50 px-3 py-1 rounded-full animate-pulse mr-2 cursor-pointer hover:bg-red-800/50 transition-colors" title="點擊停止錄音">
                                <div class="w-2 h-2 bg-red-500 rounded-full recording-dot"></div>
                                <span class="text-xs text-red-200 font-bold">錄音中... (點擊停止)</span>
                            </div>

                            <span id="doc-monitor-badge" class="hidden items-center space-x-1 text-[10px] bg-emerald-900/30 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded-full animate-pulse"><i class="ph-bold ph-arrows-clockwise"></i><span>Docs 監控中</span></span>
                            <button onclick="clearChatHistory()" class="text-[10px] text-slate-500 hover:text-red-400 flex items-center space-x-1 border border-slate-700 px-2 py-0.5 rounded-lg transition-colors"><i class="ph-bold ph-trash"></i><span>清空對話</span></button>
                         </div>
                         
                         <!-- Dropdown Model Selection -->
                         <div class="flex space-x-2 ml-auto shrink-0">
                             <select id="grok-sub-model-select" onchange="setGrokModel(this.value)" class="hidden bg-slate-800 border border-slate-600 text-slate-300 text-xs rounded-lg px-2 py-1 outline-none focus:border-blue-500 font-medium max-w-[140px] md:max-w-none">
                                 <optgroup label="Language models">
                                     <option value="grok-4-1-fast-reasoning">grok-4-1-fast-reasoning</option>
                                     <option value="grok-4-1-fast-non-reasoning">grok-4-1-fast-non-reasoning</option>
                                     <option value="grok-code-fast-1">grok-code-fast-1</option>
                                     <option value="grok-4-fast-reasoning">grok-4-fast-reasoning</option>
                                     <option value="grok-4-fast-non-reasoning">grok-4-fast-non-reasoning</option>
                                     <option value="grok-4-0709">grok-4-0709</option>
                                     <option value="grok-3-mini">grok-3-mini</option>
                                     <option value="grok-3">grok-3</option>
                                 </optgroup>
                                 <optgroup label="Image generation models">
                                     <option value="grok-imagine-image-pro">grok-imagine-image-pro</option>
                                     <option value="grok-imagine-image">grok-imagine-image</option>
                                 </optgroup>
                                 <optgroup label="Video generation models">
                                     <option value="grok-imagine-video">grok-imagine-video</option>
                                 </optgroup>
                             </select>
                             <select id="main-model-select" onchange="setModel(this.value)" class="bg-slate-800 border border-slate-600 text-white text-xs rounded-lg px-3 py-1 outline-none focus:border-blue-500 font-bold tracking-wide">
                                 <option value="gemini">Gemini</option>
                                 <option value="grok">Grok</option>
                                 <option value="groq">Groq</option>
                                 <option value="cohere">Cohere</option>
                                 <option value="gpt">OpenAI</option>
                             </select>
                         </div>
                    </div>
                    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 scrollbar-thin scrollbar-thumb-slate-700"></div>
                    
                    <!-- Chat Input Area -->
                    <div class="p-4 bg-slate-900 border-t border-slate-800 shrink-0 z-20 pb-[calc(1rem+env(safe-area-inset-bottom))] flex flex-col gap-2 relative">
                        
                        <!-- File/Image Preview Container -->
                        <div id="chat-file-preview-container" class="hidden relative inline-flex items-center bg-slate-800 p-2 rounded-lg border border-slate-700 shadow-md self-start">
                            <img id="chat-image-preview" src="" class="h-12 w-auto rounded hidden mr-2">
                            <div id="chat-file-icon-wrapper" class="hidden flex items-center justify-center bg-blue-900/50 w-12 h-12 rounded mr-2">
                                <i class="ph-fill ph-file text-2xl text-blue-400"></i>
                            </div>
                            <span id="chat-file-name" class="text-xs text-slate-300 max-w-[150px] truncate">filename</span>
                            <button onclick="clearChatFile()" class="absolute -top-2 -right-2 bg-slate-700 border border-slate-600 text-slate-300 hover:text-red-400 rounded-full p-1 shadow-lg transition-colors"><i class="ph-bold ph-x text-xs"></i></button>
                        </div>

                        <!-- 隱藏的音檔分析專用 Input -->
                        <input type="file" id="audio-analyze-input" accept="audio/*,video/*,.webm,.m4a,.mp3,.mp4,.wav" class="hidden" onchange="handleAudioAnalyzeSelect(event)">

                        <!-- LINE 風格輸入框 -->
                        <div id="input-wrapper" class="flex items-end bg-slate-950 rounded-xl px-2 py-2 border border-slate-700 focus-within:border-blue-500 transition-colors">
                            <label for="chat-file-input" class="p-2 mb-1 rounded-lg text-slate-500 hover:text-emerald-400 hover:bg-slate-800 transition-all flex-shrink-0 cursor-pointer" title="上傳檔案或圖片">
                                <i class="ph-bold ph-paperclip text-xl"></i>
                            </label>
                            <input type="file" id="chat-file-input" accept="*/*" class="hidden" onchange="handleChatFileSelect(event)">

                            <button id="continuous-btn" onclick="toggleContinuous()" class="p-2 mb-1 rounded-lg text-slate-500 hover:text-emerald-400 hover:bg-slate-800 transition-all flex-shrink-0" title="連續語音對話 (6秒自動發送)"><i id="continuous-icon" class="ph-bold ph-infinity text-xl"></i></button>
                            <button id="search-toggle-btn" onclick="toggleSearch()" class="p-2 mb-1 rounded-lg text-slate-500 hover:text-blue-400 hover:bg-slate-800 transition-all flex-shrink-0" title="開關連網搜尋"><i id="search-icon" class="ph-bold ph-globe text-xl"></i></button>
                            <button id="voice-btn" onclick="toggleVoice()" class="p-2 mb-1 mr-2 rounded-lg text-slate-400 hover:text-white hover:bg-slate-800 transition-all active:scale-95 flex-shrink-0"><i id="voice-icon" class="ph-bold ph-microphone text-xl"></i></button>
                            
                            <textarea id="user-input" rows="1" placeholder="對話、搜尋、撥打..." class="flex-1 bg-transparent border-none focus:ring-0 text-white outline-none resize-none py-2.5 my-0.5 leading-relaxed scrollbar-none" style="min-height: 44px; max-height: 120px; overflow-y: auto;" onkeydown="handleEnter(event)" oninput="autoResizeInput(this)"></textarea>
                            
                            <button onclick="handleSendMessage()" id="send-btn" class="ml-2 p-2 px-3 mb-1 rounded-lg text-white bg-blue-600 hover:opacity-90 flex-shrink-0 transition-all"><i id="send-icon" class="ph-bold ph-paper-plane-right"></i></button>
                        </div>
                        <div id="search-hint" class="text-[10px] text-blue-400 text-center hidden">🌐 已開啟連網搜尋 (支援各模型)</div>
                    </div>
                </div>
                
                <!-- Right Sidebar -->
                <div class="hidden lg:flex w-80 bg-slate-900 flex-col p-6 space-y-6 border-l border-slate-800 overflow-y-auto shrink-0">
                    <div class="bg-gradient-to-br from-indigo-900 to-slate-800 rounded-3xl p-6 text-white shadow-lg border border-slate-700 relative overflow-hidden group">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
                        <div class="relative z-10">
                            <div class="flex justify-between items-start">
                                <div><h3 class="text-slate-300 text-xs font-bold uppercase mb-1">目前天氣</h3><div class="flex items-center space-x-2 cursor-pointer hover:opacity-80 transition-opacity" onclick="cycleManualLocation()"><i class="ph-fill ph-map-pin text-blue-400"></i><span id="location-name" class="text-lg font-bold text-white border-b border-dashed border-slate-500">未定位</span></div></div><i id="weather-icon" class="ph-fill ph-cloud-sun text-4xl text-yellow-400"></i>
                            </div>
                            <div class="mt-4 flex items-end space-x-2"><span id="weather-temp" class="text-5xl font-bold">--°</span><span id="weather-desc" class="text-slate-300 text-sm mb-2">--</span></div>
                        </div>
                    </div>
                    <div class="bg-slate-950 rounded-2xl p-5 border border-slate-800">
                        <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-slate-200 text-sm flex items-center gap-2"><i class="ph-fill ph-calendar-check text-blue-500"></i>近期任務</h3><button onclick="switchTab('schedule')" class="text-xs text-blue-400">管理</button></div>
                        <div id="mini-todo-list" class="space-y-2"></div>
                    </div>
                    <div class="bg-slate-950 rounded-2xl p-5 border border-slate-800">

    <!-- MAIN SCRIPT -->
    <script>
        let recognition = null; let noteRecognition = null; let voiceTimer = null; let initialInput = "";
        let alarmInterval = null; let alarmAudioCtx = null; let mediaRecorder = null; let audioChunks = [];

        // --- IndexedDB 全面初始化 (涵蓋所有巨量資料) ---
        const DB_NAME = 'NovaDB';
        const DB_VERSION = 2; // 升級資料庫版本以支援 notes, todos, audioRecords
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) {
                    console.warn("瀏覽器不支援 IndexedDB，紀錄將無法永久保存。");
                    resolve(null);
                    return;
                }
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('messages')) db.createObjectStore('messages', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('notes')) db.createObjectStore('notes', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('todos')) db.createObjectStore('todos', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('audioRecords')) db.createObjectStore('audioRecords', { keyPath: 'id' });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e.target.error);
            });
        }

        function loadStoreFromDB(storeName) {
            return new Promise((resolve, reject) => {
                if (!db) return resolve([]);
                try {
                    const tx = db.transaction(storeName, 'readonly');
                    const req = tx.objectStore(storeName).getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => resolve([]);
                } catch(e) { resolve([]); }
            });
        }

        function saveToDB(storeName, item) {
            if (!db) return;
            try {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).put(item);
            } catch(e) { console.error("DB Save Error:", e); }
        }

        function deleteFromDB(storeName, id) {
            if (!db) return;
            try {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).delete(id);
            } catch(e) { console.error("DB Delete Error:", e); }
        }

        function clearStoreDB(storeName) {
            if (!db) return;
            try {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).clear();
            } catch(e) { console.error("DB Clear Error:", e); }
        }

        // --- 應用程式狀態 ---
        const appState = {
            currentModel: 'gemini', grokModel: 'grok-4-1-fast-reasoning', 
            chatFile: null, 
            docMonitorUrl: localStorage.getItem('nova_doc_url') || '', noteDocUrl: localStorage.getItem('nova_note_doc_url') || '', noteDocUrl2: localStorage.getItem('nova_note_doc_url_2') || '', activeNotebook: 1, driveUrl: localStorage.getItem('nova_drive_url') || '',
            messages: [], notes: [], todos: [], audioRecords: [], // 初始化皆為空，等待 DB 讀取
            weather: { temp: '--', condition: 'cloudy', humidity: '--', wind: '--', loc: '未定位' },
            keys: { gemini: localStorage.getItem('nova_key_gemini')||'', groq: localStorage.getItem('nova_key_groq')||'', cohere: localStorage.getItem('nova_key_cohere')||'', openai: localStorage.getItem('nova_key_openai')||'', grok: localStorage.getItem('nova_key_grok')||'', serpapi: localStorage.getItem('nova_key_serpapi')||'' },
            isThinking: false, isListening: false, isNoteListening: false, noteVoiceActive: false, isSearchEnabled: false, isContinuous: false, manualLocIndex: 0,
            manualLocs: [{name: "台北", lat: 25.0330, lon: 121.5654}, {name: "台中", lat: 24.1477, lon: 120.6736}, {name: "高雄", lat: 22.6273, lon: 120.3014}],
            pendingReminder: null, reminderStage: 0, countryCode: 'TW', lastLat: null, lastLon: null, sosTimer: null, sosCount: 10, isSOSDrill: false,
            recordingContext: 'default', currentAudioTranscript: '', editNoteImagesBase64: [], writeMode: 'text', pastedImageBase64: null,
            // 音檔轉錄分析專用狀態
            pendingAnalyzePrompt: "", pendingAnalyzeContextId: null, pendingAnalyzeType: "" 
        };
        
        const MODEL_CONFIG = {
            gemini: { name: 'Gemini', color: 'text-blue-400', bg: 'bg-blue-600', icon: 'ph-globe' }, grok: { name: 'Grok', color: 'text-slate-100', bg: 'bg-slate-600', icon: 'ph-lightning' }, groq: { name: 'Groq', color: 'text-rose-400', bg: 'bg-rose-600', icon: 'ph-rocket' }, cohere: { name: 'Cohere', color: 'text-violet-400', bg: 'bg-violet-600', icon: 'ph-cpu' }, gpt: { name: 'OpenAI', color: 'text-emerald-400', bg: 'bg-emerald-600', icon: 'ph-cpu' }
        };

        function getTime() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
        function formatMessage(text) { 
            if (!text) return ''; 
            let safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>'); 
            safe = safe.replace(/\[([^\]]+)\]\((https?:\/\/[^\s<]+?)\)|(https?:\/\/[^\s<)\]]+)/g, function(match, mdTitle, mdUrl, rawUrl) {
                if (mdUrl) return `<a href="${mdUrl}" target="_blank" class="text-blue-400 underline break-all">${mdTitle}</a>`; else if (rawUrl) return `<a href="${rawUrl}" target="_blank" class="text-blue-400 underline break-all">${rawUrl}</a>`; return match;
            });
            return safe.replace(/\n/g, '<br>'); 
        }
        function escapeHtml(t){return t?t.replace(/&/g,"&").replace(/</g,"<").replace(/>/g,">"):""}

        function renderAll() { renderMessages(); renderTodos(); renderNotes(); renderAudioRecords(); renderWeather(); }
        
        function renderMessages() { 
            const container = document.getElementById('chat-container'); if(!container) return;
            container.innerHTML = appState.messages.map(msg => { 
                const isUser = msg.sender === 'user'; const modelInfo = isUser ? null : MODEL_CONFIG[msg.model]; 
                let sourcesHTML = msg.sources?.length ? `<div class="mt-3 pt-3 border-t border-slate-700/50"><p class="text-[10px] text-slate-400 mb-1 font-bold">來源：</p><div class="flex flex-wrap gap-2">${msg.sources.map((s,i)=>`<a href="${s.uri}" target="_blank" class="text-[10px] bg-slate-950/50 text-blue-400 px-2 py-1 rounded border border-slate-700/50 block truncate max-w-[150px]">${i+1}. ${s.title}</a>`).join('')}</div></div>` : ''; 
                
                let mediaHTML = '';
                if (msg.file) {
                    if (msg.file.category === 'image' && msg.file.data) {
                        mediaHTML = `<img src="${msg.file.data}" class="max-w-xs md:max-w-sm rounded-lg border border-slate-700/50 mb-2 shadow-sm">`;
                    } else {
                        let iconType = msg.file.category === 'image' ? 'ph-image' : 'ph-file';
                        if (msg.file.mime && (msg.file.mime.includes('audio') || msg.file.mime.includes('video'))) iconType = 'ph-file-audio';
                        mediaHTML = `<div class="flex items-center gap-2 bg-slate-950/50 p-2 rounded border border-slate-700/50 mb-2 max-w-xs overflow-hidden"><i class="ph-fill ${iconType} text-blue-400 text-xl shrink-0"></i><span class="text-xs text-slate-300 truncate">${escapeHtml(msg.file.name)}</span></div>`;
                    }
                }

                return `<div class="group flex ${isUser ? 'justify-end' : 'justify-start items-start space-x-3'} fade-in relative mb-4">
                    ${!isUser ? `<div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-1 ${modelInfo?.bg||'bg-slate-700'}"><i class="ph-fill ${modelInfo?.icon||'ph-robot'} text-white text-sm"></i></div>` : ''}
                    <div class="msg-group relative max-w-[90%] md:max-w-[80%] rounded-2xl p-4 shadow-sm ${isUser ? 'bg-slate-800 text-white rounded-br-none' : 'bg-slate-900 border border-slate-800 text-slate-200 rounded-tl-none'}">
                        ${!isUser ? `<span class="text-[10px] font-bold uppercase mb-1 block ${modelInfo?.color||'text-slate-400'} opacity-80">${modelInfo?.name||'System'}</span>` : ''}
                        ${mediaHTML} <div class="msg-content text-sm leading-relaxed">${formatMessage(msg.text)}</div> ${sourcesHTML}
                        <p class="text-[10px] mt-2 text-right text-slate-500 opacity-60">${msg.time}</p>
                        
                        <!-- 收藏與刪除動作按鈕 -->
                        <div class="msg-actions absolute top-2 right-2 flex space-x-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="favoriteMessage(${msg.id})" class="p-1.5 text-slate-500 hover:text-yellow-400 transition-colors bg-slate-950/80 rounded-full backdrop-blur-sm" title="收藏至筆記"><i class="ph-bold ph-star text-xs"></i></button>
                            <button onclick="deleteMessage(${msg.id})" class="p-1.5 text-slate-500 hover:text-red-400 transition-colors bg-slate-950/80 rounded-full backdrop-blur-sm" title="刪除"><i class="ph-bold ph-trash text-xs"></i></button>
                        </div>
                    </div></div>`; 
            }).join(''); 
            container.scrollTop = container.scrollHeight; 
        }

        function renderThinkingState(show) { 
            const el = document.getElementById('thinking-indicator'); const container = document.getElementById('chat-container');
            if(show && !el && container) container.insertAdjacentHTML('beforeend', `<div id="thinking-indicator" class="flex justify-start items-center space-x-3 fade-in"><div class="w-8 h-8 rounded-full flex items-center justify-center ${MODEL_CONFIG[appState.currentModel]?.bg || 'bg-slate-700'}"><i class="ph-fill ${MODEL_CONFIG[appState.currentModel]?.icon || 'ph-robot'} text-white text-sm"></i></div><div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl rounded-tl-none"><div class="dot-flashing ml-2"></div></div></div>`); 
            else if(!show && el) el.remove(); 
        }

        function renderTodos() {

        // --- CHAT FILE & IMAGE UPLOAD (UNIVERSAL) & MIME TYPE FIX ---
        function triggerChatImageUpload() { document.getElementById('chat-file-input').click(); }
        
        function handleChatFileSelect(e) {
            const file = e.target.files[0]; if (!file) return;
            if (file.size > 20 * 1024 * 1024) { alert("檔案過大，請上傳小於 20MB 的檔案以確保穩定性。"); e.target.value = ''; return; }

            const isText = file.type.startsWith('text/') || !!file.name.match(/\.(txt|csv|md|json|js|html|css|py|cpp|c|java)$/i);
            const isImage = file.type.startsWith('image/');
            const isMedia = file.type.startsWith('audio/') || file.type.startsWith('video/') || file.type === 'application/pdf' || !!file.name.match(/\.(pdf|mp3|wav|mp4|webm|m4a)$/i);
            let category = isImage ? 'image' : (isText ? 'text' : (isMedia ? 'media' : 'unknown'));
            if (category === 'unknown') category = 'media'; 
            
            if (isText && file.size > 2 * 1024 * 1024) alert("提醒：純文字檔案較大，可能超出 AI 分析上限，建議擷取重點上傳。");

            // 修正 WebM 等多媒體的 MIME Type，避免 Gemini API 解析失敗
            let mimeType = file.type || 'application/octet-stream';
            const filenameLower = file.name.toLowerCase();
            if (filenameLower.endsWith('.webm')) mimeType = 'audio/webm';
            else if (filenameLower.endsWith('.mp3')) mimeType = 'audio/mp3';
            else if (filenameLower.endsWith('.wav')) mimeType = 'audio/wav';
            else if (filenameLower.endsWith('.m4a')) mimeType = 'audio/m4a';
            else if (filenameLower.endsWith('.mp4')) mimeType = 'video/mp4';
            else if (filenameLower.endsWith('.pdf')) mimeType = 'application/pdf';

            const reader = new FileReader();
            reader.onload = function(evt) {
                appState.chatFile = { category: category, data: evt.target.result, mime: mimeType, name: file.name };
                showFilePreview(file.name, isImage, evt.target.result);
            };
            if (category === 'text') reader.readAsText(file); else reader.readAsDataURL(file);
            e.target.value = ''; 
        }

        function showFilePreview(name, isImage, dataUrl) {

        function handleAudioAnalyzeSelect(e) {

            if (file.size > 20 * 1024 * 1024) {

            }

            let mimeType = file.type || 'application/octet-stream';
            const filenameLower = file.name.toLowerCase();
            if (filenameLower.endsWith('.webm')) mimeType = 'audio/webm';
            else if (filenameLower.endsWith('.mp3')) mimeType = 'audio/mp3';
            else if (filenameLower.endsWith('.wav')) mimeType = 'audio/wav';
            else if (filenameLower.endsWith('.m4a')) mimeType = 'audio/m4a';
            else if (filenameLower.endsWith('.mp4')) mimeType = 'video/mp4';

            const reader = new FileReader();
            reader.onload = function(evt) {
                appState.chatFile = { 
                    category: 'media', 
                    data: evt.target.result, 
                    mime: mimeType, 
                    name: file.name 
                };
                
                showFilePreview(file.name, false, null);
                switchTab('dashboard');
                document.getElementById('user-input').value = appState.pendingAnalyzePrompt;
                
                e.target.value = '';
                handleSendMessage(); // 載入完成後直接自動送出分析
            };
            reader.readAsDataURL(file);
        }

        function exportNoteWord(id) {
            const n = appState.notes.find(x=>x.id===id); if(!n) return;
            
            let imgTags = '';
            const displayImages = n.images || (n.image ? [n.image] : []);
            if (displayImages.length > 0) {
                imgTags = displayImages.map(img => `<br><br><img src="${img}" style="max-width: 100%;">`).join('');
            }

            // Word 格式需要加上 BOM (\ufeff) 及特定的 Namespace 以保證多數瀏覽器能正確轉碼下載
            let htmlContent = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'><title>${n.title}</title></head>
            <body>
            <h1>${n.title}</h1>
            <p style="color:gray; font-size:12px;">建立日期: ${n.date}</p>
            <div style="margin-top:20px; font-family: sans-serif; white-space: pre-wrap;">${n.content.replace(/\n/g, '<br>')}</div>
            ${imgTags}
            </body></html>`;

            try {
                const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); 
                a.href = url; 
                a.download = `${n.title.replace(/[/\\?%*:|"<>]/g, '-')}.doc`; 
                document.body.appendChild(a); 
                a.click(); 
                document.body.removeChild(a); 
                setTimeout(() => URL.revokeObjectURL(url), 100);
            } catch (e) {
                alert("下載失敗，您的瀏覽器可能阻擋了 Blob 生成：" + e.message);
            }
        }

        async function tryGetLocation(silent=false) { 
            if(!silent) updateLocStatus("GPS定位中..."); 
            if (navigator.geolocation) { 
                navigator.geolocation.getCurrentPosition(
                    (p) => {
                        appState.lastLat = p.coords.latitude; appState.lastLon = p.coords.longitude;
                        fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&localityLanguage=zh-tw`)
                            .then(r=>r.json()).then(d => { 
                                if(d.countryCode) appState.countryCode = d.countryCode.toUpperCase(); 
                                const city = d.city || d.locality || d.principalSubdivision || "目前位置";
                                fetchWeather(p.coords.latitude, p.coords.longitude, city, silent);
                            }).catch(() => { fetchWeather(p.coords.latitude, p.coords.longitude, "GPS定位", silent); });
                    }, (e) => getIPLocation(silent), { timeout: 5000, enableHighAccuracy: true } 
                ); 
            } else getIPLocation(silent); 
        }
        
        async function getIPLocation(silent) { 
            if(!silent) updateLocStatus("IP定位中..."); 
            try { 
                const res = await fetch('https://ipapi.co/json/'); if(!res.ok) throw new Error(); 
                const data=await res.json(); 
                appState.lastLat = data.latitude; appState.lastLon = data.longitude; if (data.country_code) appState.countryCode = data.country_code;
                fetchWeather(data.latitude, data.longitude, `${data.city}(IP)`, silent); 
            } catch(e){ 
                try { 
                    const res2 = await fetch('https://ipwho.is/'); const data2 = await res2.json(); if(!data2.success) throw new Error(); 
                    appState.lastLat = data2.latitude; appState.lastLon = data2.longitude; if (data2.country_code) appState.countryCode = data2.country_code;
                    fetchWeather(data2.latitude, data2.longitude, `${data2.city}(IP)`, silent); 
                } catch(e2) { 
                    updateLocStatus("定位失敗"); if(!silent) addMessage("⚠️ 定位失敗，已切換至預設城市", "system"); 
                    const def = appState.manualLocs[0]; appState.countryCode = 'TW'; fetchWeather(def.lat, def.lon, def.name + " (預設)", true);

        function startVoiceNote() { appState.recordingContext = 'note'; switchTab('dashboard'); appState.currentAudioTranscript = ""; startAudioRecording(); }
        async function startAudioRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { addMessage("⚠️ 瀏覽器不支援錄音", 'system'); return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = []; appState.currentAudioTranscript = ""; 
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data); mediaRecorder.onstop = uploadAudioRecording; mediaRecorder.start();
                document.getElementById('recording-status').classList.remove('hidden'); document.getElementById('recording-status').classList.add('flex');
                let titleMsg = appState.recordingContext === 'note' ? "🎙️ 開始錄製「語音筆記」... (點擊上方紅燈停止)" : "🎙️ 開始錄音... (可輸入「結束錄音」或點擊上方紅燈停止)";
                addMessage(titleMsg, 'system');
                if (recognition && !appState.isListening) { initialInput = document.getElementById('user-input').value; recognition.start(); }
            } catch (err) { addMessage("⚠️ 無法啟動錄音，請檢查麥克風權限", 'system'); }
        }
        function stopAudioRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop(); if(mediaRecorder.stream) { mediaRecorder.stream.getTracks().forEach(track => track.stop()); }
                if (recognition) { try { recognition.abort(); } catch(e){} }
                document.getElementById('recording-status').classList.add('hidden'); document.getElementById('recording-status').classList.remove('flex');
                addMessage("⏹️ 錄音結束，正在處理並上傳檔案...", 'system');
            } else { document.getElementById('recording-status').classList.add('hidden'); document.getElementById('recording-status').classList.remove('flex'); }
        }
        
        async function uploadAudioRecording() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const dateObj = new Date(); const dateStr = dateObj.toISOString().split('T')[0]; const timeStr = dateObj.toTimeString().split(' ')[0].replace(/:/g, ''); const recordId = Date.now();
            const filename = `NOVA_Audio_${dateStr}_${timeStr}.webm`; const displayDate = dateObj.toLocaleString();
            let finalDriveUrl = "此為跨域代理，請至您的 Google Drive 確認檔案";

            if (!appState.driveUrl) {
                const url = URL.createObjectURL(audioBlob); const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
                addMessage(`⚠️ 未設定 Drive URL，音檔已自動下載。`, 'system'); finalDriveUrl = url; 
            } else {
                addMessage(`☁️ 正在上傳 ${filename} 到 Google Drive...`, 'system');
                let base64data = '';
                try {
                    const reader = new FileReader(); reader.readAsDataURL(audioBlob);
                    base64data = await new Promise((resolve) => { reader.onloadend = () => resolve(reader.result.split(',')[1]); });
                    const res = await fetch(appState.driveUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filename, mimeType: 'audio/webm', data: base64data }) });
                    if (res.ok) {
                        const resText = await res.text();
                        try { const resJson = JSON.parse(resText); finalDriveUrl = resJson.url || resJson.link || resText; } catch(e) { finalDriveUrl = resText; }
                        addMessage(`✅ 錄音已上傳成功`, 'system');
                    } else { throw new Error('HTTP ' + res.status); }
                } catch (e) { 
                    try {
                        addMessage(`⚠️ 無法直接取得真實連結 (需在 Apps Script 啟用 CORS)。改以背景排程上傳...`, 'system');
                        if (base64data) {
                            await fetch(appState.driveUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filename, mimeType: 'audio/webm', data: base64data }) });
                            finalDriveUrl = "https://drive.google.com/"; 
                        } else {
                            throw new Error('無法讀取音檔內容');
                        }
                    } catch(err) { addMessage(`❌ 上傳失敗: ${err.message}`, 'system'); }
                }
            }

            const capturedTranscript = appState.currentAudioTranscript ? appState.currentAudioTranscript.trim() : "";

        // --- Natural Language Time Parser ---
        function parseTimeNatural(str) {
            const now = new Date(); let result = { complete: false, timestamp: null, missing: null };
            const relMatch = str.match(/(\d+)\s*(分鐘|min|minute|小時|hour|hr|秒|sec|second)後?/i);
            if (relMatch) {
                const amount = parseInt(relMatch[1]); const unit = relMatch[2];
                if (unit.includes('分') || unit.includes('min')) now.setMinutes(now.getMinutes() + amount);
                else if (unit.includes('小') || unit.includes('h')) now.setHours(now.getHours() + amount);
                else if (unit.includes('秒') || unit.includes('s')) now.setSeconds(now.getSeconds() + amount);
                return { complete: true, timestamp: now.getTime() };
            }
            let targetDate = new Date(); let hasDate = false;
            if (str.includes('明天') || str.includes('tomorrow')) { targetDate.setDate(targetDate.getDate() + 1); hasDate = true; } 
            else if (str.includes('後天')) { targetDate.setDate(targetDate.getDate() + 2); hasDate = true; } 
            else if (str.match(/\d{1,2}月\d{1,2}日/)) { const dMatch = str.match(/(\d{1,2})月(\d{1,2})日/); targetDate.setMonth(parseInt(dMatch[1]) - 1); targetDate.setDate(parseInt(dMatch[2])); hasDate = true; } 
            else if (str.includes('今天') || str.includes('today')) { hasDate = true; }

            let hour = -1, minute = 0;
            const timeMatch = str.match(/(\d{1,2})[:：](\d{2})/); const hourMatch = str.match(/(\d{1,2})點(\d{1,2})?分?/); 
            if (timeMatch) { hour = parseInt(timeMatch[1]); minute = parseInt(timeMatch[2]); } 
            else if (hourMatch) { hour = parseInt(hourMatch[1]); if (hourMatch[2]) minute = parseInt(hourMatch[2]); }

            let isPM = str.includes('下午') || str.includes('晚上') || str.includes('pm') || str.includes('PM');
            let isAM = str.includes('上午') || str.includes('早上') || str.includes('am') || str.includes('AM');

            if (hour !== -1) {
                if (hour < 12 && !isPM && !isAM && !str.includes('24h')) return { complete: false, missing: 'ampm' }; 
                if (isPM && hour < 12) hour += 12; if (isAM && hour === 12) hour = 0; 
                targetDate.setHours(hour, minute, 0, 0);
                if (!hasDate) { if (targetDate < new Date()) return { complete: false, missing: 'date' }; }
                return { complete: true, timestamp: targetDate.getTime() };
            }
            return { complete: false, missing: 'time' };
        }

        async function fetchAIResponse(userText, model, options = {}) {
            const fetchWithTimeout = async (url, fetchOpts, timeout = 60000) => { // 分析音檔可能需要較長 timeout
                const controller = new AbortController(); const id = setTimeout(() => controller.abort(), timeout);
                try { const response = await fetch(url, { ...fetchOpts, signal: controller.signal }); clearTimeout(id); return response; } 
                catch (error) { clearTimeout(id); throw new Error(error.name === 'AbortError' ? '連線逾時，檔案可能過大或處理過久 (60s)' : error.message); }
            };

            try {
                const key = appState.keys[model]; if(!key) throw new Error(`未填寫 ${MODEL_CONFIG[model]?.name || model} API Key`);

                if(model === 'gemini') {
                    const modelName = 'gemini-2.5-flash'; const partsArray = [{ text: userText }];
                    if (options.file && options.file.category !== 'text') {
                        const base64Data = options.file.data.split(',')[1]; partsArray.push({ inlineData: { mimeType: options.file.mime, data: base64Data } });

                        const base64Data = options.file.data.split(',')[1]; msgContent = [ { type: "text", text: userText }, { type: "image_url", image_url: { url: `data:${options.file.mime};base64,${base64Data}` } } ];
                    }
                    const res = await fetchWithTimeout(ep, { method:'POST', headers:{'Content-Type':'application/json', 'Authorization':`Bearer ${key}`}, body: JSON.stringify({model:mName, messages:[{role:"user", content:msgContent}]}) });
                    const resText = await res.text(); let data; try { data = JSON.parse(resText); } catch(e) { throw new Error(`API 異常: ${resText.substring(0, 50)}`); }
                    if (!res.ok) throw new Error(`${data.error?.message || res.status}`); return data.choices?.[0]?.message?.content || "無回應";
                }
            } catch(e) { throw e; }
        }

        // --- INIT ---
        window.onload = async () => {
            try {
                await initDB();
                appState.messages = (await loadStoreFromDB('messages')).sort((a,b)=>a.id-b.id);
                appState.notes = (await loadStoreFromDB('notes')).sort((a,b)=>b.id-a.id);
                appState.todos = (await loadStoreFromDB('todos')).sort((a,b)=>b.id-a.id);
                appState.audioRecords = (await loadStoreFromDB('audioRecords')).sort((a,b)=>b.id-a.id);

                const migrateLS = (lsKey, storeName, stateArray) => {
                    const oldData = localStorage.getItem(lsKey);
                    if (oldData && stateArray.length === 0) {
                        try {
                            const parsed = JSON.parse(oldData);
                            parsed.forEach(item => saveToDB(storeName, item));
                            stateArray.push(...parsed);
                            localStorage.removeItem(lsKey);
                        } catch(e) {}
                    }
                };
                migrateLS('nova_messages', 'messages', appState.messages);
                migrateLS('nova_notes', 'notes', appState.notes);
                migrateLS('nova_todos', 'todos', appState.todos);
                migrateLS('nova_audio_records', 'audioRecords', appState.audioRecords);
            } catch (err) { console.error("IndexedDB 初始化失敗", err); }

            if(appState.messages.length === 0) {
                const welcomeMsg = { 
                    id: Date.now(), 
                    text: 'NOVA 33.3 Ultimate 音訊分析大升級完畢！\n\n✅ **真．實體音檔分析**：現在點擊「選取實體音檔分析」，系統會直接讀取您的 `.webm` 或其他音檔，保證產生 100% 完整的逐字稿並進行摘要整理！\n✅ **自動修復 MIME 格式**：手動上傳 WebM 給 Gemini 也不會再發生解析錯誤，系統已全面強化格式相容性。\n✅ **分析結果自動儲存**：當音檔分析完成後，完整的逐字稿與摘要將會自動附加到您原本的「錄音紀錄」與「語音筆記」中永久保存。', 
                    sender: 'ai', model: 'gemini', time: getTime(), sources: [], file: null 
                };
                appState.messages.push(welcomeMsg); saveToDB('messages', welcomeMsg);
            }
            
            renderAll();
            
            const safeSet = (id, val) => { const el = document.getElementById(id); if(el) el.value = val || ''; };
            safeSet('key-gemini', appState.keys.gemini); safeSet('key-groq', appState.keys.groq); safeSet('key-cohere', appState.keys.cohere); safeSet('key-openai', appState.keys.openai); safeSet('key-grok', appState.keys.grok); safeSet('key-serpapi', appState.keys.serpapi); safeSet('key-doc-url', appState.docMonitorUrl); safeSet('key-note-doc-url', appState.noteDocUrl); safeSet('key-note-doc-url-2', appState.noteDocUrl2); safeSet('key-drive-url', appState.driveUrl);
            
            const inputMain = document.getElementById('doc-input-main');
            if(inputMain) inputMain.addEventListener('paste', handlePaste);
            const userInput = document.getElementById('user-input');
            if(userInput) { userInput.addEventListener('paste', handlePaste); }
            
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) { 
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition; 
                recognition = new SR(); recognition.lang = 'zh-TW'; recognition.continuous = true; recognition.interimResults = true; 
                let voiceTimer = null; 
                
                recognition.onstart = () => { appState.isListening = true; updateVoiceUI(); initialInput = document.getElementById('user-input').value; };
                recognition.onend = () => { 
                    appState.isListening = false; updateVoiceUI(); 
                    if(voiceTimer) { clearTimeout(voiceTimer); voiceTimer = null; } 
                    if (appState.isContinuous || (mediaRecorder && mediaRecorder.state === 'recording')) { 
                        setTimeout(() => { try { recognition.start(); } catch(e){} }, 250); 
                    } 
                };
                
                recognition.onresult = (e) => {
                    let currentTranscript = ""; 
                    for (let i = 0; i < e.results.length; ++i) {
                        let text = e.results[i][0].transcript;
                        if (text.length >= 4 && text.length % 2 === 0) { const mid = text.length / 2; if (text.substring(0, mid) === text.substring(mid)) text = text.substring(0, mid); }
                        currentTranscript += text;
                    }
                    if (document.getElementById('recording-status').classList.contains('flex')) { appState.currentAudioTranscript = currentTranscript.trim(); }
                    const input = document.getElementById('user-input'); input.value = (initialInput ? initialInput + " " : "") + currentTranscript.trim(); autoResizeInput(input);
                    if (document.getElementById('recording-status').classList.contains('hidden')) {
                        if (voiceTimer) clearTimeout(voiceTimer); voiceTimer = setTimeout(() => { handleSendMessage(); }, 6000);
                    }
                };
                
                noteRecognition = new SR(); noteRecognition.lang = 'zh-TW'; noteRecognition.continuous = true; noteRecognition.interimResults = true;
                let noteVoiceTimer = null;
                
                noteRecognition.onstart = () => { appState.isNoteListening = true; updateNoteVoiceUI(); initialInput = document.getElementById('doc-input-main').value; };
                noteRecognition.onend = () => { 
                    appState.isNoteListening = false; updateNoteVoiceUI(); 
                    if(noteVoiceTimer) clearTimeout(noteVoiceTimer); 
                    if (appState.noteVoiceActive) { setTimeout(() => { try { noteRecognition.start(); } catch(e){} }, 250); }
                };
                noteRecognition.onresult = (e) => {
                    let currentTranscript = ""; 
                    for (let i = 0; i < e.results.length; ++i) {
                        let text = e.results[i][0].transcript;
                        if (text.length >= 4 && text.length % 2 === 0) { const mid = text.length / 2; if (text.substring(0, mid) === text.substring(mid)) text = text.substring(0, mid); }
                        currentTranscript += text;
                    }
                    const el = document.getElementById('doc-input-main'); const separator = (initialInput && currentTranscript) ? "\n" : ""; el.value = initialInput + separator + currentTranscript.trim();
                    if (noteVoiceTimer) clearTimeout(noteVoiceTimer); noteVoiceTimer = setTimeout(() => { appState.noteVoiceActive = false; noteRecognition.stop(); }, 6000);
                };
            }
            tryGetLocation(true); updateModelUI(); 
            // 提醒事項間隔檢查
            const checkReminders = () => {
                const now = Date.now();
                appState.todos.forEach(t => {
                    if (t.alertTime && t.alertEnabled !== false && !t.alerted && t.alertTime <= now && !t.done) {
                        t.alerted = true; saveToDB('todos', t); renderTodos();
                        document.getElementById('alarm-text').innerText = t.text;
                        document.getElementById('alarm-modal').classList.remove('hidden'); document.getElementById('alarm-modal').classList.add('flex');
                        try {
                            alarmAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            const osc = alarmAudioCtx.createOscillator(); const gain = alarmAudioCtx.createGain();
                            osc.type = 'sine'; osc.frequency.setValueAtTime(880, alarmAudioCtx.currentTime);
                            osc.connect(gain); gain.connect(alarmAudioCtx.destination);
                            osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, alarmAudioCtx.currentTime + 0.5);
                            alarmInterval = setInterval(() => {
                                const osc2 = alarmAudioCtx.createOscillator(); const gain2 = alarmAudioCtx.createGain();
                                osc2.type = 'sine'; osc2.frequency.setValueAtTime(880, alarmAudioCtx.currentTime);
                                osc2.connect(gain2); gain2.connect(alarmAudioCtx.destination);
                                osc2.start(); gain2.gain.exponentialRampToValueAtTime(0.00001, alarmAudioCtx.currentTime + 0.5);
                            }, 1000);
                        } catch(e) {}
                    }
                });
            };
            setInterval(checkReminders, 10000);
            window.stopAlarm = function() {
                document.getElementById('alarm-modal').classList.add('hidden'); document.getElementById('alarm-modal').classList.remove('flex');
                if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
                if (alarmAudioCtx) { alarmAudioCtx.close(); alarmAudioCtx = null; }
            };
        };
    </script>
</body>
