                    } else {
                        apiUrl = 'https://api.x.ai/v1/chat/completions';
                        const messagesPayload = chatHistory.map(m => ({ role: m.sender === 'user' ? 'user' : 'assistant', content: m.text || "[附檔]" }));
                        let finalUserContent = finalPrompt;
                        if (options.file && options.file.category === 'image') {
                            const base64Data = options.file.data.split(',')[1];
                            finalUserContent = [ { type: "text", text: finalPrompt }, { type: "image_url", image_url: { url: `data:${options.file.mime};base64,${base64Data}` } } ];
                        }
                        messagesPayload.push({role: "user", content: finalUserContent});
                        payload = { model: mName, messages: messagesPayload, temperature: 0.7 };
                    }
                    const fullUrl = `${myProxy}?url=${encodeURIComponent(apiUrl)}`;
                    const res = await fetchWithTimeout(fullUrl, { method: 'POST', headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const resText = await res.text();
                    if (!res.ok) throw new Error(`${resText}`);
                    const data = JSON.parse(resText);
                    
                    if (mName.includes('imagine')) {
                        let successTxt = `✨ 圖片生成成功！已為您附在下方。`;
                        if (isGrokAutoRouted) successTxt += `\n\n*(系統提示：Grok Multi 已自動為您調配至 **${mName}** 執行繪圖任務)*`;
                        
                        if (data.data && data.data[0]) {
                            if (data.data[0].url) return { text: successTxt, sources: [], file: { category: 'image', data: data.data[0].url, name: 'Grok_Image.png' } };
                            else if (data.data[0].b64_json) return { text: successTxt, sources: [], file: { category: 'image', data: `data:image/png;base64,${data.data[0].b64_json}`, name: 'Grok_Image.png' } };
                        }
                        return `生成任務已處理，回傳內容：\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
                    }

                    let outputText = data.choices?.[0]?.message?.content || "無回應";
                    if (isGrokAutoRouted && !options.isAnalysis && !options.isTranslateB) outputText += `\n\n*(系統提示：Grok Multi 已自動為您調配至 **${mName}** 執行此任務)*`;
                    return outputText;
                }
            } catch(e) { throw e; }
        }

        window.onload = async () => {
            try {
                await window.initDB();
                appState.messages = (await window.loadStoreFromDB('messages')).sort((a,b)=>a.id-b.id);
                appState.notes = (await window.loadStoreFromDB('notes')).sort((a,b)=>b.id-a.id);
                appState.todos = (await window.loadStoreFromDB('todos')).sort((a,b)=>b.id-a.id);
                appState.audioRecords = (await window.loadStoreFromDB('audioRecords')).sort((a,b)=>b.id-a.id);

                const migrateLS = (lsKey, storeName, stateArray) => {
                    const oldData = localStorage.getItem(lsKey);
                    if (oldData && stateArray.length === 0) {
                        try {
                            const parsed = JSON.parse(oldData); parsed.forEach(item => window.saveToDB(storeName, item));
                            stateArray.push(...parsed); localStorage.removeItem(lsKey);
                        } catch(e) {}
                    }
                };
                migrateLS('nova_messages', 'messages', appState.messages);
                migrateLS('nova_notes', 'notes', appState.notes);
                migrateLS('nova_todos', 'todos', appState.todos);
                migrateLS('nova_audio_records', 'audioRecords', appState.audioRecords);
            } catch (err) { console.error("IndexedDB 初始化失敗", err); }

            if(appState.messages.length === 0) {
                const welcomeMsg = { 
                    id: Date.now(), 
                    text: 'NOVA 90 系統升級完畢！\n\n✅ **底層重構與穩定性修復**：修復了因升級造成的錄音按鈕失效問題，並徹底確保所有前端操作能無縫呼叫系統核心。\n✅ **全自動 Web Audio 聲音偵測 (VAD)**：在口譯模式 B 中，系統精準捕捉發聲與停頓，全自動擷取並送出，給您對講機般的流暢體驗。\n✅ **抗幻覺防護罩**：AI 在分析語音或整理摘要時，會絕對恪守客觀準則，遇無效音訊將自動過濾，不再產生任何腦補內容！', 
                    sender: 'ai', model: 'gemini', time: window.getTime(), sources: [], file: null 
                };
                appState.messages.push(welcomeMsg); window.saveToDB('messages', welcomeMsg);
            }
            
            window.renderAll();
            
            const safeSet = (id, val) => { const el = document.getElementById(id); if(el) el.value = val || ''; };
            safeSet('key-gemini', appState.keys.gemini); safeSet('key-groq', appState.keys.groq); safeSet('key-cohere', appState.keys.cohere); safeSet('key-openai', appState.keys.openai); safeSet('key-grok', appState.keys.grok); safeSet('key-serpapi', appState.keys.serpapi); safeSet('key-doc-url', appState.docMonitorUrl); safeSet('key-drive-url', appState.driveUrl);
            safeSet('key-voice-timeout', appState.voiceTimeout);
            safeSet('key-translate-b-timeout', appState.translateBTimeout);
            
            const rlEl = document.getElementById('key-reply-length'); if (rlEl) rlEl.value = appState.replyLength;
            const trEl = document.getElementById('key-tts-rate'); if (trEl) trEl.value = appState.ttsRate;
            const hideLiveCaptureEl = document.getElementById('key-hide-live-capture');
            if (hideLiveCaptureEl) hideLiveCaptureEl.checked = appState.hideLiveCapture;
            
            function attachRichPasteHandler(elementId) {
                const el = document.getElementById(elementId);
                if (!el) return;
                el.addEventListener('paste', function(e) {
                    const clipboardData = e.clipboardData || window.clipboardData;
                    if (!clipboardData) return;
                    
                    let plainText = clipboardData.getData('text/plain');
                    let ytMatch = plainText.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s\n]+)/);
                    if (ytMatch && ytMatch[1]) {
                        e.preventDefault();
                        let embedHtml = `<br><div contenteditable="false" style="margin: 10px 0;"><iframe width="100%" height="315" src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allowfullscreen style="border-radius: 8px;"></iframe></div><br>`;
                        document.execCommand('insertHTML', false, embedHtml);
                        return;
                    }

                    let hasHtmlOrText = false;
                    for (let i = 0; i < clipboardData.types.length; i++) {
                        if (clipboardData.types[i] === 'text/html' || clipboardData.types[i] === 'text/plain') hasHtmlOrText = true;
                    }

                    if (!hasHtmlOrText) {
                        const items = clipboardData.items;
                        for (let i = 0; i < items.length; i++) {
                            if (items[i].type.indexOf("image") !== -1) {
                                e.preventDefault();
                                const blob = items[i].getAsFile();
                                const reader = new FileReader();
                                reader.onload = function(evt) { document.execCommand('insertImage', false, evt.target.result); };
                                reader.readAsDataURL(blob);
                                return;
                            }
                        }
                    }
                });
            }

            attachRichPasteHandler('edit-note-content');

            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) { 
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition; 
                
                window.recognition = new SR(); window.recognition.lang = 'zh-TW'; 
                window.recognition.continuous = false; 
                window.recognition.interimResults = true; 
                
                window.recognition.onend = () => { 
                    if ((appState.isContinuous || (window.mediaRecorder && window.mediaRecorder.state === 'recording')) && !appState.isTTSPlaying && !appState.isThinking && appState.translateMode !== 'B') { 
                        setTimeout(() => { try { window.recognition.start(); } catch(e){} }, 300); 
                    }
                };
                
                window.recognition.onerror = (e) => {
                    console.warn("Speech Recognition Error:", e.error);
                };
                
                window.recognition.onresult = (e) => {
                    if (appState.isTTSPlaying) return;

                    let finalT = "";
                    let interimT = "";
                    
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        let text = e.results[i][0].transcript;
                        if (text.length >= 4 && text.length % 2 === 0) { 
                            const mid = text.length / 2; 
                            if (text.substring(0, mid) === text.substring(mid)) text = text.substring(0, mid); 
                        }
                        if (e.results[i].isFinal) finalT += text;
                        else interimT += text;
                    }
                    
                    if (finalT) {
                        window.chatInitialInput += (window.chatInitialInput ? " " : "") + finalT;
                    }

                    if (document.getElementById('recording-status').classList.contains('flex') && appState.translateMode !== 'B') { 
                        appState.currentAudioTranscript = window.chatInitialInput + (interimT ? " " + interimT : ""); 
                    }
                    
                    const input = document.getElementById('user-input'); 
                    input.value = (window.chatInitialInput + (interimT ? " " + interimT : "")).trim(); 
                    window.autoResizeInput(input);

                    if (document.getElementById('recording-status').classList.contains('hidden') && appState.translateMode !== 'B') { 
                        if (window.voiceTimer) clearTimeout(window.voiceTimer); 
                        window.voiceTimer = setTimeout(() => { 
                            if(input.value.trim() !== '' && !appState.isThinking) window.handleSendMessage(); 
                        }, appState.voiceTimeout * 1000); 
                    }
                };
            }
            window.tryGetLocation(true); window.updateModelUI(); 

            const checkReminders = () => {
                const now = Date.now();
                appState.todos.forEach(t => {
                    if (t.alertTime && t.alertEnabled !== false && !t.alerted && t.alertTime <= now && !t.done) {
                        t.alerted = true; window.saveToDB('todos', t); window.renderTodos();
                        document.getElementById('alarm-text').innerText = t.text; document.getElementById('alarm-modal').classList.remove('hidden'); document.getElementById('alarm-modal').classList.add('flex');
                        try {
                            window.alarmAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            const osc = window.alarmAudioCtx.createOscillator(); const gain = window.alarmAudioCtx.createGain();
                            osc.type = 'sine'; osc.frequency.setValueAtTime(880, window.alarmAudioCtx.currentTime); osc.connect(gain); gain.connect(window.alarmAudioCtx.destination);
                            osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, window.alarmAudioCtx.currentTime + 0.5);
                            window.alarmInterval = setInterval(() => {
                                const osc2 = window.alarmAudioCtx.createOscillator(); const gain2 = window.alarmAudioCtx.createGain();
                                osc2.type = 'sine'; osc2.frequency.setValueAtTime(880, window.alarmAudioCtx.currentTime); osc2.connect(gain2); gain2.connect(window.alarmAudioCtx.destination);
                                osc2.start(); gain2.gain.exponentialRampToValueAtTime(0.00001, window.alarmAudioCtx.currentTime + 0.5);
                            }, 1000);
                        } catch(e) {}
                    }
                });
            };
            setInterval(checkReminders, 10000);

            window.stopAlarm = function() {
                document.getElementById('alarm-modal').classList.add('hidden'); document.getElementById('alarm-modal').classList.remove('flex');
                if (window.alarmInterval) { clearInterval(window.alarmInterval); window.alarmInterval = null; }
                if (window.alarmAudioCtx) { window.alarmAudioCtx.close(); window.alarmAudioCtx = null; }
            };
        };
    </script>
</body>
</html>
