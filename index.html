<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 網頁基本設定：編碼、響應式視口 (防止手機端縮放) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA 90</title>
    
    <!-- 引入外部庫：Tailwind CSS (樣式框架) 與 Phosphor Icons (圖示庫) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- 引入 Google 字體 Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS 自訂設定檔 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { slate: { 925: '#0f172a' } },
                    animation: { 'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite', 'spin-slow': 'spin 2s linear infinite' }
                }
            }
        }
    </script>
    
    <!-- 自訂 CSS 樣式 -->
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        
        .dot-flashing {
            position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff;
            animation: dot-flashing 1s infinite linear alternate; animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: ""; display: inline-block; position: absolute; top: 0; width: 6px; height: 6px; border-radius: 5px; background-color: #9880ff; color: #9880ff; animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before { left: -10px; animation-delay: 0s; }
        .dot-flashing::after { left: 10px; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: #9880ff; } 50%, 100% { background-color: rgba(152, 128, 255, 0.2); } }
        
        .msg-content a { color: #60a5fa; text-decoration: underline; word-break: break-all; cursor: pointer; }
        .msg-content p { margin-bottom: 0.5em; line-height: 1.6; }
        .slide-in { animation: slideIn 0.3s ease-out; }
        
        .msg-group:hover .msg-actions { opacity: 1; }
        .msg-actions { opacity: 0; transition: opacity 0.2s; }
        
        @keyframes recordPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .recording-dot { animation: recordPulse 1.5s infinite; }

        #toast {
            visibility: hidden; min-width: 250px; background-color: #334155; color: #fff; text-align: center;
            border-radius: 8px; padding: 12px; position: fixed; z-index: 100; left: 50%; transform: translateX(-50%);
            bottom: 30px; font-size: 14px; opacity: 0; transition: opacity 0.3s, bottom 0.3s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 120px; }
        
        audio { outline: none; border-radius: 8px; }
        audio::-webkit-media-controls-panel { background-color: #1e293b; color: #fff; }
        audio::-webkit-media-controls-current-time-display, audio::-webkit-media-controls-time-remaining-display { color: #fff; }

        .note-html-content, .note-html-content * { color: inherit !important; background-color: transparent !important; font-family: inherit !important; }
        .note-html-content img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 0.5rem 0; background-color: #f8fafc; }
        .note-html-content a { color: #60a5fa !important; text-decoration: underline !important; }
        .note-html-content ul { list-style-type: disc; margin-left: 1.5rem; }
        .note-html-content ol { list-style-type: decimal; margin-left: 1.5rem; }
        .note-html-content iframe { border-radius: 0.5rem; max-width: 100%; }
        [contenteditable]:empty:before { content: attr(placeholder); color: #64748b; pointer-events: none; display: block; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans overflow-hidden selection:bg-blue-500/30">

    <div class="flex h-[100dvh] w-full relative">
        <!-- ================= 左側邊欄 ================= -->
        <aside class="hidden md:flex flex-col w-64 bg-slate-900 border-r border-slate-800 p-6 flex-shrink-0 z-10">
            <div class="flex items-center space-x-3 mb-10 px-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <i class="ph-bold ph-infinity text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">NOVA 90</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider">Ultimate Edition</p>
                </div>
            </div>
            <nav class="flex-1 space-y-2">
                <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg transition-all"><i class="ph ph-chats-circle text-xl"></i><span class="font-medium">助理對話</span></button>
                <button onclick="switchTab('schedule')" id="nav-schedule" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-calendar-check text-xl"></i><span class="font-medium">行程管理</span></button>
                <button onclick="switchTab('notes')" id="nav-notes" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-notebook text-xl"></i><span class="font-medium">筆記/文件</span></button>
                <button onclick="switchTab('audio')" id="nav-audio" class="nav-item flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-all"><i class="ph ph-waveform text-xl"></i><span class="font-medium">錄音紀錄</span></button>
            </nav>
            <div class="mt-auto space-y-3">
                <button onclick="openSettings()" class="flex items-center space-x-2 text-xs text-slate-500 hover:text-slate-300 w-full px-2"><i class="ph ph-gear"></i><span>設定 & 備份</span></button>
                <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
                    <div class="flex items-center space-x-2"><i id="status-icon" class="ph-fill ph-globe text-blue-400 text-lg"></i><span id="status-name" class="font-bold text-sm">Gemini</span></div>
                    <p id="model-version-display" class="text-[10px] text-slate-500 mt-1">Ready</p>
                </div>
            </div>
        </aside>

        <!-- ================= 主要內容顯示區 ================= -->
        <main class="flex-1 flex flex-col relative bg-slate-950 overflow-hidden min-h-0">
            <!-- 手機版頂部導航列 -->
            <div class="md:hidden flex items-center justify-between p-3 bg-slate-900 border-b border-slate-800 z-30 shrink-0">
                <div class="flex items-center space-x-2 shrink-0"><i class="ph-bold ph-infinity text-blue-500 text-xl"></i><span class="font-bold text-white">Nova 90</span></div>
                <div class="flex items-center space-x-3 ml-auto pl-2">
                    <div class="flex items-center space-x-1 bg-slate-800/50 px-2 py-1 rounded-lg border border-slate-700/50 cursor-pointer active:scale-95 transition-transform" onclick="cycleManualLocation()">
                        <i id="mobile-weather-icon" class="ph-fill ph-navigation-arrow text-blue-400"></i><span id="mobile-weather-temp" class="text-xs font-bold text-white whitespace-nowrap">更新</span>
                    </div>
                    <button onclick="openSettings()"><i class="ph ph-gear text-slate-400 text-xl"></i></button>
                    <button onclick="toggleMobileMenu()"><i class="ph ph-list text-white text-2xl"></i></button>
                </div>
            </div>

            <!-- 手機版全螢幕彈出選單 -->
            <div id="mobile-menu" class="hidden md:hidden fixed inset-0 z-40 bg-slate-950/95 pt-20 px-6 backdrop-blur-md">
                <nav class="space-y-4">
                    <button onclick="switchTab('dashboard'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl bg-slate-800 text-white"><i class="ph ph-chats-circle text-xl"></i><span>助理對話</span></button>
                    <button onclick="switchTab('schedule'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-calendar-check text-xl"></i><span>行程管理</span></button>
                    <button onclick="switchTab('notes'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-notebook text-xl"></i><span>筆記/文件</span></button>
                    <button onclick="switchTab('audio'); toggleMobileMenu()" class="flex items-center space-x-3 w-full p-4 rounded-xl text-slate-400 hover:bg-slate-800"><i class="ph ph-waveform text-xl"></i><span>錄音紀錄</span></button>
                </nav>
            </div>

            <!-- ================= 設定彈窗 (Settings Modal) ================= -->
            <div id="settings-modal" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl flex flex-col max-h-[90vh]">
                    <div class="flex justify-between items-center mb-6 shrink-0"><h3 class="text-xl font-bold text-white">設定</h3><button onclick="closeSettings()"><i class="ph ph-x text-2xl text-slate-400"></i></button></div>
                    <div class="space-y-4 overflow-y-auto flex-1 pr-2 scrollbar-thin">
                        
                        <div class="bg-gradient-to-r from-blue-900/30 to-indigo-900/30 p-4 rounded-xl border border-blue-500/50 shadow-inner space-y-4">
                            <div>
                                <label class="block text-xs text-blue-300 mb-2 font-bold flex items-center gap-2"><i class="ph-fill ph-robot"></i> 系統代理 Google Doc URL</label>
                                <input type="text" id="key-doc-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-xs focus:border-blue-500 outline-none mb-2" placeholder="Apps Script URL">
                            </div>
                            <div class="border-t border-white/10 pt-2">
                                 <label class="block text-xs text-red-300 mb-1 font-bold"><i class="ph-fill ph-upload"></i> Google Drive 上傳 URL</label>
                                 <input type="text" id="key-drive-url" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-red-500 outline-none" placeholder="(選填) 雲端備份 Apps Script URL">
                            </div>
                            <div class="flex items-center justify-between mt-2"><span id="doc-monitor-status" class="text-[10px] text-slate-500">未測試</span><button onclick="testDocConnection()" class="text-[10px] bg-blue-600 px-3 py-1 rounded text-white hover:bg-blue-500 transition-colors">測試連線</button></div>
                        </div>
                        
                        <div class="space-y-3 pt-2 pb-4 border-b border-slate-800">
                            <div><label class="block text-xs text-blue-400 mb-1">Gemini API Key</label><input type="password" id="key-gemini" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-blue-500 outline-none"></div>
                            <div><label class="block text-xs text-green-400 mb-1">SerpApi Key</label><input type="password" id="key-serpapi" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-green-500 outline-none" placeholder="Your SerpApi Key"></div>
                            <div><label class="block text-xs text-rose-400 mb-1">Groq API Key</label><input type="password" id="key-groq" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-rose-500 outline-none"></div>
                            <div><label class="block text-xs text-violet-400 mb-1">Cohere API Key</label><input type="password" id="key-cohere" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-violet-500 outline-none"></div>
                            <div><label class="block text-xs text-emerald-400 mb-1">OpenAI API Key</label><input type="password" id="key-openai" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-emerald-500 outline-none"></div>
                            <div><label class="block text-xs text-slate-300 mb-1">Grok API Key</label><input type="password" id="key-grok" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-slate-500 outline-none"></div>
                            
                            <!-- 進階選項設定 -->
                            <div class="border-t border-slate-700 pt-3 mt-2 grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-xs text-amber-400 mb-1 font-bold"><i class="ph-fill ph-timer"></i> 連續語音等待 (秒)</label>
                                    <input type="number" id="key-voice-timeout" min="1" max="60" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-amber-500 outline-none text-slate-300" placeholder="預設: 5">
                                </div>
                                <div>
                                    <label class="block text-xs text-purple-400 mb-1 font-bold"><i class="ph-fill ph-text-align-justify"></i> AI 回覆長度</label>
                                    <select id="key-reply-length" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-purple-500 outline-none text-slate-300">
                                        <option value="medium">中等 (適中)</option>
                                        <option value="short">極簡短 (約50字)</option>
                                        <option value="unlimited">不限長度 (完整)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="border-t border-slate-700 pt-3 mt-2 grid grid-cols-2 gap-2">
                                <div class="col-span-2">
                                    <label class="block text-xs text-teal-400 mb-1 font-bold"><i class="ph-fill ph-microphone-stage"></i> 語音聲音選擇 (系統可用音軌)</label>
                                    <select id="key-tts-voice" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-teal-500 outline-none text-slate-300">
                                        <option value="">(系統智慧預設)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-teal-400 mb-1 font-bold"><i class="ph-fill ph-speaker-high"></i> 語音速度</label>
                                    <select id="key-tts-rate" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-teal-500 outline-none text-slate-300">
                                        <option value="0.8">慢速 (0.8x)</option>
                                        <option value="1.0">正常 (1.0x)</option>
                                        <option value="1.2">快速 (1.2x)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-amber-400 mb-1 font-bold"><i class="ph-fill ph-timer"></i> 模式B錄音擷取 (秒)</label>
                                    <input type="number" id="key-translate-b-timeout" min="1" max="10" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-xs focus:border-amber-500 outline-none text-slate-300" placeholder="預設: 1">
                                </div>
                            </div>

                            <div class="flex items-center justify-between border-t border-slate-700 pt-3 mt-2">
                                <div>
                                    <label class="block text-xs text-emerald-400 font-bold flex items-center gap-1"><i class="ph-fill ph-eye-slash"></i> 隱藏 LIVE 自動截圖訊息</label>
                                    <p class="text-[10px] text-slate-500 mt-1">開啟後，聊天室不顯示自動傳送的相片畫面。</p>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer ml-3">
                                    <input type="checkbox" id="key-hide-live-capture" class="sr-only peer">
                                    <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                                </label>
                            </div>
                        </div>
                    </div>
                    <!-- 備份與還原按鈕 -->
                    <div class="mt-4 pt-2 flex justify-between items-center shrink-0">
                        <div class="flex space-x-2">
                            <button onclick="exportSettings()" class="flex items-center gap-1 text-[11px] text-blue-400 bg-blue-900/30 border border-blue-500/30 px-3 py-2 rounded-lg hover:bg-blue-800/50 transition-colors"><i class="ph-bold ph-download-simple"></i> 完整備份</button>
                            <label for="import-settings-input" class="flex items-center gap-1 text-[11px] text-emerald-400 bg-emerald-900/30 border border-emerald-500/30 px-3 py-2 rounded-lg hover:bg-emerald-800/50 transition-colors cursor-pointer"><i class="ph-bold ph-upload-simple"></i> 還原備份</label>
                            <input type="file" id="import-settings-input" accept=".json" class="hidden" onchange="importSettings(event)">
                        </div>
                        <div class="flex space-x-3"><button onclick="closeSettings()" class="px-4 py-2 text-slate-400 text-sm">取消</button><button onclick="saveKeys()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500">儲存</button></div>
                    </div>
                </div>
            </div>

            <!-- ================= 口譯模式選擇彈窗 (Translate Modal) ================= -->
            <div id="translate-modal" class="hidden fixed inset-0 z-50 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl flex-col">
                    <div class="flex justify-between items-center mb-6 shrink-0"><h3 class="text-xl font-bold text-white"><i class="ph-bold ph-translate text-blue-400 mr-2"></i>即時口譯模式</h3><button onclick="closeTranslateModal()"><i class="ph ph-x text-2xl text-slate-400"></i></button></div>
                    <div class="space-y-4">
                        <button onclick="toggleTranslateMode('A')" class="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-600 p-4 rounded-xl transition-colors group">
                            <h4 class="font-bold text-white group-hover:text-blue-400 flex items-center gap-2"><i class="ph-bold ph-text-t"></i> 模式 A：文字語音雙向互譯</h4>
                            <p class="text-xs text-slate-400 mt-1">系統先將聲音轉為文字，再交由 AI 翻譯朗讀。適合一般對話、文字輸入與修正使用。</p>
                        </button>
                        <button onclick="toggleTranslateMode('B')" class="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-600 p-4 rounded-xl transition-colors group">
                            <h4 class="font-bold text-white group-hover:text-purple-400 flex items-center gap-2"><i class="ph-bold ph-waveform"></i> 模式 B：全自動音量監聽直譯</h4>
                            <p class="text-xs text-slate-400 mt-1">系統會持續分析麥克風音量。當您開始講話，且講完停頓後，將自動把聲音檔送給 AI，完全無須手動按鈕！</p>
                        </button>
                        <button onclick="toggleTranslateMode('off')" class="w-full text-center bg-red-900/30 hover:bg-red-800/50 text-red-400 border border-red-500/30 p-3 rounded-xl transition-colors font-bold mt-4">
                            關閉即時口譯
                        </button>
                    </div>
                </div>
            </div>

            <!-- ================= 資料夾管理彈窗 (Folder Manage Modal) ================= -->
            <div id="folder-manage-modal" class="hidden fixed inset-0 z-[70] bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl flex-col max-h-[80vh]">
                    <div class="flex justify-between items-center mb-6 shrink-0"><h3 class="text-xl font-bold text-white"><i class="ph-bold ph-folder-open text-emerald-400 mr-2"></i>管理資料夾</h3><button onclick="closeFolderManage()"><i class="ph ph-x text-2xl text-slate-400"></i></button></div>
                    <div id="folder-manage-list" class="space-y-2 overflow-y-auto mb-4 flex-1">
                        <!-- JS Dynamic -->
                    </div>
                    <button onclick="addNewFolder()" class="w-full bg-slate-800 hover:bg-slate-700 text-emerald-400 border border-slate-600 p-3 rounded-xl transition-colors font-bold flex justify-center items-center gap-2">
                        <i class="ph-bold ph-plus"></i> 新增資料夾
                    </button>
                </div>
            </div>

            <!-- ================= 鬧鐘提醒彈窗 (Alarm Modal) ================= -->
            <div id="alarm-modal" class="hidden fixed inset-0 z-[60] bg-slate-950/90 backdrop-blur-md flex flex-col items-center justify-center p-6">
                <div class="bg-slate-900 border border-red-500/50 rounded-2xl p-8 max-w-sm w-full text-center shadow-[0_0_50px_rgba(239,68,68,0.3)] animate-pulse">
                    <i class="ph-fill ph-alarm text-6xl text-red-500 mb-4 inline-block animate-bounce"></i>
                    <h3 class="text-2xl font-bold text-white mb-2">時間到！</h3>
                    <p id="alarm-text" class="text-lg text-slate-300 mb-8">提醒事項內容</p>
                    <button onclick="stopAlarm()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl text-xl shadow-lg transition-transform active:scale-95">
                        <i class="ph-bold ph-check-circle mr-2"></i> 確 定 (停止)
                    </button>
                </div>
            </div>

            <!-- ================= 待辦事項時間選擇彈窗 ================= -->
            <div id="todo-time-modal" class="hidden fixed inset-0 z-[70] bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl flex-col">
                    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><i class="ph-bold ph-bell text-yellow-500"></i> 設定提醒時間</h3>
                    <input type="hidden" id="picker-todo-id">
                    <input type="datetime-local" id="todo-native-picker" class="w-full bg-slate-800 border border-slate-600 rounded-lg p-3 text-sm text-white focus:border-blue-500 outline-none mb-6 shadow-inner" style="color-scheme: dark;">
                    <div class="flex justify-between items-center mt-2">
                        <button onclick="clearTodoAlarm()" class="px-3 py-2 text-red-400 hover:bg-red-900/30 rounded-lg transition-colors text-sm flex items-center gap-1"><i class="ph-bold ph-bell-slash"></i> 關閉提醒</button>
                        <div class="flex space-x-2">

                            <label class="text-xs text-slate-400 mb-1 flex justify-between shrink-0">
                                內文 (支援直接貼上網頁圖文排版、YouTube 網址)
                                <label for="edit-note-img-upload" class="text-emerald-400 hover:text-emerald-300 cursor-pointer flex items-center gap-1 bg-emerald-900/30 px-2 py-1 rounded"><i class="ph-bold ph-image"></i> 插入圖片</label>

                            </label>
                            <div id="edit-note-content" contenteditable="true" placeholder="在這裡輸入文字，或直接 Ctrl+V 貼上網頁圖文、YouTube連結..." class="note-html-content flex-1 w-full bg-slate-950 border border-slate-700 rounded-lg p-4 text-base md:text-lg leading-relaxed text-slate-200 focus:border-emerald-500 outline-none overflow-y-auto"></div>

                        <button onclick="saveNoteEdit()" class="px-8 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg transition-colors font-bold text-lg shadow-lg">儲存變更</button>

            </div>

        </main>
    </div>
    
    <!-- Toast 系統提示區塊 -->
    <div id="toast">✅ 訊息提示</div>

    <!-- ================= JavaScript 邏輯與功能實作 ================= -->
    <script>
        // 將所有全域變數與函數明確綁定在 window 上，確保 HTML inline onclick 可以呼叫
        window.recognition = null; 
        window.noteRecognition = null; 
        window.voiceTimer = null; 
        window.chatInitialInput = ""; 
        window.noteInitialInput = "";
        window.alarmInterval = null; 
        window.alarmAudioCtx = null; 
        window.mediaRecorder = null; 
        window.audioChunks = [];
        window.liveVideoStream = null; 
        window.translateBSilenceTimer = null;

        // --- IndexedDB 資料庫初始化與操作 ---
        const DB_NAME = 'NovaDB'; const DB_VERSION = 2; let db;

        window.initDB = function() {
            return new Promise((resolve, reject) => {
                if (!window.indexedDB) { console.warn("瀏覽器不支援 IndexedDB"); resolve(null); return; }
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('messages')) db.createObjectStore('messages', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('notes')) db.createObjectStore('notes', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('todos')) db.createObjectStore('todos', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('audioRecords')) db.createObjectStore('audioRecords', { keyPath: 'id' });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(db); };
                req.onerror = (e) => reject(e.target.error);
            });
        }
        window.loadStoreFromDB = function(storeName) { return new Promise((resolve) => { if (!db) return resolve([]); try { const tx = db.transaction(storeName, 'readonly'); const req = tx.objectStore(storeName).getAll(); req.onsuccess = () => resolve(req.result || []); req.onerror = () => resolve([]); } catch(e) { resolve([]); } }); }
        window.saveToDB = function(storeName, item) { if (!db) return; try { db.transaction(storeName, 'readwrite').objectStore(storeName).put(item); } catch(e) {} }
        window.deleteFromDB = function(storeName, id) { 
            if (!db) return; 
            try { 
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.delete(id); 
                if (typeof id === 'string' && !isNaN(Number(id))) store.delete(Number(id)); 
            } catch(e) { console.warn("Delete DB Error:", e); } 
        }
        window.clearStoreDB = function(storeName) { if (!db) return; try { db.transaction(storeName, 'readwrite').objectStore(storeName).clear(); } catch(e) {} }

        // --- 核心應用狀態 ---
        window.appState = {
            currentModel: 'gemini', grokModel: 'grok-multi', geminiModel: 'gemini-multi',
            chatFile: null, currentDeviceId: null,
            docMonitorUrl: localStorage.getItem('nova_doc_url') || '', driveUrl: localStorage.getItem('nova_drive_url') || '',
            messages: [], notes: [], todos: [], audioRecords: [], 
            weather: { temp: '--', condition: 'cloudy', humidity: '--', wind: '--', loc: '未定位' },
            keys: { gemini: localStorage.getItem('nova_key_gemini')||'', groq: localStorage.getItem('nova_key_groq')||'', cohere: localStorage.getItem('nova_key_cohere')||'', openai: localStorage.getItem('nova_key_openai')||'', grok: localStorage.getItem('nova_key_grok')||'', serpapi: localStorage.getItem('nova_key_serpapi')||'' },
            isThinking: false, isListening: false, isNoteListening: false, noteVoiceActive: false, isSearchEnabled: false, isContinuous: false, manualLocIndex: 0,
            isLiveMode: false, 
            translateMode: 'off',
            currentListenLang: 'zh-TW',
            manualLocs: [{name: "台北", lat: 25.0330, lon: 121.5654}, {name: "台中", lat: 24.1477, lon: 120.6736}, {name: "高雄", lat: 22.6273, lon: 120.3014}],
            pendingReminder: null, reminderStage: 0, countryCode: 'TW', lastLat: null, lastLon: null,
            recordingContext: 'default', currentAudioTranscript: '', editNoteImagesBase64: [], 
            pendingAnalyzePrompt: "", pendingAnalyzeContextId: null, pendingAnalyzeType: "",
            activeMediaTracks: [], recordingAudioCtx: null,
            voiceTimeout: parseInt(localStorage.getItem('nova_voice_timeout')) || 5,
            translateBTimeout: parseInt(localStorage.getItem('nova_trans_b_timeout')) || 1,
            hideLiveCapture: localStorage.getItem('nova_hide_live_capture') === 'true',
            isTTSPlaying: false,
            playingMsgId: null,
            enableContext: false,
            replyLength: localStorage.getItem('nova_reply_length') || 'medium',
            ttsRate: localStorage.getItem('nova_tts_rate') || 1.0,
            ttsVoice: localStorage.getItem('nova_tts_voice') || '',
            noteFolders: JSON.parse(localStorage.getItem('nova_folders')) || ['未分類', '工作', '生活'],
            currentNoteFolder: '全部',
            
            // Web Audio VAD State
            vadAudioCtx: null,
            vadSource: null,
            vadAnalyser: null,
            vadDataArray: null,
            vadAnimFrame: null,
            isSpeaking: false,
            silenceTimer: null
        };
        
        window.MODEL_CONFIG = {
            gemini: { name: 'Gemini', color: 'text-blue-400', bg: 'bg-blue-600', icon: 'ph-globe' }, grok: { name: 'Grok', color: 'text-slate-100', bg: 'bg-slate-600', icon: 'ph-lightning' }, groq: { name: 'Groq', color: 'text-rose-400', bg: 'bg-rose-600', icon: 'ph-rocket' }, cohere: { name: 'Cohere', color: 'text-violet-400', bg: 'bg-violet-600', icon: 'ph-cpu' }, gpt: { name: 'OpenAI', color: 'text-emerald-400', bg: 'bg-emerald-600', icon: 'ph-cpu' }
        };

        window.getTime = function() { return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
        
        window.formatMessage = function(text) { 
            if (!text) return ''; 
            let images = [];
            let tempText = text.replace(/!\[(.*?)\]\((https?:\/\/[^\s<]+)\)/g, function(match, alt, url) {
                images.push({alt: alt, url: url}); return `___IMG_${images.length - 1}___`;
            });
            let safe = tempText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            safe = safe.replace(/\*\*(.*?)\*\*/g, '<strong class="text-white font-bold">$1</strong>'); 
            safe = safe.replace(/\[([^\]]+)\]\((https?:\/\/[^\s<]+?)\)|(https?:\/\/[^\s<)\]]+)/g, function(match, mdTitle, mdUrl, rawUrl) {
                let url = mdUrl || rawUrl; url = url.replace(/&amp;/g, "&"); let title = mdTitle || url;
                return `<a href="${url}" target="_blank" class="text-blue-400 underline break-all">${title}</a>`;
            });
            safe = safe.replace(/___IMG_(\d+)___/g, function(match, id) {
                const img = images[id]; const realUrl = img.url.replace(/&amp;/g, "&");
                return `<div class="mt-3 relative group max-w-sm w-full"><img src="${realUrl}" alt="${escapeHtml(img.alt)}" class="rounded-lg border border-slate-700/50 shadow-sm w-full object-contain bg-slate-900"><a href="${realUrl}" target="_blank" download="image.png" class="absolute top-2 right-2 bg-blue-600/90 hover:bg-blue-500 text-white p-2 rounded-lg text-xs opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md" title="開啟或下載原圖"><i class="ph-bold ph-download-simple"></i> 下載</a></div>`;
            });
            return safe.replace(/\n/g, '<br>'); 
        }

        window.escapeHtml = function(t){return t?t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):""}

        window.showToast = function(message) {
            const toast = document.getElementById("toast"); toast.innerText = message; toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        window.handleEnter = function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.handleSendMessage();
            }
        };

        // --- 語音朗讀 (TTS) 功能 ---
        window.populateVoices = function() {
            let voices = window.speechSynthesis.getVoices();
            let select = document.getElementById('key-tts-voice');
            if(!select) return;
            select.innerHTML = '<option value="">(系統智慧自動選擇)</option>';
            voices.forEach(v => {
                select.innerHTML += `<option value="${v.name}">${v.name} (${v.lang})</option>`;
            });
            if(appState.ttsVoice) select.value = appState.ttsVoice;
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = window.populateVoices;
        }

        window.playMessageAudio = function(id) {
            if (appState.isTTSPlaying && appState.playingMsgId === String(id)) {
                window.speechSynthesis.cancel();
                appState.isTTSPlaying = false;
                appState.playingMsgId = null;
                window.renderMessages();
                return;
            }
            const msg = appState.messages.find(m => String(m.id) === String(id));
            if (!msg || !msg.text) return;
            window.speakText(msg.text, true, String(id));
            window.renderMessages();
        };

        window.speakText = function(text, force = false, msgId = null) {
            const shouldAutoPlay = appState.isLiveMode || appState.translateMode !== 'off' || appState.isContinuous;
            if (!shouldAutoPlay && !force) return; 

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                appState.playingMsgId = msgId;
                
                let cleanText = text.replace(/[*_#`\[\]]/g, '').replace(/(https?:\/\/[^\s]+)/g, "網址連結");
                let utterance = new SpeechSynthesisUtterance(cleanText);
                
                let lang = 'en-US'; 
                let testChunk = cleanText.substring(0, 150);
                
                if (/[\u3040-\u309F\u30A0-\u30FF]/.test(testChunk)) {
                    lang = 'ja-JP';
                } else if (/[\uAC00-\uD7AF]/.test(testChunk)) {
                    lang = 'ko-KR';
                } else if (/[\u4E00-\u9FFF]/.test(testChunk)) {
                    lang = 'zh-TW';
                }
                
                utterance.lang = lang;
                
                let voices = window.speechSynthesis.getVoices();
                if (appState.ttsVoice) {
                    let preferred = voices.find(v => v.name === appState.ttsVoice && v.lang.startsWith(lang.substring(0,2)));
                    if (preferred) utterance.voice = preferred;
                }
                if (!utterance.voice) {
                    let defaultVoice = voices.find(v => v.lang === lang || v.lang.startsWith(lang.substring(0,2)));
                    if (defaultVoice) utterance.voice = defaultVoice;
                }
                utterance.rate = parseFloat(appState.ttsRate) || 1.0;
                
                utterance.onstart = () => {
                    appState.isTTSPlaying = true;
                    if (window.recognition && appState.translateMode !== 'B') { try { window.recognition.abort(); } catch(e){} }
                };
                
                utterance.onend = () => {
                    appState.isTTSPlaying = false;
                    appState.playingMsgId = null;
                    window.renderMessages();
                    
                    if (appState.translateMode === 'B') {
                        setTimeout(() => { window.startTranslateBAutoRecord(); }, 300);
                    } else if (appState.isContinuous || appState.isLiveMode || appState.translateMode === 'A') {
                        setTimeout(() => { 
                            if(!appState.isTTSPlaying && !appState.isThinking) {
                                try { window.recognition.start(); } catch(e){} 
                            }
                        }, 500);
                    }
                };

                utterance.onerror = () => {
                    appState.isTTSPlaying = false;
                    appState.playingMsgId = null;
                    window.renderMessages();
                    
                    if (appState.translateMode === 'B') {
                        setTimeout(() => { window.startTranslateBAutoRecord(); }, 300);
                    } else if (appState.isContinuous || appState.isLiveMode || appState.translateMode === 'A') {
                        setTimeout(() => { 
                            if(!appState.isTTSPlaying && !appState.isThinking) {
                                try { window.recognition.start(); } catch(e){} 
                            }
                        }, 500);
                    }
                };

                window.speechSynthesis.speak(utterance);
                window.renderMessages();
            } else if (force) {
                window.showToast("❌ 您的瀏覽器不支援語音朗讀功能");
            }
        }

        // --- 剪貼簿與檔案下載功能 ---
        window.copyDeepLink = function(text) {
            const textArea = document.createElement("textarea"); textArea.value = text;
            textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.position = "fixed";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); window.showToast("✅ 連結已複製！請貼至手機瀏覽器網址列以跳轉。"); } 
            catch (err) { window.showToast("❌ 複製失敗"); }
            document.body.removeChild(textArea);
        };
        
        window.copyMessageText = function(id) {
            const msg = appState.messages.find(m => String(m.id) === String(id));
            if (!msg) return;
            const textArea = document.createElement("textarea");
            textArea.value = msg.text;
            textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.position = "fixed";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); window.showToast("✅ 訊息已複製到剪貼簿！"); } 
            catch (err) { window.showToast("❌ 複製失敗"); }
            document.body.removeChild(textArea);
        };

        window.base64ToBlob = function(base64URI) {
            const splitIndex = base64URI.indexOf(',');
            const mimeStr = base64URI.slice(5, splitIndex).split(';')[0];
            const byteString = atob(base64URI.slice(splitIndex + 1));
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeStr });
        }

        window.downloadLocalAudio = function(id, type) {
            let record = type === 'record' ? appState.audioRecords.find(x => String(x.id) === String(id)) : appState.notes.find(x => String(x.id) === String(id));
            if (!record || !record.audioData) { alert("找不到本地音檔資料"); return; }
            
            const dateObj = new Date(Number(id));
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            const year = dateObj.getFullYear();
            const timeStr = dateObj.toTimeString().split(' ')[0].replace(/:/g, '');
            const finalFilename = `NOVA_Audio_${month}${day}${year}_${timeStr}.weba`;

            try {
                const blob = window.base64ToBlob(record.audioData);
                const blobUrl = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = finalFilename;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(blobUrl);
                }, 2000);
                
                window.showToast(`✅ 已開始下載：${finalFilename}`);
            } catch(e) {
                alert("下載失敗：" + e.message);
            }
        };

        window.renderAll = function() { window.renderMessages(); window.renderTodos(); window.renderFolderTabs(); window.renderNotes(); window.renderAudioRecords(); window.renderWeather(); }
        
        // --- UI 渲染功能 (訊息) ---
        window.renderMessages = function() { 
            const container = document.getElementById('chat-container'); if(!container) return;
            container.innerHTML = appState.messages.map(msg => { 
                
                let displayMediaHTML = true;
                if (appState.hideLiveCapture && msg.file && msg.file.name === 'Live_Capture.jpg') {
                    if (!msg.text || msg.text === "請詳細描述畫面中的內容。" || msg.text === `[夾帶檔案/畫面: Live_Capture.jpg]`) {
                        return ''; 
                    }
                    displayMediaHTML = false; 
                }

                const isUser = msg.sender === 'user'; const modelInfo = isUser ? null : MODEL_CONFIG[msg.model]; 
                let sourcesHTML = msg.sources?.length ? `<div class="mt-3 pt-3 border-t border-slate-700/50"><p class="text-[10px] text-slate-400 mb-1 font-bold">來源：</p><div class="flex flex-wrap gap-2">${msg.sources.map((s,i)=>`<a href="${s.uri}" target="_blank" class="text-[10px] bg-slate-950/50 text-blue-400 px-2 py-1 rounded border border-slate-700/50 block truncate max-w-[150px]">${i+1}. ${s.title}</a>`).join('')}</div></div>` : ''; 
                
                let mediaHTML = '';
                if (msg.file && displayMediaHTML) {
                    if (msg.file.category === 'image' && msg.file.data) {
                        mediaHTML = `
                        <div class="relative group mb-3 max-w-sm w-full">
                            <img src="${msg.file.data}" class="rounded-lg border border-slate-700/50 shadow-sm w-full object-contain bg-slate-900">
                            <a href="${msg.file.data}" download="${window.escapeHtml(msg.file.name || 'image.png')}" class="absolute top-2 right-2 bg-blue-600/90 hover:bg-blue-500 text-white p-2 rounded-lg shadow-lg text-xs opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1 backdrop-blur-md" title="下載圖片">
                                <i class="ph-bold ph-download-simple"></i> 下載
                            </a>
                        </div>`;
                    } else {
                        let iconType = msg.file.category === 'image' ? 'ph-image' : 'ph-file';
                        if (msg.file.mime && (msg.file.mime.includes('audio') || msg.file.mime.includes('video'))) iconType = 'ph-file-audio';
                        mediaHTML = `<div class="flex items-center gap-2 bg-slate-950/50 p-2 rounded border border-slate-700/50 mb-2 max-w-xs overflow-hidden"><i class="ph-fill ${iconType} text-blue-400 text-xl shrink-0"></i><span class="text-xs text-slate-300 truncate">${window.escapeHtml(msg.file.name)}</span></div>`;
                    }
                }

                let actionCardHtml = '';
                if (!isUser && msg.actionData && msg.actionData.intentFound && msg.actionData.deepLinkUrl) {
                    const ad = msg.actionData;
                    let iconClass = 'ph-app-window text-blue-400';
                    if(/line/i.test(ad.appName)) iconClass = 'ph-chat-circle-text text-green-500';
                    else if(/youtube/i.test(ad.appName)) iconClass = 'ph-youtube-logo text-red-500';
                    else if(/facebook|fb/i.test(ad.appName)) iconClass = 'ph-facebook-logo text-blue-500';
                    else if(/instagram|ig/i.test(ad.appName)) iconClass = 'ph-instagram-logo text-pink-500';
                    else if(/map|地圖/i.test(ad.appName)) iconClass = 'ph-map-pin text-red-500';
                    else if(/phone|打給|電話|簡訊|sms/i.test(ad.appName)) iconClass = 'ph-phone text-green-400';
                    else if(/thsrc|高鐵|tex|行動購票/i.test(ad.appName)) iconClass = 'ph-train text-orange-500';
                    else if(/shopee|蝦皮/i.test(ad.appName)) iconClass = 'ph-shopping-bag text-orange-600';
                    
                    actionCardHtml = `
                    <div class="mt-3 w-full bg-slate-800/80 border border-slate-700 p-3 rounded-xl shadow-sm flex flex-col gap-3">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-10 h-10 rounded-lg bg-slate-900 flex items-center justify-center flex-shrink-0"><i class="ph-fill ${iconClass} text-xl"></i></div>
                            <div class="flex flex-col truncate w-full pr-2">
                                <span class="text-sm font-bold text-white truncate">${window.escapeHtml(ad.appName || '應用程式')}</span>
                                <span class="text-xs text-slate-400 truncate w-full block">${window.escapeHtml(ad.actionDescription || '即將執行此操作')}</span>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full">
                            <button onclick="copyDeepLink('${ad.deepLinkUrl}')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-1">
                                <i class="ph-bold ph-copy"></i> 複製連結
                            </button>
                            <a href="${ad.deepLinkUrl}" target="_blank" rel="noopener noreferrer" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-1 text-center">
                                <i class="ph-bold ph-arrow-square-out"></i> 開啟 App
                            </a>
                        </div>
                    </div>`;
                }

                let isPlayingMsg = appState.isTTSPlaying && appState.playingMsgId === String(msg.id);

                return `<div class="group flex ${isUser ? 'justify-end' : 'justify-start items-start space-x-3'} fade-in relative mb-4">
                    ${!isUser ? `<div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 mt-1 ${modelInfo?.bg||'bg-slate-700'}"><i class="ph-fill ${modelInfo?.icon||'ph-robot'} text-white text-sm"></i></div>` : ''}
                    <div class="msg-group relative max-w-[90%] md:max-w-[80%] rounded-2xl p-4 shadow-sm ${isUser ? 'bg-slate-800 text-white rounded-br-none' : 'bg-slate-900 border border-slate-800 text-slate-200 rounded-tl-none'}">
                        ${!isUser ? `<span class="text-[10px] font-bold uppercase mb-1 block ${modelInfo?.color||'text-slate-400'} opacity-80">${modelInfo?.name||'System'}</span>` : ''}
                        ${mediaHTML} <div class="msg-content text-sm leading-relaxed">${window.formatMessage(msg.text)}</div> ${actionCardHtml} ${sourcesHTML}
                        <p class="text-[10px] mt-2 text-right text-slate-500 opacity-60">${msg.time}</p>

                appState.notes.forEach(n => {

        // --- 攝影機與 LIVE 視覺功能 ---
        window.populateCameraSelect = async function() {
            const select = document.getElementById('camera-select');
            if (!select) return;
            
            try {
                await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                select.innerHTML = '';
                if (videoDevices.length === 0) {
                    select.innerHTML = '<option value="">無相機</option>';
                    return;
                }

                videoDevices.forEach((d, i) => {
                    const option = document.createElement('option');
                    option.value = d.deviceId;
                    option.text = d.label || `相機 ${i + 1}`;
                    select.appendChild(option);
                });
                
                if (appState.currentDeviceId) {
                    let exists = videoDevices.find(d => d.deviceId === appState.currentDeviceId);
                    if(exists) select.value = appState.currentDeviceId;
                    else select.selectedIndex = 0;
                } else {
                    let backCams = videoDevices.filter(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('後'));
                    let standardCam = backCams.find(d => !d.label.toLowerCase().includes('wide') && !d.label.toLowerCase().includes('廣角'));
                    if(standardCam) select.value = standardCam.deviceId;
                    else if(backCams.length > 0) select.value = backCams[0].deviceId;
                    else select.selectedIndex = 0;
                    
                    appState.currentDeviceId = select.value;
                }
            } catch(e) {
                select.innerHTML = '<option value="environment">後鏡頭 (預設)</option><option value="user">前鏡頭 (自拍)</option>';
            }
        }

        window.switchCamera = async function(deviceId) {
            appState.currentDeviceId = deviceId;
            if (appState.isLiveMode && window.liveVideoStream) {
                window.liveVideoStream.getTracks().forEach(t => t.stop());
                try {
                    let constraints = { video: { deviceId: { exact: deviceId } } };
                    if(deviceId === 'environment' || deviceId === 'user') constraints = { video: { facingMode: deviceId } };
                    
                    window.liveVideoStream = await navigator.mediaDevices.getUserMedia(constraints);
                    document.getElementById('live-video-preview').srcObject = window.liveVideoStream;
                } catch(e) {
                    alert("切換鏡頭失敗：" + e.message);

        window.startTranslateBAutoRecord = async function() {
            if (appState.translateMode !== 'B') return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                appState.recordingContext = 'translateB';
                window.mediaRecorder = new MediaRecorder(stream);
                window.audioChunks = [];
                appState.activeMediaTracks = stream.getTracks();
                
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    appState.vadAudioCtx = new AudioContextClass();
                    appState.vadSource = appState.vadAudioCtx.createMediaStreamSource(stream);
                    appState.vadAnalyser = appState.vadAudioCtx.createAnalyser();
                    appState.vadAnalyser.fftSize = 512;
                    appState.vadSource.connect(appState.vadAnalyser);
                    appState.vadDataArray = new Uint8Array(appState.vadAnalyser.frequencyBinCount);
                } catch(e) { console.warn("VAD init failed", e); }
                
                appState.isSpeaking = false;
                appState.silenceTimer = null;
                
                function checkAudioLevel() {
                    if (appState.translateMode !== 'B' || appState.recordingContext !== 'translateB') return;
                    
                    if (appState.vadAnalyser && appState.vadDataArray) {
                        appState.vadAnalyser.getByteFrequencyData(appState.vadDataArray);
                        let sum = 0;
                        for(let i = 0; i < appState.vadDataArray.length; i++) {
                            sum += appState.vadDataArray[i];
                        }
                        let avgVolume = sum / appState.vadDataArray.length;
                        
                        const threshold = 15; 
                        
                        if (avgVolume > threshold) {
                            if (!appState.isSpeaking) {
                                appState.isSpeaking = true;
                                const statusText = document.getElementById('recording-status-text');
                                if (statusText) statusText.innerText = "口譯音訊擷取中...";
                            }
                            if (appState.silenceTimer) {
                                clearTimeout(appState.silenceTimer);
                                appState.silenceTimer = null;
                            }
                        } else {
                            if (appState.isSpeaking && !appState.silenceTimer) {
                                appState.silenceTimer = setTimeout(() => {
                                    window.stopTranslateBAndSend();
                                }, appState.translateBTimeout * 1000);
                            }
                        }
                    }
                    appState.vadAnimFrame = requestAnimationFrame(checkAudioLevel);
                }
                
                checkAudioLevel();

                window.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) window.audioChunks.push(e.data); };
                window.mediaRecorder.onstop = window.processTranslateB;
                window.mediaRecorder.start();
                
                document.getElementById('recording-status').classList.remove('hidden'); 
                document.getElementById('recording-status').classList.add('flex');
                document.getElementById('recording-status-text').innerText = "口譯待命中... (請開始說話)";
                
            } catch (err) {
                window.addMessage("⚠️ 無法啟動錄音", 'system');
            }
        }

        window.stopTranslateBAndSend = function() {
            if (appState.translateMode !== 'B') return;
            if (window.mediaRecorder && window.mediaRecorder.state !== 'inactive') {
                window.mediaRecorder.stop();
                appState.activeMediaTracks.forEach(t => t.stop());
                
                if (appState.vadAnimFrame) cancelAnimationFrame(appState.vadAnimFrame);
                if (appState.vadSource) { appState.vadSource.disconnect(); appState.vadSource = null; }
                if (appState.vadAudioCtx) { appState.vadAudioCtx.close(); appState.vadAudioCtx = null; }
                
                document.getElementById('recording-status').classList.add('hidden');
                document.getElementById('recording-status').classList.remove('flex');
            }
        }

        window.processTranslateB = async function() {
            if (window.audioChunks.length === 0 || !appState.isSpeaking) {
                if (appState.translateMode === 'B') setTimeout(window.startTranslateBAutoRecord, 500);
                return;
            }
            const audioBlob = new Blob(window.audioChunks, { type: window.mediaRecorder.mimeType || 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async () => {
                const base64dataWithPrefix = reader.result;
                appState.recordingContext = 'default';
                window.addMessage("🎙️ 音軌已自動擷取，AI 翻譯中...", "user");
                appState.isThinking = true;
                window.renderThinkingState(true);
                try {
                    let prompt = "你是一位專業的同步口譯員。請直接聽取這段音檔中的對話並進行翻譯。如果說的是中文，請翻譯成自然流暢的英文；如果說的是任何外文，請翻譯成繁體中文。請『只輸出最終的翻譯結果文字』，絕對不要包含任何解釋、原文、拼音或個人評論。\n\n【嚴格警告】：如果音檔是空白的、只有環境雜音或聽不清楚任何人類語音，請務必只回覆「[無效音訊]」，絕對不要自行編造內容或產生幻覺！";
                    let res = await window.fetchAIResponse(prompt, 'gemini', { 
                        file: { category: 'media', data: base64dataWithPrefix, mime: window.mediaRecorder.mimeType || 'audio/webm', name: 'Voice_Input.weba' },
                        isTranslateB: true
                    });
                    let finalTxt = typeof res === 'string' ? res : res.text;
                    
                    if (finalTxt.includes('[無效音訊]')) {
                        window.addMessage("*(未偵測到有效語音，已忽略)*", 'system');
                        if (appState.translateMode === 'B') setTimeout(window.startTranslateBAutoRecord, 1000);
                    } else {
                        window.addMessage(finalTxt, 'ai', 'gemini');
                        if (appState.translateMode === 'B') {
                            const aiMsgId = appState.messages[appState.messages.length - 1].id;
                            window.speakText(finalTxt, false, String(aiMsgId));
                        }
                    }
                } catch(e) {
                    window.addMessage("翻譯失敗：" + e.message, 'system');
                    if (appState.translateMode === 'B') setTimeout(window.startTranslateBAutoRecord, 2000);
                } finally {
                    appState.isThinking = false;
                    window.renderThinkingState(false);
                }
            };
        }

        window.importSettings = async function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            window.addMessage("⏳ 正在讀取備份檔並還原系統，請勿關閉視窗...", "system");
            reader.onload = async function(evt) {
                try {
                    const data = JSON.parse(evt.target.result);
                    
                    if (data.keys) { appState.keys.gemini = data.keys.gemini || ''; appState.keys.groq = data.keys.groq || ''; appState.keys.cohere = data.keys.cohere || ''; appState.keys.openai = data.keys.openai || ''; appState.keys.grok = data.keys.grok || ''; appState.keys.serpapi = data.keys.serpapi || ''; }
                    if (data.urls) { appState.docMonitorUrl = data.urls.docMonitorUrl || ''; appState.driveUrl = data.urls.driveUrl || ''; }
                    if (data.settings) { 
                        appState.voiceTimeout = data.settings.voiceTimeout || 5; 
                        appState.translateBTimeout = data.settings.translateBTimeout || 1;
                        appState.replyLength = data.settings.replyLength || 'medium';
                        appState.ttsRate = data.settings.ttsRate || 1.0;
                        appState.ttsVoice = data.settings.ttsVoice || '';
                        appState.hideLiveCapture = !!data.settings.hideLiveCapture;

        window.handleChatFileSelect = function(e) {
            const file = e.target.files[0]; if (!file) return;
            if (file.size > 20 * 1024 * 1024) { alert("檔案過大，請上傳小於 20MB 的檔案以確保穩定性。"); e.target.value = ''; return; }
            const isText = file.type.startsWith('text/') || !!file.name.match(/\.(txt|csv|md|json|js|html|css|py|cpp|c|java)$/i);
            const isImage = file.type.startsWith('image/');
            const isMedia = file.type.startsWith('audio/') || file.type.startsWith('video/') || file.type === 'application/pdf' || !!file.name.match(/\.(pdf|mp3|wav|mp4|webm|m4a)$/i);
            let category = isImage ? 'image' : (isText ? 'text' : (isMedia ? 'media' : 'unknown'));
            if (category === 'unknown') category = 'media'; 
            if (isText && file.size > 2 * 1024 * 1024) alert("提醒：純文字檔案較大，可能超出 AI 分析上限，建議擷取重點上傳。");

            let mimeType = file.type || 'application/octet-stream';
            const filenameLower = file.name.toLowerCase();
            if (filenameLower.endsWith('.webm')) mimeType = 'audio/webm';
            else if (filenameLower.endsWith('.mp3')) mimeType = 'audio/mp3';
            else if (filenameLower.endsWith('.wav')) mimeType = 'audio/wav';
            else if (filenameLower.endsWith('.m4a')) mimeType = 'audio/m4a';
            else if (filenameLower.endsWith('.mp4')) mimeType = 'video/mp4';
            else if (filenameLower.endsWith('.pdf')) mimeType = 'application/pdf';

            const reader = new FileReader();
            reader.onload = function(evt) { 
                appState.chatFile = { category: category, data: evt.target.result, mime: mimeType, name: file.name }; 
                window.showFilePreview(file.name, isImage, evt.target.result); 
                window.togglePlusMenu(); 
            };
            if (category === 'text') reader.readAsText(file); else reader.readAsDataURL(file);
            e.target.value = ''; 
        }

                                const city = d.city || d.locality || d.principalSubdivision || "目前位置";
                                window.fetchWeather(p.coords.latitude, p.coords.longitude, city, silent);
                            }).catch(() => { window.fetchWeather(p.coords.latitude, p.coords.longitude, "GPS定位", silent); });
                    }, (e) => window.getIPLocation(silent), { timeout: 5000, enableHighAccuracy: true } 
                ); 
            } else window.getIPLocation(silent); 
        }

        // --- 核心訊息發送與處理邏輯 ---
        window.handleSendMessage = async function() {
            if(appState.isThinking) return;
            
            const input = document.getElementById('user-input'); 
            let text = input.value.trim(); 
            const hasChatFile = appState.chatFile !== null;
            
            if (text.length >= 4 && text.length % 2 === 0) { 
                const mid = text.length / 2; 
                if (text.substring(0, mid) === text.substring(mid)) text = text.substring(0, mid); 
            }
            
            if(!text && !hasChatFile && !appState.isLiveMode) return;

            const cleanCmd = text.replace(/[\s，。、！!]/g, '').toLowerCase();
            if (cleanCmd.includes('啟動即時口譯')) { window.toggleTranslateMode('A'); input.value=''; window.autoResizeInput(input); window.chatInitialInput=''; return; }
            if (cleanCmd.includes('關閉即時口譯')) { window.toggleTranslateMode('off'); input.value=''; window.autoResizeInput(input); window.chatInitialInput=''; return; }
            if (cleanCmd.includes('啟動live影像')) { window.toggleLiveMode(true); input.value=''; window.autoResizeInput(input); window.chatInitialInput=''; return; }
            if (cleanCmd.includes('關閉live影像')) { window.toggleLiveMode(false); input.value=''; window.autoResizeInput(input); window.chatInitialInput=''; return; }

            if (appState.translateMode === 'A' && appState.translateSetupStage === 1) {
                let target = '';
                if (text.match(/英/)) target = 'en-US';
                else if (text.match(/日/)) target = 'ja-JP';
                else if (text.match(/韓/)) target = 'ko-KR';

                window.addMessage(text, 'user');

                if (target) {
                    appState.translateTargetLang = target;
                    appState.translateSetupStage = 0;
                    const langName = target === 'en-US' ? '英文' : target === 'ja-JP' ? '日文' : '韓文';
                    const confirmText = `✅ 已設定為 **中文 ↔ ${langName}** 雙向口譯。\n系統收到中文會輸出${langName}，收到${langName}會翻成中文。\n請直接對著麥克風說話。`;
                    window.addMessage(confirmText, 'system');
                    window.speakText(`已設定為中文與${langName}雙向口譯`, true);
                    
                    document.getElementById('stt-lang-toggle').classList.remove('hidden');
                } else {
                    window.addMessage("⚠️ 目前系統主要支援「英文」、「日文」與「韓文」的完美語音輸出，請重新告訴我要互譯的語言。", 'system');
                    window.speakText("目前主要支援英文、日文與韓文，請重新告訴我要互譯的語言", true);
                }
                input.value = ''; window.autoResizeInput(input); window.chatInitialInput='';
                appState.isThinking = false; window.updateSendButtonState(false); window.renderThinkingState(false);
                return;
            }

            if (text.includes("開始錄音")) { input.value = ''; window.autoResizeInput(input); window.chatInitialInput = ''; window.addMessage(text, 'user'); window.startAudioRecording(); return; }
            if (text.includes("停止錄音") || text.includes("結束錄音")) { input.value = ''; window.autoResizeInput(input); window.chatInitialInput = ''; window.addMessage(text, 'user'); window.stopAudioRecording(); return; }

            appState.isThinking = true; 
            window.updateSendButtonState(true);

            try {
                const actionKeywords = ['打開', '開啟', 'open', '播放', '傳', '發', '發送', '導航', '帶我', '撥打', 'call', '打給', '幫我'];
                const isAction = actionKeywords.some(kw => text.toLowerCase().startsWith(kw));
                const isImageIntent = /^(畫|生成|產生|draw|generate)\s*(一張|一個|圖片|照片|圖|image|photo)/i.test(text.trim());

                if (isAction && !isImageIntent && appState.currentModel === 'gemini' && appState.keys.gemini && !hasChatFile && !appState.isLiveMode && appState.translateMode === 'off') {
                    const sysMsgId = Date.now();
                    appState.messages.push({id: sysMsgId, text: `🔄 正在辨識您的操作意圖...`, sender: 'system', time: window.getTime()});
                    window.renderMessages();
                    
                    const intentData = await window.checkDeepLinkIntent(text);
                    
                    appState.messages = appState.messages.filter(m => m.id !== sysMsgId); 
                    
                    if (intentData && intentData.intentFound) {
                        window.addMessage(text, 'user');
                        window.addMessage(intentData.replyMessage, 'ai', 'gemini', [], null, intentData);
                        
                        setTimeout(() => { window.location.href = intentData.deepLinkUrl; }, 1500);
                        input.value = ''; window.autoResizeInput(input); window.chatInitialInput = '';
                        if (window.recognition) { try { window.recognition.abort(); } catch(e){} }
                        return; 
                    } else {
                        window.renderMessages(); 
                    }
                }

                let fileDataToPass = hasChatFile ? { ...appState.chatFile } : null;
                
                if (!fileDataToPass && appState.isLiveMode && window.liveVideoStream) {
                    try {
                        const videoEl = document.getElementById('live-video-preview');
                        const canvas = document.createElement('canvas');
                        canvas.width = videoEl.videoWidth || 480;
                        canvas.height = videoEl.videoHeight || 640;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        fileDataToPass = { category: 'image', data: dataUrl, mime: 'image/jpeg', name: 'Live_Capture.jpg' };
                        
                        if (!text) text = "請詳細描述畫面中的內容。";
                    } catch(err) {
                        console.warn("擷取 LIVE 畫面失敗", err);
                    }
                }

                let displayMessage = text;

        window.parseTimeNatural = function(str) {
            const now = new Date(); let result = { complete: false, timestamp: null, missing: null };
            const relMatch = str.match(/(\d+)\s*(分鐘|min|minute|小時|hour|hr|秒|sec|second)後?/i);
            if (relMatch) {
                const amount = parseInt(relMatch[1]); const unit = relMatch[2];
                if (unit.includes('分') || unit.includes('min')) now.setMinutes(now.getMinutes() + amount);
                else if (unit.includes('小') || unit.includes('h')) now.setHours(now.getHours() + amount);
                else if (unit.includes('秒') || unit.includes('s')) now.setSeconds(now.getSeconds() + amount);
                return { complete: true, timestamp: now.getTime() };
            }
            let targetDate = new Date(); let hasDate = false;
            if (str.includes('明天') || str.includes('tomorrow')) { targetDate.setDate(targetDate.getDate() + 1); hasDate = true; } 
            else if (str.includes('後天')) { targetDate.setDate(targetDate.getDate() + 2); hasDate = true; } 
            else if (str.match(/\d{1,2}月\d{1,2}日/)) { const dMatch = str.match(/(\d{1,2})月(\d{1,2})日/); targetDate.setMonth(parseInt(dMatch[1]) - 1); targetDate.setDate(parseInt(dMatch[2])); hasDate = true; } 
            else if (str.includes('今天') || str.includes('today')) { hasDate = true; }

            let hour = -1, minute = 0;
            const timeMatch = str.match(/(\d{1,2})[:：](\d{2})/); const hourMatch = str.match(/(\d{1,2})點(\d{1,2})?分?/); 
            if (timeMatch) { hour = parseInt(timeMatch[1]); minute = parseInt(timeMatch[2]); } else if (hourMatch) { hour = parseInt(hourMatch[1]); if (hourMatch[2]) minute = parseInt(hourMatch[2]); }

            let isPM = str.includes('下午') || str.includes('晚上') || str.includes('pm') || str.includes('PM');
            let isAM = str.includes('上午') || str.includes('早上') || str.includes('am') || str.includes('AM');

            if (hour !== -1) {
                if (hour < 12 && !isPM && !isAM && !str.includes('24h')) return { complete: false, missing: 'ampm' }; 
                if (isPM && hour < 12) hour += 12; if (isAM && hour === 12) hour = 0; 
                targetDate.setHours(hour, minute, 0, 0);
                if (!hasDate) { if (targetDate < new Date()) return { complete: false, missing: 'date' }; }
                return { complete: true, timestamp: targetDate.getTime() };
            }
            return { complete: false, missing: 'time' };
        }
